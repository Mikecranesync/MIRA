services:
  mira-hub:
    build:
      context: ./mira-hub
      dockerfile: Dockerfile
    image: mira-hub:latest
    container_name: mira-hub
    restart: unless-stopped
    ports:
      - "127.0.0.1:3101:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_PIPELINE_API_URL=${NEXT_PUBLIC_PIPELINE_API_URL:-http://mira-pipeline:9099}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3100}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/hub/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - core-net

networks:
  core-net:
    external: true
