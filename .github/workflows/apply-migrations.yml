name: Apply NeonDB Migrations

# Manually-triggered workflow to apply mira-hub/db/migrations/*.sql against
# the chosen NeonDB target (staging or prod). All target migrations use
# IF NOT EXISTS / OR REPLACE and are idempotent — re-running is safe.
#
# Pre-reqs:
#   - GitHub secret `DOPPLER_TOKEN` set to a Doppler service token scoped to
#     `factorylm/prd` (read-only is enough; it just needs DATABASE_URL).
#     Create at https://dashboard.doppler.com → Access → Service Tokens.
#     CLI:  doppler configs tokens create ci-apply-migrations --plain
#     Then: gh secret set DOPPLER_TOKEN
#   - Repo admin runs the workflow. workflow_dispatch already restricts to
#     users with write access; the `production` environment gate adds an
#     audit-log entry in the deployments tab. Add required reviewers to
#     that environment (Settings → Environments → production) for an
#     interactive approval gate.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'NeonDB target. staging = factorylm/stg, prod = factorylm/prd. Default staging — promote to prod only after staging is verified.'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod
      migrations:
        description: 'Migrations to apply (e.g. "014,015,016,017,018" or "all" for everything in mira-hub/db/migrations not yet recorded).'
        required: true
        default: '014,015,016,017,018'
        type: string
      mode:
        description: 'dry-run = print plan + statements only. apply = run un-applied files (records them in schema_migrations). seed-ledger = mark all current files as applied WITHOUT running them (one-time baseline for an existing DB).'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - apply
          - seed-ledger
      run_backfill:
        description: 'After migrations, also run tools/uns_backfill.py + tools/cmms_equipment_uns_backfill.py'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# workflow_dispatch already requires repo write access. The environment
# scope below adds a deployment record + lets repo admins add required
# reviewers in Settings → Environments → production.
permissions:
  contents: read

concurrency:
  group: migrations-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply migrations (${{ inputs.target }} / ${{ inputs.mode }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.target == 'prod' && 'production' || 'staging' }}
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Install psql (postgresql-client-16 for ltree/jsonb parity with Neon)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-16
          psql --version

      - name: Authenticate Doppler + resolve DATABASE_URL
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "::error::DOPPLER_TOKEN secret not set. Create a service token at https://dashboard.doppler.com and run: gh secret set DOPPLER_TOKEN (staging env) and/or gh secret set DOPPLER_TOKEN_PROD (production env)."
            exit 1
          fi
          # Map target → Doppler config. Staging = factorylm/stg, prod = factorylm/prd.
          # The DOPPLER_TOKEN secret is scoped per GitHub environment (staging vs production),
          # so we don't need separate token secrets — the active token's project/config
          # already implies the target. We still pass --project/--config explicitly so a
          # mis-scoped token surfaces fast.
          case "${{ inputs.target }}" in
            staging) DOPPLER_CFG=stg ;;
            prod)    DOPPLER_CFG=prd ;;
            *) echo "::error::Unknown target ${{ inputs.target }}"; exit 1 ;;
          esac
          echo "Doppler config: factorylm/${DOPPLER_CFG}"
          DATABASE_URL="$(doppler secrets get NEON_DATABASE_URL --project factorylm --config "${DOPPLER_CFG}" --plain)"
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::NEON_DATABASE_URL empty after Doppler fetch — token scope wrong (expected factorylm/${DOPPLER_CFG})."
            exit 1
          fi
          # Mask it so it never leaks to the log if a later step echoes env.
          echo "::add-mask::$DATABASE_URL"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"
          # Sanity-print only the host (Neon endpoint identifier), nothing else.
          HOST=$(printf '%s' "$DATABASE_URL" | sed -E 's|.*@([^/:]+).*|\1|')
          echo "DB host: $HOST"
          echo "DB_HOST=$HOST" >> "$GITHUB_ENV"

      - name: Resolve migration file list
        id: resolve
        run: |
          set -euo pipefail
          MIG_DIR="mira-hub/db/migrations"
          if [ ! -d "$MIG_DIR" ]; then
            echo "::error::$MIG_DIR not found in checkout"
            exit 1
          fi
          REQUESTED="${{ inputs.migrations }}"
          FILES=()
          if [ "$REQUESTED" = "all" ]; then
            while IFS= read -r f; do FILES+=("$f"); done < <(ls "$MIG_DIR"/*.sql | sort)
          else
            IFS=',' read -ra PREFIXES <<< "$REQUESTED"
            for p in "${PREFIXES[@]}"; do
              p_trimmed="$(echo "$p" | xargs)"
              MATCHES=( "$MIG_DIR"/"${p_trimmed}"_*.sql )
              if [ ! -e "${MATCHES[0]}" ]; then
                echo "::error::No migration file matched prefix '${p_trimmed}' in $MIG_DIR"
                exit 1
              fi
              for m in "${MATCHES[@]}"; do FILES+=("$m"); done
            done
          fi
          # Sort numerically for safety
          IFS=$'\n' SORTED=($(printf '%s\n' "${FILES[@]}" | sort))
          unset IFS
          printf '%s\n' "${SORTED[@]}" > .migration_plan
          echo "Plan:"
          cat .migration_plan
          echo "count=${#SORTED[@]}" >> "$GITHUB_OUTPUT"

      - name: Ledger — bootstrap + skip already-applied (apply/dry-run, 'all')
        if: inputs.mode != 'seed-ledger'
        run: |
          set -euo pipefail
          # Self-bootstrap the ledger so skip-logic works even before 048 runs.
          # Matches the canonical schema_migrations shape (id / migration_name /
          # applied_at, UNIQUE(migration_name)); a no-op where the table exists.
          psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=1 -c \
            "CREATE TABLE IF NOT EXISTS schema_migrations (id integer GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, migration_name varchar NOT NULL UNIQUE, applied_at timestamptz NOT NULL DEFAULT now());"
          # Only 'all' auto-skips applied files; an explicit prefix list is a
          # deliberate (re-)apply request and is left as-is (still recorded).
          if [ "${{ inputs.migrations }}" = "all" ]; then
            APPLIED="$(psql "$DATABASE_URL" --no-psqlrc -tA -c 'SELECT migration_name FROM schema_migrations;' | sort -u)"
            : > .migration_plan.filtered
            SKIPPED=0
            while IFS= read -r f; do
              base="$(basename "$f")"
              if printf '%s\n' "$APPLIED" | grep -qxF "$base"; then
                echo "skip (already applied): $base"
                SKIPPED=$((SKIPPED+1))
              else
                echo "$f" >> .migration_plan.filtered
              fi
            done < .migration_plan
            mv .migration_plan.filtered .migration_plan
            echo "Ledger: skipped ${SKIPPED} already-applied file(s)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Seed ledger — mark current files applied WITHOUT running them
        if: inputs.mode == 'seed-ledger'
        run: |
          set -euo pipefail
          # One-time baseline for an existing DB: record every resolved file as
          # applied so a subsequent mode=apply migrations=all only runs NEW files.
          # Executes NO migration SQL.
          # Canonical shape (id / migration_name / applied_at, UNIQUE(migration_name)) —
          # matches the bootstrap step, migration 048, and the legacy table. A
          # no-op where the table already exists.
          psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=1 -c \
            "CREATE TABLE IF NOT EXISTS schema_migrations (id integer GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, migration_name varchar NOT NULL UNIQUE, applied_at timestamptz NOT NULL DEFAULT now());"
          echo "### Seeded ledger (no SQL executed)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          COUNT=0
          while IFS= read -r f; do
            base="$(basename "$f")"
            psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=1 -c \
              "INSERT INTO schema_migrations (migration_name) VALUES ('$base') ON CONFLICT (migration_name) DO NOTHING;"
            echo "- recorded: \`$base\`" >> "$GITHUB_STEP_SUMMARY"
            COUNT=$((COUNT+1))
          done < .migration_plan
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Recorded ${COUNT} file(s) as applied. Re-run with mode=apply migrations=all to apply only NEW files." >> "$GITHUB_STEP_SUMMARY"

      - name: Summarise plan
        if: inputs.mode != 'seed-ledger'
        run: |
          {
            echo "## Migration plan"
            echo ""
            echo "Mode: \`${{ inputs.mode }}\`"
            echo ""
            echo "DB host: \`${DB_HOST}\`"
            echo ""
            echo "Files (in apply order):"
            echo ""
            while IFS= read -r f; do
              SIZE=$(wc -c < "$f" | tr -d ' ')
              echo "- \`$f\` (${SIZE} bytes)"
            done < .migration_plan
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run — show statements only (no execution)
        if: inputs.mode == 'dry-run'
        run: |
          set -euo pipefail
          echo "### Dry-run: SQL preview" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r f; do
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### $f" >> "$GITHUB_STEP_SUMMARY"
            echo '```sql' >> "$GITHUB_STEP_SUMMARY"
            head -60 "$f" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done < .migration_plan
          echo ""
          echo "Dry-run complete. Re-run with mode=apply to execute against $DB_HOST."

      - name: Apply migrations (ON_ERROR_STOP=1, single transaction per file)
        if: inputs.mode == 'apply'
        run: |
          set -euo pipefail
          echo "### Apply results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Status | Duration |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|----------|" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r f; do
            echo "::group::Applying $f"
            START=$(date +%s)
            if psql "$DATABASE_URL" \
                 --single-transaction \
                 --set ON_ERROR_STOP=1 \
                 --no-psqlrc \
                 -v ECHO=errors \
                 -f "$f"; then
              END=$(date +%s)
              DUR=$((END-START))
              # Record in the ledger so a later 'all' run skips this file.
              psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=1 -c \
                "INSERT INTO schema_migrations (migration_name) VALUES ('$(basename "$f")') ON CONFLICT (migration_name) DO NOTHING;"
              echo "| \`$f\` | OK | ${DUR}s |" >> "$GITHUB_STEP_SUMMARY"
              echo "::endgroup::"
            else
              END=$(date +%s)
              DUR=$((END-START))
              echo "| \`$f\` | FAILED | ${DUR}s |" >> "$GITHUB_STEP_SUMMARY"
              echo "::endgroup::"
              echo "::error file=$f::psql failed on $f after ${DUR}s"
              exit 1
            fi
          done < .migration_plan

      - name: Verify schema (post-apply only)
        if: inputs.mode == 'apply'
        run: |
          set -euo pipefail
          # Build verification SQL from the actual declarations we extracted
          # from mira-hub/db/migrations/01[4-8]*.sql at workflow-write time.
          # Each row asserts an object exists; CASE labels what's missing so
          # the step summary is greppable.
          cat > /tmp/verify.sql <<'SQL'
          \echo === extensions ===
          SELECT extname FROM pg_extension WHERE extname IN ('ltree','btree_gist') ORDER BY extname;

          \echo === 014 — uns_slug function ===
          SELECT
            CASE WHEN to_regprocedure('public.uns_slug(text)') IS NOT NULL
                 THEN 'OK: uns_slug(text)'
                 ELSE 'MISSING: uns_slug(text)' END AS check_014;

          \echo === 015 — cmms_equipment.uns_path + indexes ===
          SELECT
            CASE WHEN EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_name='cmms_equipment' AND column_name='uns_path'
            ) THEN 'OK: cmms_equipment.uns_path'
              ELSE 'MISSING: cmms_equipment.uns_path' END AS col_015,
            CASE WHEN to_regclass('public.idx_cmms_equipment_uns_path') IS NOT NULL
                 THEN 'OK: idx_cmms_equipment_uns_path'
                 ELSE 'MISSING: idx_cmms_equipment_uns_path' END AS idx_015a,
            CASE WHEN to_regclass('public.idx_cmms_equipment_tenant_uns_path') IS NOT NULL
                 THEN 'OK: idx_cmms_equipment_tenant_uns_path'
                 ELSE 'MISSING: idx_cmms_equipment_tenant_uns_path' END AS idx_015b;

          \echo === 016 — component_templates + sources ===
          SELECT
            CASE WHEN to_regclass('public.component_templates') IS NOT NULL
                 THEN 'OK: component_templates'
                 ELSE 'MISSING: component_templates' END AS tbl_016a,
            CASE WHEN to_regclass('public.component_template_sources') IS NOT NULL
                 THEN 'OK: component_template_sources'
                 ELSE 'MISSING: component_template_sources' END AS tbl_016b;

          \echo === 017 — installed_component_instances ===
          SELECT
            CASE WHEN to_regclass('public.installed_component_instances') IS NOT NULL
                 THEN 'OK: installed_component_instances'
                 ELSE 'MISSING: installed_component_instances' END AS tbl_017;

          \echo === 018 — relationship_proposals + evidence ===
          SELECT
            CASE WHEN to_regclass('public.relationship_proposals') IS NOT NULL
                 THEN 'OK: relationship_proposals'
                 ELSE 'MISSING: relationship_proposals' END AS tbl_018a,
            CASE WHEN to_regclass('public.relationship_evidence') IS NOT NULL
                 THEN 'OK: relationship_evidence'
                 ELSE 'MISSING: relationship_evidence' END AS tbl_018b;
          SQL

          OUTPUT=$(psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=1 -f /tmp/verify.sql 2>&1)
          echo "$OUTPUT"
          {
            echo ""
            echo "### Verification"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if echo "$OUTPUT" | grep -q "MISSING:"; then
            echo "::error::Verification found missing schema objects after apply."
            exit 1
          fi

  backfill:
    name: Backfill UNS paths (${{ inputs.target }})
    needs: apply
    if: inputs.mode == 'apply' && inputs.run_backfill == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.target == 'prod' && 'production' || 'staging' }}
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install backfill dependencies
        run: |
          # Backfill scripts import the same deps as mira-hub workers.
          # Keep this list minimal — pin via requirements lookup once a
          # tools/requirements.txt exists; today they only need psycopg + httpx.
          # psycopg2-binary needed because tools/uns_backfill.py uses bare
          # postgresql:// URLs that SQLAlchemy resolves to the psycopg2 driver.
          python -m pip install --upgrade pip
          pip install 'psycopg2-binary>=2.9' 'psycopg[binary]>=3.1' httpx 'sqlalchemy>=2.0'

      - name: Run kg_entities backfill (tools/uns_backfill.py)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f tools/uns_backfill.py ]; then
            echo "::error::tools/uns_backfill.py missing — was PR #1245 reverted?"
            exit 1
          fi
          DOPPLER_CFG="${{ inputs.target == 'prod' && 'prd' || 'stg' }}"
          doppler run --project factorylm --config "${DOPPLER_CFG}" -- python tools/uns_backfill.py --commit

      - name: Run cmms_equipment backfill (tools/cmms_equipment_uns_backfill.py)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f tools/cmms_equipment_uns_backfill.py ]; then
            echo "::error::tools/cmms_equipment_uns_backfill.py missing — was PR #1245 reverted?"
            exit 1
          fi
          DOPPLER_CFG="${{ inputs.target == 'prod' && 'prd' || 'stg' }}"
          doppler run --project factorylm --config "${DOPPLER_CFG}" -- python tools/cmms_equipment_uns_backfill.py --commit
