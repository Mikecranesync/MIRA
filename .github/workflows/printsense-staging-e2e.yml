name: PrintSense E2E autopilot (staging)

# SELF-DRIVING live Telegram staging E2E for PR #2665.
#
# On a schedule (and on demand) it POLLS Doppler stg for TELEGRAM_TEST_SESSION. While
# that secret is absent it SKIPS CLEANLY (no failure) and retries next tick. Once the
# operator has created the session (one-time interactive login on their side), it:
#   1. checks out the PR branch (which carries the E2E code + the committed sha-pinned
#      corpus images, so no laptop and no external sync are needed),
#   2. installs tesseract (auto-rotate parity with prod) + deps,
#   3. runs the 7-check staging E2E against @Mira_stagong_bot via `doppler run`
#      (print routing, nameplate routing, plain-English reply, map reply, rotated image,
#       degraded image, zero confident misreads, protected safety/uncertainty footer),
#   4. uploads the Markdown/HTML report + preserved evidence,
#   5. posts the result to PR #2665,
#   6. MERGES #2665 only if the E2E passed AND every check on the PR is green.
#
# All credentials load from Doppler (factorylm/stg). The Telegram session is used only
# inside the Telethon client process — never echoed, never written to a log or artifact.
# This workflow deploys NOTHING and never touches production secrets.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/30 * * * *" # every 30 min — poll for the staging session, then self-complete
  release:
    types: [published]

concurrency:
  group: printsense-e2e-autopilot
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  PR_NUMBER: "2665"
  PR_BRANCH: "feat/printsense-test-harness"

jobs:
  autopilot:
    name: Live staging E2E → auto-merge #2665
    runs-on: ubuntu-latest
    environment: staging # inherits DOPPLER_TOKEN → factorylm/stg
    timeout-minutes: 35
    steps:
      - name: Guard — DOPPLER_TOKEN present
        id: doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "::notice::DOPPLER_TOKEN absent — skipping."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Doppler CLI
        if: steps.doppler.outputs.ok == 'true'
        uses: dopplerhq/cli-action@v4

      - name: Guard — PR still open AND session present
        id: guard
        if: steps.doppler.outputs.ok == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          state=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json state --jq .state 2>/dev/null || echo UNKNOWN)
          if [ "$state" != "OPEN" ]; then
            echo "::notice::PR #$PR_NUMBER is $state — nothing to do."
            echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Presence check only — the value is NEVER printed.
          if doppler secrets --project factorylm --config stg --only-names 2>/dev/null | tr ' \t' '\n\n' | grep -qx "TELEGRAM_TEST_SESSION"; then
            echo "::notice::TELEGRAM_TEST_SESSION present — running the live E2E."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::TELEGRAM_TEST_SESSION absent — skipping cleanly; will retry next schedule."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR branch (E2E code + committed corpus)
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ env.PR_BRANCH }}

      - uses: actions/setup-python@v6
        if: steps.guard.outputs.run == 'true'
        with:
          python-version: "3.12"

      - name: Install tesseract (auto-rotate parity) + deps
        if: steps.guard.outputs.run == 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr
          pip install pydantic pillow anthropic telethon pytesseract

      - name: Run the 7-check staging E2E + acceptance report
        id: e2e
        if: steps.guard.outputs.run == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          PRINT_VISION_PROVIDER: anthropic
          # ANTHROPIC_API_KEY + TELEGRAM_TEST_{API_ID,API_HASH,SESSION} come from
          # factorylm/stg via `doppler run` — used in-process only, never logged.
        run: doppler run -- python tools/printsense_acceptance.py

      - name: Upload report + preserved evidence
        if: always() && steps.guard.outputs.run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: printsense-e2e-report
          path: |
            printsense/benchmarks/_acceptance_out/
            printsense/benchmarks/_e2e_out/
          if-no-files-found: warn
          retention-days: 30

      - name: Post result to PR #2665
        if: always() && steps.guard.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          verdict="✅ live staging E2E PASSED"
          [ "${{ steps.e2e.outcome }}" = "success" ] || verdict="❌ live staging E2E FAILED"
          rpt="printsense/benchmarks/_acceptance_out/acceptance_report.md"
          {
            echo "## $verdict — @Mira_stagong_bot"
            echo
            if [ -f "$rpt" ]; then sed -n '1,120p' "$rpt"; else echo "_(no report file produced)_"; fi
            echo
            echo "_Full Markdown/HTML report + preserved evidence in this run's artifacts._"
          } > /tmp/e2e_comment.md
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file /tmp/e2e_comment.md

      - name: Merge #2665 — only if E2E green AND every check passes
        if: steps.e2e.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notpass=$(gh pr checks "$PR_NUMBER" --repo "${{ github.repository }}" 2>/dev/null \
            | awk -F'\t' '$2!="pass" && $2!="skipping"{print $1}')
          if [ -n "$notpass" ]; then
            echo "::warning::not merging — these checks are not green:"; echo "$notpass"
            exit 0
          fi
          # All checks green + E2E green. --admin only clears the (already-green) phantom
          # required check; every real gate is verified passing above.
          gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --squash --admin
          echo "::notice::merged PR #$PR_NUMBER (live E2E + all checks green)."

  ocr-lane-health:
    name: OCR-lane health probe (staging bot)
    # Reuses this workflow's existing schedule + workflow_dispatch triggers;
    # deliberately excluded from the release-published trigger (that one is
    # autopilot's own merge-on-publish path, unrelated to OCR-lane health).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: staging # inherits VPS_SSH_KEY (same secret as deploy-staging.yml)
    timeout-minutes: 5
    steps:
      - name: Guard — VPS_SSH_KEY present
        id: sshkey
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "::notice::VPS_SSH_KEY absent — skipping OCR-lane health probe."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      # Mirrors deploy-staging.yml:40-45 exactly (same secret, same keyscan
      # step) — this workflow has no ssh idiom of its own. See task-C2 brief
      # amendment C2a: the plan's "mirror this workflow's ssh idiom" premise
      # was wrong (this workflow is Doppler-token + Telethon, no ssh); the
      # repo's real ssh idiom lives in deploy-staging.yml and is mirrored here.
      - name: Set up SSH
        if: steps.sshkey.outputs.ok == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          # || true: keyscan failure must not red the job before the reachability
          # guard below gets to skip-with-warning; later ssh calls use
          # StrictHostKeyChecking=no, so known_hosts pre-population is best-effort.
          ssh-keyscan -H 165.245.138.91 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Guard — VPS reachable via ssh
        id: reach
        if: steps.sshkey.outputs.ok == 'true'
        run: |
          if ssh -i ~/.ssh/vps_deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o BatchMode=yes \
              root@165.245.138.91 "true" 2>/dev/null; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::VPS unreachable via ssh — skipping OCR-lane health probe (VPS reachability is the heartbeat monitor's job, not this probe's)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard — staging bot container running
        id: container
        if: steps.reach.outputs.ok == 'true'
        run: |
          if ssh -i ~/.ssh/vps_deploy_key -o StrictHostKeyChecking=no root@165.245.138.91 \
              "docker ps --filter name=stg-mira-bot-telegram --filter status=running --format '{{.Names}}'" \
              | grep -qx "stg-mira-bot-telegram"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::staging stack stopped — probe skipped."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      # Real name/shape verified against mira-bots/shared/workers/vision_worker.py
      # on this branch (task-C2 brief said to confirm before writing this):
      # ocr_lane_report() at line 302 returns {"verdict": "ok"|"DEGRADED"|"DEAD", ...}.
      # bot.py:55/145 already imports + calls it the same way at boot, so this
      # import path is proven inside this exact container image. WORKDIR is /app
      # (mira-bots/telegram/Dockerfile) with no compose-level working_dir override,
      # so `docker exec` already defaults there — `-w /app` is added anyway to be
      # explicit and immune to any future compose-level override.
      - name: OCR-lane health probe
        if: steps.container.outputs.ok == 'true'
        run: |
          ssh -i ~/.ssh/vps_deploy_key -o StrictHostKeyChecking=no root@165.245.138.91 'bash -s' << 'ENDSSH'
          set -euo pipefail
          docker exec -w /app stg-mira-bot-telegram python -c 'import json; from shared.workers.vision_worker import ocr_lane_report as r; rep = r(); print(json.dumps(rep)); raise SystemExit(0 if rep["verdict"] == "ok" else 1)'
          ENDSSH
