name: Dogfood Judge Heartbeat

# Monitor for the 4-hour dogfood judge (com.factorylm.dogfood-judge on Bravo).
# The judge posts each verdict to issue #2417 with a `<!-- dogfood-heartbeat -->`
# marker (tools/crew/dogfood/scheduled_run.sh). This workflow runs ON GitHub and
# reads ONLY that issue — no staging access — so a Bravo reboot can't kill it. It
# FAILS (which notifies the workflow's last editor) on either signal:
#   - STALE   → the newest verdict is too old = the Bravo routine has stopped.
#   - RED     → the judge found a customer-blocking failure (Phase 4 escalation).
# YELLOW (degraded, not blocking) does NOT fail. Phases 2 + 4 of
# docs/plans/2026-07-03-dogfood-routine-durability.md.

on:
  schedule:
    - cron: "30 */6 * * *" # every 6h at :30 UTC
  workflow_dispatch:

permissions:
  issues: read

jobs:
  freshness:
    name: Dogfood verdict freshness + RED escalation
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE: "2417"
      MAX_AGE_HOURS: "9" # 4h cadence → >9h means 2+ missed runs = broken
    steps:
      - name: Check newest dogfood verdict (freshness + RED)
        run: |
          set -euo pipefail
          latest="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/${ISSUE}/comments" \
            --jq 'map(select(.body | contains("<!-- dogfood-heartbeat -->"))) | max_by(.created_at) // {}')"
          created="$(printf '%s' "$latest" | jq -r '.created_at // ""')"
          body="$(printf '%s' "$latest" | jq -r '.body // ""')"
          if [ -z "$created" ]; then
            echo "::warning::No dogfood verdict posted to #${ISSUE} yet — the Bravo producer may not be live. Not failing."
            exit 0
          fi
          now=$(date -u +%s)
          posted=$(date -u -d "$created" +%s)
          age_h=$(( (now - posted) / 3600 ))
          verdict="$(printf '%s' "$body" | grep -oE 'Overall: (GREEN|YELLOW|RED)' | head -1 | awk '{print $2}')"
          echo "Newest dogfood verdict: ${verdict:-?}  posted ${created}  (age ${age_h}h, threshold ${MAX_AGE_HOURS}h)"

          fail=0
          if [ "$age_h" -gt "${MAX_AGE_HOURS}" ]; then
            echo "::error::STALE — newest verdict is ${age_h}h old (> ${MAX_AGE_HOURS}h). The Bravo 4h routine (com.factorylm.dogfood-judge) has likely stopped. Check: launchctl list | grep dogfood-judge"
            fail=1
          fi
          if [ "$verdict" = "RED" ]; then
            echo "::error::RED — the dogfood judge found a CUSTOMER-BLOCKING failure. See issue #${ISSUE} (newest comment) and the auto-filed dogfood issue. This pages a human."
            fail=1
          fi
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "OK — dogfood routine is alive and healthy (verdict ${verdict:-?}, ${age_h}h ago)."
