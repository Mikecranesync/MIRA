name: Apply approved_tags Seed

# Manually-triggered workflow to seed `approved_tags` for a UUID tenant on
# staging or prod NeonDB. Distinct from `apply-seeds.yml` which is
# knowledge_entries-only (TEXT tenant_id slug, KB-shaped pre-flight). This
# workflow handles the per-tenant SECURITY allowlist the mira-relay ingest
# endpoint enforces FAIL-CLOSED before persisting to tag_events +
# live_signal_cache. Without seeded rows, every HMAC-signed batch is rejected.
#
# Source: tools/seeds/approved_tags_*.sql (one file per asset family).
# Substitution: __TENANT_ID__ is replaced with the workflow's tenant_id input
# at apply time via sed (the SQL uses a sentinel string, not psql :variables,
# so the same file is portable across psql / direct usage / this workflow).
#
# Idempotent — files use ON CONFLICT … DO UPDATE.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'NeonDB target. staging = factorylm/stg, prod = factorylm/prd. Default staging — promote to prod only after staging is verified.'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod
      seed:
        description: 'Seed basename (without .sql) under tools/seeds/. Example: approved_tags_conveyor'
        required: true
        default: 'approved_tags_conveyor'
        type: string
      tenant_id:
        description: 'Tenant UUID (e.g. 78917b56-f85f-43bb-9a08-1bb98a6cd6c3). Must match approved_tags.tenant_id (UUID NOT NULL).'
        required: true
        type: string
      mode:
        description: 'dry-run = print plan + show row preview. apply = actually run.'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - apply

permissions:
  contents: read

concurrency:
  group: approved-tags-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply approved_tags (${{ inputs.target }} / ${{ inputs.mode }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.target == 'prod' && 'production' || 'staging' }}
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Install psql (postgresql-client-16 for ltree parity with Neon)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-16
          psql --version

      - name: Validate tenant_id is a UUID
        run: |
          set -euo pipefail
          TID='${{ inputs.tenant_id }}'
          if ! [[ "$TID" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$ ]]; then
            echo "::error::tenant_id is not a UUID: $TID"
            exit 1
          fi

      - name: Authenticate Doppler + resolve DATABASE_URL
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "::error::DOPPLER_TOKEN secret not set."
            exit 1
          fi
          case "${{ inputs.target }}" in
            staging) DOPPLER_CFG=stg ;;
            prod)    DOPPLER_CFG=prd ;;
            *) echo "::error::Unknown target ${{ inputs.target }}"; exit 1 ;;
          esac
          DATABASE_URL="$(doppler secrets get NEON_DATABASE_URL --project factorylm --config "${DOPPLER_CFG}" --plain)"
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::NEON_DATABASE_URL empty after Doppler fetch (factorylm/${DOPPLER_CFG})"
            exit 1
          fi
          echo "::add-mask::$DATABASE_URL"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"
          HOST=$(printf '%s' "$DATABASE_URL" | sed -E 's|.*@([^/:]+).*|\1|')
          echo "DB host: $HOST"
          echo "DB_HOST=$HOST" >> "$GITHUB_ENV"

      - name: Resolve seed file
        id: resolve
        run: |
          set -euo pipefail
          SEED_FILE="tools/seeds/${{ inputs.seed }}.sql"
          if [ ! -f "$SEED_FILE" ]; then
            echo "::error::Seed file not found: $SEED_FILE"
            exit 1
          fi
          # Substitute the __TENANT_ID__ sentinel with the input UUID.
          # The sed runs into a tempfile so the source SQL stays unchanged
          # and the workflow log can mask the resolved DSN without revealing
          # tenant identifiers in the file diff.
          RESOLVED="/tmp/resolved_seed.sql"
          sed "s/__TENANT_ID__/${{ inputs.tenant_id }}/g" "$SEED_FILE" > "$RESOLVED"
          echo "Seed:   $SEED_FILE"
          echo "Resolved: $RESOLVED ($(wc -l < "$RESOLVED") lines)"
          echo "SEED_FILE=$SEED_FILE" >> "$GITHUB_ENV"
          echo "RESOLVED=$RESOLVED" >> "$GITHUB_ENV"

      - name: Pre-flight — table presence + existing row count
        run: |
          set -euo pipefail
          cat > /tmp/preflight.sql <<SQL
          \echo === approved_tags schema check ===
          SELECT column_name, data_type, is_nullable
            FROM information_schema.columns
           WHERE table_name='approved_tags'
             AND column_name IN ('tenant_id','source_system','source_tag_path','normalized_tag_path','uns_path','enabled')
           ORDER BY ordinal_position;

          \echo === existing rows for tenant ===
          SELECT count(*) AS rows_for_tenant,
                 count(*) FILTER (WHERE enabled = true) AS enabled_rows
            FROM approved_tags
           WHERE tenant_id = '${{ inputs.tenant_id }}'::uuid;
          SQL
          psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=1 -f /tmp/preflight.sql 2>&1 | tee /tmp/preflight.out
          {
            echo "## Pre-flight"
            echo ""
            echo "DB host: \`${DB_HOST}\`"
            echo ""
            echo "Tenant: \`${{ inputs.tenant_id }}\`"
            echo ""
            echo '```'
            cat /tmp/preflight.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run — show resolved SQL preview only
        if: inputs.mode == 'dry-run'
        run: |
          set -euo pipefail
          {
            echo "### Dry-run: resolved SQL preview"
            echo ""
            echo '```sql'
            head -80 "$RESOLVED"
            echo "..."
            echo "($(wc -l < "$RESOLVED") total lines)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Dry-run complete. Re-run with mode=apply to execute against $DB_HOST."

      - name: Apply seed (single transaction, ON_ERROR_STOP=1)
        if: inputs.mode == 'apply'
        run: |
          set -euo pipefail
          START=$(date +%s)
          if psql "$DATABASE_URL" \
               --single-transaction \
               --set ON_ERROR_STOP=1 \
               --no-psqlrc \
               -v ECHO=errors \
               -f "$RESOLVED"; then
            DUR=$(( $(date +%s) - START ))
            {
              echo ""
              echo "### Apply result"
              echo ""
              echo "| File | Status | Duration |"
              echo "|------|--------|----------|"
              echo "| \`$SEED_FILE\` | OK | ${DUR}s |"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error file=$SEED_FILE::psql failed"
            exit 1
          fi

      - name: Post-apply row counts (proof)
        if: inputs.mode == 'apply'
        run: |
          set -euo pipefail
          cat > /tmp/postcheck.sql <<SQL
          \echo === approved_tags rows for tenant ===
          SELECT count(*) AS total,
                 count(*) FILTER (WHERE enabled = true) AS enabled_rows
            FROM approved_tags
           WHERE tenant_id = '${{ inputs.tenant_id }}'::uuid;

          \echo === sample (5 rows) ===
          SELECT source_system, source_tag_path, normalized_tag_path, uns_path::text, enabled
            FROM approved_tags
           WHERE tenant_id = '${{ inputs.tenant_id }}'::uuid
           ORDER BY updated_at DESC
           LIMIT 5;
          SQL
          psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=1 -f /tmp/postcheck.sql 2>&1 | tee /tmp/postcheck.out
          {
            echo ""
            echo "### Post-apply row counts"
            echo ""
            echo '```'
            cat /tmp/postcheck.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
