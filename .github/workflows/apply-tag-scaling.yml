name: Apply tag_entities Scaling Seed

# Manually-triggered workflow to seed `tag_entities.scaling` (+ units) for a
# UUID tenant on staging or prod NeonDB. Sibling of apply-approved-tags.yml
# (which seeds the relay allowlist `approved_tags`); this one activates the
# Ignition-wire analog assessment card (Drive Commander scaling contract,
# PR #2487) by writing the explicit per-tag scaling `ignition_chat.py` reads.
#
# Source: tools/seeds/tag_scaling_*.sql (one file per drive/asset).
# Substitution: __TENANT_ID__ → the workflow's tenant_id input via sed
# (the SQL uses a sentinel string, portable across psql / direct usage / CI).
#
# Idempotent — the seed UPDATEs by source_address first, INSERTs only if absent.
#
# READ-ONLY pre-flight: the "existing rows for tenant" step doubles as the
# sanctioned way to inspect current tag_entities state before any write
# (run mode=dry-run to read without applying).

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'NeonDB target. staging = factorylm/stg, prod = factorylm/prd. Default staging — promote to prod only after staging is verified.'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod
      seed:
        description: 'Seed basename (without .sql) under tools/seeds/. Example: tag_scaling_gs10'
        required: true
        default: 'tag_scaling_gs10'
        type: string
      tenant_id:
        description: 'Tenant UUID (bench = e88bd0e8-8a84-4e30-9803-c0dc6efb07fe). Must match tag_entities.tenant_id (UUID NOT NULL).'
        required: true
        type: string
      mode:
        description: 'dry-run = print plan + read existing rows (no write). apply = actually run.'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - apply

permissions:
  contents: read

concurrency:
  group: tag-scaling-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply tag_scaling (${{ inputs.target }} / ${{ inputs.mode }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.target == 'prod' && 'production' || 'staging' }}
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Install psql (postgresql-client-16 for ltree/jsonb parity with Neon)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-16
          psql --version

      - name: Validate tenant_id is a UUID
        run: |
          set -euo pipefail
          TID='${{ inputs.tenant_id }}'
          if ! [[ "$TID" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$ ]]; then
            echo "::error::tenant_id is not a UUID: $TID"
            exit 1
          fi

      - name: Authenticate Doppler + resolve DATABASE_URL
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "::error::DOPPLER_TOKEN secret not set."
            exit 1
          fi
          case "${{ inputs.target }}" in
            staging) DOPPLER_CFG=stg ;;
            prod)    DOPPLER_CFG=prd ;;
            *) echo "::error::Unknown target ${{ inputs.target }}"; exit 1 ;;
          esac
          DATABASE_URL="$(doppler secrets get NEON_DATABASE_URL --project factorylm --config "${DOPPLER_CFG}" --plain)"
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::NEON_DATABASE_URL empty after Doppler fetch (factorylm/${DOPPLER_CFG})"
            exit 1
          fi
          echo "::add-mask::$DATABASE_URL"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"
          HOST=$(printf '%s' "$DATABASE_URL" | sed -E 's|.*@([^/:]+).*|\1|')
          echo "DB host: $HOST"
          echo "DB_HOST=$HOST" >> "$GITHUB_ENV"

      - name: Resolve seed file
        run: |
          set -euo pipefail
          SEED_FILE="tools/seeds/${{ inputs.seed }}.sql"
          if [ ! -f "$SEED_FILE" ]; then
            echo "::error::Seed file not found: $SEED_FILE"
            exit 1
          fi
          RESOLVED="/tmp/resolved_seed.sql"
          sed "s/__TENANT_ID__/${{ inputs.tenant_id }}/g" "$SEED_FILE" > "$RESOLVED"
          echo "Seed:     $SEED_FILE"
          echo "Resolved: $RESOLVED ($(wc -l < "$RESOLVED") lines)"
          echo "SEED_FILE=$SEED_FILE" >> "$GITHUB_ENV"
          echo "RESOLVED=$RESOLVED" >> "$GITHUB_ENV"

      - name: Pre-flight — schema + existing tag_entities rows (READ-ONLY)
        run: |
          set -euo pipefail
          cat > /tmp/preflight.sql <<SQL
          \echo === tag_entities scaling/units columns present? ===
          SELECT column_name, data_type, is_nullable
            FROM information_schema.columns
           WHERE table_name='tag_entities'
             AND column_name IN ('tenant_id','uns_path','symbolic_name','data_type','source_kind','source_address','units','scaling','approval_state')
           ORDER BY ordinal_position;

          \echo === existing VFD rows for tenant (does a verified row already exist to UPDATE?) ===
          SELECT source_address, uns_path::text AS uns_path, data_type, source_kind,
                 units, scaling::text AS scaling, approval_state
            FROM tag_entities
           WHERE tenant_id = '${{ inputs.tenant_id }}'::uuid
             AND source_address LIKE '%MIRA_IOCheck/VFD/%'
           ORDER BY source_address;
          SQL
          psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=1 -f /tmp/preflight.sql 2>&1 | tee /tmp/preflight.out
          {
            echo "## Pre-flight (READ-ONLY)"
            echo ""
            echo "DB host: \`${DB_HOST}\`   Tenant: \`${{ inputs.tenant_id }}\`"
            echo ""
            echo '```'
            cat /tmp/preflight.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run — show resolved SQL preview only (no write)
        if: inputs.mode == 'dry-run'
        run: |
          set -euo pipefail
          {
            echo "### Dry-run: resolved SQL preview"
            echo ""
            echo '```sql'
            cat "$RESOLVED"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Dry-run complete. Re-run with mode=apply to execute against $DB_HOST."

      - name: Apply seed (single transaction, ON_ERROR_STOP=1)
        if: inputs.mode == 'apply'
        run: |
          set -euo pipefail
          START=$(date +%s)
          if psql "$DATABASE_URL" \
               --single-transaction \
               --set ON_ERROR_STOP=1 \
               --no-psqlrc \
               -v ECHO=errors \
               -f "$RESOLVED"; then
            DUR=$(( $(date +%s) - START ))
            {
              echo ""
              echo "### Apply result"
              echo ""
              echo "| File | Status | Duration |"
              echo "|------|--------|----------|"
              echo "| \`$SEED_FILE\` | OK | ${DUR}s |"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error file=$SEED_FILE::psql failed"
            exit 1
          fi

      - name: Post-apply proof — the seeded row now carries scaling + verified
        if: inputs.mode == 'apply'
        run: |
          set -euo pipefail
          cat > /tmp/postcheck.sql <<SQL
          \echo === seeded DC-bus row (must show scaling + units=V + verified) ===
          SELECT source_address, uns_path::text AS uns_path, units,
                 scaling::text AS scaling, approval_state, updated_at
            FROM tag_entities
           WHERE tenant_id = '${{ inputs.tenant_id }}'::uuid
             AND source_address = '[default]MIRA_IOCheck/VFD/vfd_dc_bus';
          SQL
          psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=1 -f /tmp/postcheck.sql 2>&1 | tee /tmp/postcheck.out
          {
            echo ""
            echo "### Post-apply proof"
            echo ""
            echo '```'
            cat /tmp/postcheck.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
