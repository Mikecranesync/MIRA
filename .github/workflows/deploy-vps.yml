name: Deploy to VPS

# Deploy gate (2026-05-18, see docs/specs/staging-environment-spec.md):
#   This workflow refuses to deploy unless the most-recent "Staging Gate" run
#   on the same commit succeeded. Staging Gate runs on every PR to main against
#   the NeonDB staging branch — by the time code lands on main, it has been
#   graded by the rubric in docs/specs/mira-answer-quality-standard.md.
#   `workflow_dispatch` hotfixes bypass the check (set inputs.skip_staging_gate=true).

on:
  # Triggered by smoke-test.yml completing on main — only deploys when smoke passes.
  # Push → smoke-test.yml → deploy-vps.yml (also gated by Staging Gate verification).
  workflow_run:
    workflows: ["Smoke Test"]
    types: [completed]
    branches: [main]

  # Manual deploy bypass — for hotfixes when you need to deploy without
  # waiting for smoke. Still runs health checks post-deploy.
  workflow_dispatch:
    inputs:
      services:
        description: "Space-separated services to rebuild (leave blank for all)"
        required: false
        default: ""
      skip_staging_gate:
        description: "Skip staging-gate verification (hotfix only — REQUIRES skip_reason)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_reason:
        description: "Why is the staging gate being skipped? (Required when skip_staging_gate=true; auto-opens an audit issue)"
        required: false
        default: ""

concurrency:
  group: deploy-vps
  cancel-in-progress: false  # never cancel a running deploy

jobs:
  deploy:
    name: Deploy MIRA to production VPS
    # For workflow_run triggers: only deploy when the smoke test passed.
    # For workflow_dispatch (manual hotfix): always run.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      # When the operator dispatches with skip_staging_gate=true, the gate
      # verification is bypassed. CLAUDE.md says "file a follow-up PR within
      # 24h" but nothing enforced it — silent bypasses leaked the rule. Now:
      #   1. skip_reason is required (else this step fails the deploy upfront)
      #   2. an audit issue is auto-opened so the bypass is loud, not silent
      #   3. the issue carries the actor, SHA, services, reason, run URL,
      #      and the 24-hour follow-up-PR expectation
      - name: Validate + audit staging-gate bypass
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.skip_staging_gate == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          SERVICES: ${{ github.event.inputs.services }}
          REASON: ${{ github.event.inputs.skip_reason }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${REASON// /}" ]; then
            echo "::error::skip_staging_gate=true requires a non-empty skip_reason. Re-dispatch with a reason (e.g., 'hotfix: prod login broken, sev-1 incident #N')."
            exit 1
          fi
          SERVICES_DISPLAY="${SERVICES:-(all)}"
          SHORT_SHA="${SHA:0:8}"
          {
            echo "## staging-gate bypass — audit record"
            echo ""
            echo "A production deploy was triggered with \`skip_staging_gate=true\`."
            echo "The Staging Gate was NOT verified for the commit being shipped."
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Actor | @${ACTOR} |"
            echo "| SHA | \`${SHA}\` |"
            echo "| Services | \`${SERVICES_DISPLAY}\` |"
            echo "| Reason | ${REASON} |"
            echo "| Run | [${RUN_URL}](${RUN_URL}) |"
            echo ""
            echo "### 24-hour follow-up — required (per CLAUDE.md)"
            echo ""
            echo "- [ ] Open a normal PR that applies the same fix and lands via the Staging Gate. Reference this issue in the PR description."
            echo "- [ ] Close this issue once the follow-up PR has merged green through the Staging Gate."
            echo ""
            echo "If the bypass hid a real regression, escalate immediately and open a SEV ticket."
            echo ""
            echo "---"
            echo ""
            echo "_Auto-filed by \`.github/workflows/deploy-vps.yml\` (R8, staging-gate architectural review 2026-05-31). The title carries the short SHA for cross-referencing._"
          } > bypass_issue_body.md
          # Non-fatal: an audit-log failure must NOT block a production hotfix.
          # The GITHUB_TOKEN may lack issues:write (GraphQL "Resource not accessible
          # by integration") — in that case warn + record the reason in the run log,
          # and let the deploy proceed. (Prod incident 2026-06-02: this createIssue
          # error aborted every hotfix deploy while prod chat was down.)
          gh issue create \
            --repo "$REPO" \
            --title "staging-gate bypass: deploy by @${ACTOR} at ${SHORT_SHA}" \
            --body-file bypass_issue_body.md \
            || echo "::warning::Could not auto-open the staging-gate-bypass audit issue (token may lack issues:write). Deploy continues — record the bypass manually. Reason: ${REASON}"

      - name: Verify Staging Gate passed
        # Refuse to deploy a commit that hasn't been graded by the staging gate.
        # This repo uses squash-merge, so the SHA on main is a NEW commit that
        # no PR workflow ever ran on. We resolve the squashed merge commit
        # back to its source PR, then check Staging Gate against the PR head.
        # On workflow_dispatch, the operator may set skip_staging_gate=true.
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.skip_staging_gate != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On workflow_run, the head_sha is the commit that landed on main.
          # On manual dispatch (without skip), use the checked-out HEAD.
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Resolving PR head for merge commit $DEPLOY_SHA"
          # /commits/{sha}/pulls returns PRs that this commit was the merge of.
          PR_HEAD_SHA=$(gh api "/repos/$REPO/commits/$DEPLOY_SHA/pulls" \
            --jq '[.[] | select(.merge_commit_sha == "'"$DEPLOY_SHA"'") | .head.sha] | first // empty' 2>/dev/null || echo "")
          if [ -z "$PR_HEAD_SHA" ]; then
            # Fallback: any PR associated with this commit (covers rebase-merge
            # corner cases where merge_commit_sha doesn't exactly match).
            PR_HEAD_SHA=$(gh api "/repos/$REPO/commits/$DEPLOY_SHA/pulls" \
              --jq '.[0].head.sha // empty' 2>/dev/null || echo "")
          fi
          if [ -z "$PR_HEAD_SHA" ]; then
            echo "::error::No PR associated with $DEPLOY_SHA. Direct pushes to main are not allowed to deploy. Open a PR (which will run Staging Gate), or use workflow_dispatch with skip_staging_gate=true for verified hotfixes."
            exit 1
          fi
          echo "PR head SHA: $PR_HEAD_SHA"
          STATUS=$(gh run list \
            --repo "$REPO" \
            --workflow "Staging Gate" \
            --commit "$PR_HEAD_SHA" \
            --limit 1 \
            --json status,conclusion \
            --jq '.[0] | "\(.status):\(.conclusion)"' 2>/dev/null || echo "")
          echo "Most recent Staging Gate run on $PR_HEAD_SHA: $STATUS"
          case "$STATUS" in
            completed:success)
              echo "✓ staging gate passed — proceeding with deploy"
              ;;
            "")
              echo "::error::No Staging Gate run found for PR head $PR_HEAD_SHA. Re-run the gate (gh workflow run staging-gate.yml) or use workflow_dispatch with skip_staging_gate=true for verified hotfixes."
              exit 1
              ;;
            *)
              echo "::error::Staging Gate did not pass for PR head $PR_HEAD_SHA (status=$STATUS). Aborting deploy."
              exit 1
              ;;
          esac

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          ssh-keyscan -H 165.245.138.91 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        env:
          SERVICES: ${{ github.event.inputs.services }}
        run: |
          ssh -i ~/.ssh/vps_deploy_key -o StrictHostKeyChecking=no \
            root@165.245.138.91 "SERVICES='$SERVICES' bash -s" << 'ENDSSH'

          set -euo pipefail
          cd /opt/mira

          # Signal "deploy in progress" so the heartbeat + self-healer crons stand
          # down instead of racing this deploy's container recreate and firing
          # false 502/container-missing escalations every 15 min (incident
          # 2026-07-08). Removed on exit (success OR failure) via trap; the healer
          # also ages out a stale sentinel after 30 min in case this trap is missed.
          touch /opt/mira/.deploy-in-progress
          trap 'rm -f /opt/mira/.deploy-in-progress' EXIT

          echo "=== Pull latest code (pin to release tag, not main HEAD) ==="
          # Rollback target is only real if prod references a tag, not a moving main HEAD
          # (docs/versioning.md). version-tag.yml lays vX.Y.Z on every merge commit, so we
          # deploy that tag — prod's `git describe` then shows a clean release ref.
          git fetch origin main --tags --force
          RELEASE_TAG="$(git tag --points-at origin/main --list 'v[0-9]*' | sort -V | tail -1)"
          if [ -n "$RELEASE_TAG" ]; then
            echo "Deploying release tag $RELEASE_TAG (= origin/main HEAD)"
            git -c advice.detachedHead=false checkout --force "$RELEASE_TAG"
          else
            echo "::warning::No vX.Y.Z tag at origin/main HEAD (version-tag.yml may be lagging) — falling back to origin/main"
            git reset --hard origin/main
          fi

          echo "=== Host permission setup (chown saas data dirs to UID 1001) ==="
          # PR #1219 dropped root in mira-pipeline/mira-mcp/mira-ingest Dockerfiles.
          # Host bind-mounts must match or containers crash-loop on SQLite WAL.
          # Script is idempotent — safe on every deploy. See incident 2026-05-15.
          bash scripts/host_perm_setup.sh

          echo "=== Reinstall agent crontab (keep host crons in sync with repo) ==="
          # The crontab is a deployed artifact like everything else: install_crons.sh
          # is the source of truth for every agent schedule (and, since 2026-07-08, the
          # -e TELEGRAM_ALERT_* forwards that route the 3 container agents' ops traffic
          # to the alert bot instead of @FactoryLM_Diagnose). Without this step the
          # crontab silently drifts from the repo and every cron change needs a manual
          # SSH. Idempotent — replaces the full crontab cleanly. Non-fatal: a cron
          # hiccup must not block the service deploy (container rebuild is the critical
          # path), so warn-don't-fail, mirroring the hub health check below.
          bash scripts/install_crons.sh \
            || echo "::warning::install_crons.sh failed — host crontab may be stale; re-run manually: ssh root@165.245.138.91 'cd /opt/mira && bash scripts/install_crons.sh'"

          # Resolve the rebuild list once so cleanup + build + up all agree.
          # mira-ask added 2026-06-06 (closes ops gap surfaced by AskMira P0 fix
          # cycle — engine changes shipped to telegram/slack but mira-ask-saas
          # stayed on the old image because it was missing from this default
          # list). See docs/runbooks/kiosk-askmira-deploy-and-verify.md.
          # mira-web added 2026-07-04 - no stated exclusion rationale existed
          # (docs/known-issues.md); marketing-site PRs silently did not auto-deploy.
          TARGETS="${SERVICES:-mira-pipeline mira-ingest mira-mcp mira-hub mira-web mira-cmms-sync mira-bot-telegram mira-bot-slack mira-ask}"
          echo "Rebuild targets: $TARGETS"

          echo "=== Pre-deploy cleanup: remove any stale containers blocking recreate ==="
          # `docker compose up --force-recreate` only removes containers it considers part
          # of the project; if a previous deploy left a same-named container that compose
          # has lost track of, we hit `Error: container name already in use` and the deploy
          # bails out (exact failure mode of run 25264673954, 2026-05-02).
          for svc in $TARGETS; do
            # container_name in saas.yml is sometimes bare (mira-hub,
            # mira-bot-telegram), sometimes -saas suffixed. Try both.
            docker rm -f "${svc}-saas" 2>/dev/null || true
            docker rm -f "${svc}" 2>/dev/null || true
          done

          # Deploy identity (#2226) — bake the SHA/version/time into the hub image
          # so /api/version + /api/health report which code is live. Exported here
          # so docker-compose build.args pick them up; default "unknown" otherwise.
          export MIRA_GIT_SHA="${GITHUB_SHA:-$(git rev-parse HEAD 2>/dev/null || echo unknown)}"
          export MIRA_APP_VERSION="$(cat VERSION 2>/dev/null | tr -d '[:space:]' || echo unknown)"
          export MIRA_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Deploy identity: sha=${MIRA_GIT_SHA} version=${MIRA_APP_VERSION} built=${MIRA_BUILD_TIME}"

          echo "=== Rebuild containers ==="
          DOCKER_BUILDKIT=1 doppler run --project factorylm --config prd -- docker compose -f docker-compose.saas.yml build $TARGETS
          doppler run --project factorylm --config prd -- docker compose -f docker-compose.saas.yml up -d --no-deps --force-recreate $TARGETS

          echo "=== Health check ==="
          sleep 8
          STATUS=$(curl -sf http://localhost:9099/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unreachable")
          echo "mira-pipeline health: $STATUS"
          if [ "$STATUS" != "ok" ]; then
            echo "WARNING: health check returned $STATUS — check container logs"
            doppler run --project factorylm --config prd -- docker compose -f docker-compose.saas.yml logs --tail=20 mira-pipeline
            exit 1
          fi

          echo "=== mira-hub health check ==="
          # Try empty-basePath path first (current Phase 2 deployment), fall back to /hub
          # path so the check survives a future re-cutover. Mirrors the Dockerfile
          # HEALTHCHECK fallback pattern. Closes #928.
          HUB_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:3101/api/health \
            || curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:3101/hub/api/health \
            || echo "unreachable")
          echo "mira-hub health: $HUB_STATUS"
          if [ "$HUB_STATUS" != "200" ]; then
            echo "WARNING: mira-hub health returned $HUB_STATUS — check container logs"
            doppler run --project factorylm --config prd -- docker compose -f docker-compose.saas.yml logs --tail=20 mira-hub
            # Don't fail the whole deploy on hub health alone — pipeline is the critical path
          fi

          echo "=== Deploy complete ==="
          doppler run --project factorylm --config prd -- docker compose -f docker-compose.saas.yml ps --format "table {{.Name}}\t{{.Status}}"
          ENDSSH

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::VPS deploy failed — check logs above. SSH to 165.245.138.91 and run:"
          echo "::error::  cd /opt/mira && doppler run --project factorylm --config prd -- docker compose -f docker-compose.saas.yml logs --tail=50"
