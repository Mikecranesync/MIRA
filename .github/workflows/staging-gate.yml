name: Staging Gate

# Real-data E2E gate — instantiates Supervisor in-process against the NeonDB
# staging branch, runs 10 questions through the Groq cascade, and grades the
# replies on the 5-dimension rubric from
# docs/specs/mira-answer-quality-standard.md.
#
# Companion to `deepeval-ci.yml` (offline, no DB) — staging is the layer that
# catches BM25/retrieval/cascade regressions DeepEval can't see.
#
# Design:  docs/specs/staging-environment-spec.md
# Runbook: docs/runbooks/staging-environment.md

on:
  # Runs on every PR to main — NO trigger-level path filter (on purpose). The
  # deploy-vps.yml gate verifies this workflow succeeded on the PR head SHA
  # before deploying, so the run must always FIRE and report a conclusion; a
  # `paths:` filter would skip the whole workflow and break that contract.
  # Instead, the "Scope check" step below decides whether to RUN the engine
  # eval: for non-runtime-only PRs (docs/CI/wiki/.claude) or Dependabot bumps
  # it skips the eval and the job still exits success (#1680). So the required
  # check stays green + the deploy contract holds, without a flaky engine eval
  # blocking unrelated PRs.
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: staging-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Required for the sticky-pull-request-comment action to post / update
  # the rubric comment on the PR. The default repository GITHUB_TOKEN is
  # read-only on this repo, so the permission must be granted per-workflow.
  pull-requests: write
  # Read Migration Verify's run status on the same SHA so the gate can order
  # itself AFTER migrations (P3-3 — avoid grading a pre-migration schema).
  actions: read

jobs:
  staging-gate:
    # Short, stable job name — branch-protection required-check is composed
    # as "<workflow-name> / <job-name>" = "Staging Gate / staging-gate".
    name: staging-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Ollama sidecar — provides the nomic-embed-text embeddings the engine's
    # vector-recall stage needs. Without this, every retrieval-dependent
    # question logs `Ollama embed failed on all candidates`, the run hits
    # tools/staging_test.py's harness-degraded guard (>50% skipped), and the
    # gate fails closed. With the sidecar in place all 15 questions can
    # score. See audit doc Option A (R5 follow-up, issue #1616).
    services:
      ollama:
        image: ollama/ollama:0.4.1
        ports:
          - 11434:11434

    # Secrets required (set under repo "staging" environment):
    #   NEON_STG_DATABASE_URL    — connection string to the NeonDB staging branch
    #   STAGING_TENANT_ID        — UUID for kg_entities.tenant_id (fail-closed if unset; see R4)
    #   STAGING_GROQ_API_KEY     — Groq key (rate-limit isolated from prod)
    #   STAGING_CEREBRAS_API_KEY — used by BOTH the engine cascade (answering)
    #                              and the judge cascade (scoring), as fallback
    #                              for Groq under outage / 429 / 5xx
    #   STAGING_GEMINI_API_KEY   — second fallback for the same two cascades
    # The engine cascade lives in mira-bots/shared/inference/router.py and
    # answers the technician's question. The judge cascade lives in
    # tools/staging_test.py and grades the resulting reply on the 5-dim
    # rubric. Both layers fall through Groq → Cerebras → Gemini; a Groq
    # outage no longer halts the gate (see R2).
    environment: staging

    steps:
      - uses: actions/checkout@v7

      # Scope check (#1680): the engine eval only catches diagnostic/retrieval/
      # cascade regressions, so it adds no signal for docs-only / CI-only /
      # non-runtime PRs — yet it's the only required check, and it's flaky
      # (LLM-graded), so it was blocking unrelated PRs. Skip the eval (report
      # success) when a PR touches ONLY non-runtime paths, OR is a Dependabot
      # bump. The job still exits `completed:success`, so deploy-vps.yml's
      # "a Staging Gate passed for this SHA" contract holds (same mechanism the
      # Dependabot skip already relied on). Default is RUN — skip only when the
      # PR is provably non-runtime-only.
      - name: Scope check (skip eval for non-runtime / Dependabot PRs)
        id: scope
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_eval=true
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            run_eval=false
            echo "Dependabot PR — staging-gate eval skipped (offline deepeval + CI cover the bump)."
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            files="$(gh pr view "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --json files -q '.files[].path')"
            runtime=false
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              case "$f" in
                docs/*|wiki/*|*.md|.github/*|.claude/*) : ;;   # non-runtime — ignore
                *) runtime=true; break ;;                       # any other path -> run the gate
              esac
            done <<< "$files"
            if [ "$runtime" = false ]; then
              run_eval=false
              echo "Non-runtime-only PR (docs/CI/wiki/.claude) — staging-gate eval skipped, reporting success (#1680)."
            fi
          fi
          echo "run_eval=$run_eval" >> "$GITHUB_OUTPUT"
          echo "run_eval=$run_eval"

      # Dependabot PRs cannot access GitHub environment secrets (security
      # default — only `dependabot` secrets are exposed). That makes
      # NEON_STG_DATABASE_URL / STAGING_GROQ_API_KEY empty, the engine
      # boot fails with "missing env var NEON_DATABASE_URL", the job
      # reports failure, and deploy-vps.yml then refuses to deploy the
      # squashed merge commit because the PR head Staging Gate didn't
      # pass. Dependency bumps are graded by `deepeval-ci.yml` (offline)
      # and `ci.yml` (lint + unit tests); a real-data gate against the
      # NeonDB staging branch adds no signal we can act on for a
      # version bump. Skip the gate for these PRs so the workflow exits
      # `completed:success` and the merge can deploy.
      - name: Skip notice (Dependabot PR)
        if: github.actor == 'dependabot[bot]'
        run: |
          echo "Dependabot PR detected (actor=${{ github.actor }})."
          echo "Staging Gate skipped — Dependabot cannot access the 'staging'"
          echo "environment secrets, and the offline deepeval suite + CI gate"
          echo "the dependency-bump risk. Job will exit success so deploy-vps"
          echo "can deploy the squashed merge commit on main."

      - uses: actions/setup-python@v6
        if: steps.scope.outputs.run_eval == 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mira-bots/telegram/requirements.txt

      - name: Install engine dependencies
        if: steps.scope.outputs.run_eval == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r mira-bots/telegram/requirements.txt

      - name: Wait for Ollama and pre-pull embed model
        if: steps.scope.outputs.run_eval == 'true'
        run: |
          set -euo pipefail
          # Service container starts in parallel with steps; poll until ready.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags >/dev/null; then
              echo "ollama up after ${i}s"
              break
            fi
            sleep 2
          done
          # Pre-pull the embed model so the first vector query doesn't time
          # out on a cold download. nomic-embed-text matches the engine's
          # default (rag_worker.py:EMBED_TEXT_MODEL) and the 768-dim shape
          # of the staging NeonDB embedding column.
          curl -sf -X POST http://localhost:11434/api/pull \
            -d '{"name":"nomic-embed-text:latest","stream":false}' \
            -o /tmp/ollama-pull.json
          # Sanity-check that the model is now resident.
          curl -sf http://localhost:11434/api/tags | grep -q nomic-embed-text

      - name: Order after Migration Verify (avoid grading pre-migration schema, P3-3)
        if: steps.scope.outputs.run_eval == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA="${{ github.event.pull_request.head.sha }}"
          # Migration Verify only runs when migration files change (its own
          # paths: filter). If this PR didn't touch them, there's nothing to
          # order against — proceed immediately.
          files="$(gh pr view "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --json files -q '.files[].path' || true)"
          if ! printf '%s\n' "$files" | grep -q '^mira-hub/db/migrations/'; then
            echo "No migration files changed — staging-gate proceeds without waiting."
            exit 0
          fi
          echo "Migration files changed — waiting for 'Migration Verify' on $SHA so the gate grades the POST-migration schema."
          for i in $(seq 1 72); do   # up to ~12 min (job timeout is 20)
            line="$(gh api "repos/${{ github.repository }}/actions/workflows/migration-verify.yml/runs?head_sha=$SHA&event=pull_request" \
                      -q '.workflow_runs[0] | "\(.status) \(.conclusion)"' 2>/dev/null || true)"
            if [ -z "$line" ] || [ "$line" = "null null" ]; then
              echo "  ($i) migration-verify run not visible yet…"; sleep 10; continue
            fi
            status="${line%% *}"; concl="${line##* }"
            echo "  ($i) migration-verify: status=$status conclusion=$concl"
            if [ "$status" = "completed" ]; then
              if [ "$concl" = "success" ]; then
                echo "Migration Verify succeeded — schema is current. Proceeding."; exit 0
              fi
              echo "::error::Migration Verify concluded '$concl' — refusing to grade a bad/incomplete schema."; exit 1
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for Migration Verify on $SHA"; exit 1

      - name: Run staging gate
        if: steps.scope.outputs.run_eval == 'true'
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_STG_DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.STAGING_GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.STAGING_CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.STAGING_GEMINI_API_KEY }}
          INFERENCE_BACKEND: cloud
          # tenant_id must be a real UUID — `kg_entities.tenant_id` is a uuid
          # column; passing the literal string "staging" trips a Postgres cast
          # error that disables BM25 for every question. The value is stored
          # as the STAGING_TENANT_ID secret on the `staging` environment so
          # the prod tenant UUID is not baked into the public workflow file.
          # If unset, `tools/staging_test.py` fails closed (exit 2) before any
          # DB write — a missing secret cannot silently target the prod tenant.
          MIRA_TENANT_ID: ${{ secrets.STAGING_TENANT_ID }}
          # `mira-bots/shared/chat_tenant.py` reads MIRA_DB_PATH at module
          # import time and opens a SQLite file. The default `/data/mira.db`
          # does not exist on ubuntu-latest; point it at the runner temp dir.
          MIRA_DB_PATH: ${{ runner.temp }}/mira-stg.db
          KNOWLEDGE_COLLECTION_ID: staging-dummy
          OPENWEBUI_BASE_URL: http://localhost:11434
          # Point the engine's vector-recall stage at the ollama service
          # container exposed on localhost:11434. Without this override the
          # engine tries `host.docker.internal` first (Docker-host default),
          # logs a failed candidate, then falls back to localhost — same
          # endpoint but with a noisy warning. Setting explicitly skips the
          # bad first attempt.
          OLLAMA_BASE_URL: http://localhost:11434
          MCP_BASE_URL: http://localhost:1
          QUALITY_GATE_ENABLED: "1"
          QUALITY_GATE_JUDGE: "0"
        run: |
          # Retry the flaky LLM/retrieval-graded eval once before failing (#1680).
          for attempt in 1 2; do
            if python tools/staging_test.py; then exit 0; fi
            echo "::warning::staging gate attempt ${attempt} failed (flaky LLM grading); retrying in 5s..."
            sleep 5
          done
          echo "::error::staging gate failed after 2 attempts"
          exit 1

      - name: Upload results artifact
        if: always() && steps.scope.outputs.run_eval == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: staging-results-${{ github.run_number }}
          path: tools/staging_results.json
          retention-days: 30

      - name: Render PR comment
        if: always() && github.event_name == 'pull_request' && steps.scope.outputs.run_eval == 'true'
        run: |
          python tools/staging_render_comment.py \
            --in tools/staging_results.json \
            --out staging_comment.md \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Post / update PR comment
        if: always() && github.event_name == 'pull_request' && steps.scope.outputs.run_eval == 'true' && hashFiles('staging_comment.md') != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: staging-gate
          # Reading the body from a file avoids the GITHUB_OUTPUT heredoc
          # parser tripping on missing trailing newlines or markdown that
          # happens to contain the chosen delimiter.
          path: staging_comment.md
