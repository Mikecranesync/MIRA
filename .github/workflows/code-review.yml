name: Automated Code Review

# Auto-cancel superseded runs on the same PR (prevents runaway-commit floods).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    branches: [main, develop, dev]
    paths-ignore:
      - 'docs/**'
      - 'wiki/**'
      - '**/*.md'
      - '.claude/**'
  pull_request_target:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    name: Auto-fix on label
    if: github.event_name == 'pull_request_target' && github.event.label.name == 'auto-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config user.name "mira-autofix-bot"
          git config user.email "autofix@factorylm.local"

      - name: Run cascade self-fix
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mirrors `bash scripts/pr_self_fix.sh <PR>` but runs in CI when the
          # `auto-fix` label is added. Native `/autofix-pr` is the alternative
          # for human-in-the-loop runs.
          bash scripts/pr_self_fix.sh "${{ github.event.pull_request.number }}"

      - name: Comment fix loop summary
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🤖 Auto-fix loop complete. Inspect the new commits and the latest review comment to confirm the 🔴 IMPORTANT issues are addressed. Re-add the `auto-fix` label to retry.',
            });

  static-analysis:
    name: Static Analysis
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          # shellcheck
          sudo apt-get install -y shellcheck
          # ripgrep
          curl -LO https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep_14.1.1-1_amd64.deb
          sudo dpkg -i ripgrep_14.1.1-1_amd64.deb
          # ast-grep
          npm install -g @ast-grep/cli

      - name: shellcheck — staged .sh files
        id: shellcheck
        run: |
          SHELL_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.sh' | head -50)
          if [ -z "$SHELL_FILES" ]; then
            echo "No .sh files changed."
            echo "result=none" >> $GITHUB_OUTPUT
            exit 0
          fi
          FAIL=0
          OUTPUT=""
          for f in $SHELL_FILES; do
            if [ -f "$f" ]; then
              RESULT=$(shellcheck -f gcc "$f" 2>&1 || true)
              if [ -n "$RESULT" ]; then
                OUTPUT="$OUTPUT\n### \`$f\`\n\`\`\`\n$RESULT\n\`\`\`"
                FAIL=1
              fi
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "result=fail" >> $GITHUB_OUTPUT
            printf '%s' "$OUTPUT" > /tmp/shellcheck-output.txt
          else
            echo "result=pass" >> $GITHUB_OUTPUT
          fi

      - name: ast-grep — hardcoded IPs and secrets
        id: ast_grep
        run: |
          CHANGED_PY=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.py' | head -50)
          if [ -z "$CHANGED_PY" ]; then
            echo "No .py files changed."
            echo "result=none" >> $GITHUB_OUTPUT
            exit 0
          fi
          OUTPUT=""
          FAIL=0
          for f in $CHANGED_PY; do
            if [ -f "$f" ]; then
              # Hardcoded non-localhost IPs
              MATCHES=$(rg --no-heading --line-number \
                '\b(?!127\.0\.0\.1|0\.0\.0\.0|localhost)(?:\d{1,3}\.){3}\d{1,3}\b' \
                "$f" 2>/dev/null || true)
              if [ -n "$MATCHES" ]; then
                OUTPUT="$OUTPUT\n⚠️ **Hardcoded IP** in \`$f\`:\n\`\`\`\n$MATCHES\n\`\`\`"
                FAIL=1
              fi
              # Hardcoded secrets pattern
              SECRET_MATCHES=$(rg --no-heading --line-number \
                '(?i)(password|secret|api_key|token|auth)\s*=\s*["\x27][^"\x27]{8,}["\x27]' \
                "$f" 2>/dev/null | grep -v 'os\.getenv\|getenv\|environ\|placeholder\|example\|test' || true)
              if [ -n "$SECRET_MATCHES" ]; then
                OUTPUT="$OUTPUT\n🔴 **Possible hardcoded secret** in \`$f\`:\n\`\`\`\n$SECRET_MATCHES\n\`\`\`"
                FAIL=1
              fi
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "result=fail" >> $GITHUB_OUTPUT
            printf '%s' "$OUTPUT" >> /tmp/shellcheck-output.txt
          else
            echo "result=pass" >> $GITHUB_OUTPUT
          fi

      - name: verify-agent-symbols — fabricated first-party imports on the PR diff
        id: verify_agent_symbols
        run: |
          # Backstop for the local pre-commit check (.githooks/pre-commit §6),
          # which is warn-only to avoid Stop-hook thrash in the shared working
          # tree (session-discipline.md). This runs on the full PR diff vs the
          # base branch — see tools/verify_agent_symbols.py for scope/limits.
          if ! OUTPUT=$(python3 tools/verify_agent_symbols.py --base "origin/${{ github.base_ref }}" 2>&1); then
            {
              echo ""
              echo "🔴 **Possibly fabricated import(s)** (tools/verify_agent_symbols.py):"
              echo '```'
              echo "$OUTPUT"
              echo '```'
            } >> /tmp/shellcheck-output.txt
          fi
          echo "$OUTPUT"

      - name: Collect static analysis summary
        id: static_summary
        run: |
          if [ -s /tmp/shellcheck-output.txt ]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
            # The findings file is written with `printf '%s'` (no trailing
            # newline), so a plain `cat … ; echo 'EOF'` glues the closing EOF
            # onto the last line → GitHub fails with "Matching delimiter not
            # found 'EOF'" for ANY non-empty findings. Force a trailing newline
            # and use a collision-proof delimiter (content can't contain it).
            DELIM="STATIC_SUMMARY_EOF_$(date +%s)_${RANDOM}"
            {
              echo "summary<<${DELIM}"
              cat /tmp/shellcheck-output.txt
              echo ""
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post static analysis findings
        if: steps.static_summary.outputs.has_findings == 'true'
        uses: actions/github-script@v9
        env:
          # Pass via env, NOT `${{ }}` interpolation into the script body —
          # findings contain backticks/newlines that, injected into JS source,
          # produce `SyntaxError: Unexpected identifier` and crash the job
          # (and are an injection vector). process.env keeps it a runtime value.
          FINDINGS_SUMMARY: ${{ steps.static_summary.outputs.summary }}
        with:
          script: |
            const summary = `## 🔍 Static Analysis Findings\n\n${process.env.FINDINGS_SUMMARY}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary,
            });

  ai-review:
    name: AI Code Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install LLM SDKs
        run: pip install httpx

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff
          # Truncate to 8000 lines to stay within context limits
          head -8000 /tmp/pr.diff > /tmp/pr_truncated.diff
          LINES=$(wc -l < /tmp/pr.diff)
          echo "diff_lines=$LINES" >> $GITHUB_OUTPUT
          echo "Diff: $LINES lines"

      - name: AI review (multi-provider cascade)
        id: ai_review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DIFF_LINES: ${{ steps.diff.outputs.diff_lines }}
        run: |
          python3 - << 'PYEOF'
          # Multi-provider LLM cascade — mirrors mira-bots/shared/inference/router.py
          # post-Anthropic-removal (PR #610). Order: Groq → Cerebras → Gemini.
          # Groq leads (fastest per 2026-04-21 latency audit). All three expose
          # OpenAI-compatible /chat/completions, so a single httpx call works
          # across all of them. No Anthropic tier — that dependency was removed
          # project-wide; do not add it back.
          # Any provider error (auth, billing, rate-limit, network, server) falls
          # through to the next. If every tier fails, soft-skip with a comment
          # so PRs aren't blocked on LLM-infra issues.
          import os
          import sys
          import httpx

          # errors="replace": the diff can carry raw bytes from binary files
          # (PNG/PDF screenshots, etc.). A naive UTF-8 read crashes on them and
          # exits 1 — defeating the soft-skip below. Decode lossily instead.
          with open("/tmp/pr_truncated.diff", encoding="utf-8", errors="replace") as f:
              diff = f.read()

          pr_title = os.environ.get("PR_TITLE", "")
          diff_lines = os.environ.get("DIFF_LINES", "?")

          prompt = f"""You are reviewing a pull request for the MIRA project — an AI-powered industrial maintenance diagnostic platform.

          PR Title: {pr_title}
          Diff size: {diff_lines} lines

          Review this diff for:
          1. 🔴 IMPORTANT: Security vulnerabilities (hardcoded secrets, SQL injection, path traversal, command injection)
          2. 🔴 IMPORTANT: Missing error handling on network/IO operations that will crash in production
          3. 🟡 WARNING: Logic bugs or incorrect assumptions
          4. 🟡 WARNING: Missing input validation at API boundaries
          5. 🔵 SUGGESTION: Code quality improvements, naming, maintainability
          6. ✅ GOOD: Noteworthy good practices found

          Format your review as GitHub Markdown with clear sections.
          Use 🔴 IMPORTANT for must-fix issues, 🟡 WARNING for should-fix, 🔵 SUGGESTION for optional.
          Be specific: cite file + line number when possible.
          Keep total response under 2000 words.

          Diff:
          ```diff
          {diff[:12000]}
          ```"""

          providers = [
              ("groq", os.environ.get("GROQ_API_KEY", ""),
               "https://api.groq.com/openai/v1/chat/completions",
               "llama-3.3-70b-versatile"),
              ("cerebras", os.environ.get("CEREBRAS_API_KEY", ""),
               "https://api.cerebras.ai/v1/chat/completions",
               "llama-3.3-70b"),
              ("gemini", os.environ.get("GEMINI_API_KEY", ""),
               "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions",
               "gemini-2.5-flash"),
          ]

          attempts = []
          review_text = None
          provider_used = None

          for name, key, url, model in providers:
              if not key:
                  attempts.append(f"{name}: skipped (no key)")
                  continue
              try:
                  resp = httpx.post(
                      url,
                      headers={"Authorization": f"Bearer {key}",
                               "Content-Type": "application/json"},
                      json={"model": model, "max_tokens": 2048,
                            "messages": [{"role": "user", "content": prompt}]},
                      timeout=60.0,
                  )
                  resp.raise_for_status()
                  review_text = resp.json()["choices"][0]["message"]["content"]
                  provider_used = f"{name} ({model})"
                  attempts.append(f"{name}: ok")
                  break
              except Exception as e:
                  attempts.append(f"{name}: {type(e).__name__} — {str(e)[:120]}")
                  print(f"[{name}] failed: {e}")

          if review_text is None:
              # All providers failed — soft-skip rather than block PRs on infra
              print("All LLM providers failed — skipping review.")
              for a in attempts:
                  print(f"  · {a}")
              with open("/tmp/claude-review.md", "w") as f:
                  f.write("⚠️ AI review skipped — all providers in the cascade failed.\n\n")
                  f.write("Attempts:\n")
                  for a in attempts:
                      f.write(f"- `{a}`\n")
              sys.exit(0)

          print(f"Review complete via {provider_used}.")
          for a in attempts:
              print(f"  · {a}")
          with open("/tmp/claude-review.md", "w") as f:
              f.write(f"_Review by: **{provider_used}**_\n\n")
              f.write(review_text)
          PYEOF

      - name: Post AI review as PR comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let review = '';
            try {
              review = fs.readFileSync('/tmp/claude-review.md', 'utf8');
            } catch (e) {
              review = '⚠️ AI review file not found.';
            }

            const body = `## 🤖 AI Code Review

            ${review}

            ---
            *Generated by the [MIRA automated code review pipeline](../.github/workflows/code-review.yml) (Groq → Cerebras → Gemini cascade)*
            *To trigger self-fix: run \`bash scripts/pr_self_fix.sh ${{ github.event.pull_request.number }}\` locally, or add the \`auto-fix\` label to this PR (or run \`/autofix-pr\` from a Claude Code session)*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
