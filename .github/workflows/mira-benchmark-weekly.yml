name: MIRA Benchmark Weekly

# Runs `tests/mira_bench.py` against the staging Neon branch on a weekly
# cadence and on demand. Compares the result against the locked baseline in
# `.github/baselines/mira-bench.json` and files a GitHub issue with the
# `benchmark-regression` label if MIRA's grounded total drops below the
# threshold or stops beating the ungrounded LLM baseline by the configured
# margin.
#
# Companion to:
#   - .github/workflows/staging-gate.yml   — per-PR golden gate (10 q's, blocking)
#   - .github/workflows/ci-evals.yml       — quick PR offline evals
#
# Owner: scripts/check_benchmark_regression.py reads the raw json.
#
# IMPORTANT: this workflow depends on PR #1513 (`feat(bench): Phase 2`)
# landing first — that PR brings in tests/mira_bench.py + tests/mira_bench_*.
# If it has not merged, the workflow exits cleanly with a skip notice so the
# weekly cadence doesn't spam failures.

on:
  schedule:
    # Wednesday 05:00 UTC = Tuesday 22:00 PT / Wednesday 01:00 ET.
    # Chosen because Trigger.dev's nightly ingest (when active) finishes by
    # ~04:00 UTC, so the bench sees the fresh KB state.
    - cron: "0 5 * * 3"
  workflow_dispatch:
    inputs:
      open_issue:
        description: "On regression, open a GitHub issue (default: true)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  issues: write   # used to file the regression issue

concurrency:
  group: mira-benchmark-weekly
  cancel-in-progress: false   # let weekly + manual runs queue, never cancel a run mid-LLM-call

jobs:
  benchmark:
    name: mira-bench (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Same environment + secret names as staging-gate.yml so the same Doppler
    # service token can serve both workflows.
    environment: staging

    steps:
      - uses: actions/checkout@v7

      - name: Verify bench files exist (gates on PR #1513)
        id: check_files
        run: |
          set -e
          missing=0
          for f in tests/mira_bench.py tests/mira_bench_scorer.py tests/mira_bench_questions.yaml; do
            if [ ! -f "$f" ]; then
              echo "::warning::missing $f — has PR #1513 (feat(bench): Phase 2) been merged yet?"
              missing=1
            fi
          done
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      - name: Skip notice (bench files not on main yet)
        if: steps.check_files.outputs.missing == '1'
        run: |
          echo "tests/mira_bench.py is not on this commit. Exiting clean so"
          echo "the weekly cadence doesn't spam red. Re-run after PR #1513"
          echo "merges, or use workflow_dispatch from the PR branch."

      - uses: actions/setup-python@v6
        if: steps.check_files.outputs.missing == '0'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mira-bots/telegram/requirements.txt

      - name: Install engine + bench dependencies
        if: steps.check_files.outputs.missing == '0'
        run: |
          python -m pip install --upgrade pip
          pip install -r mira-bots/telegram/requirements.txt
          # mira_bench.py imports yaml + httpx + sqlalchemy + psycopg2; all are
          # already in telegram/requirements.txt. Belt-and-suspenders pin:
          pip install pyyaml httpx 'psycopg2-binary>=2.9' 'sqlalchemy>=2'

      - name: Prep output dir
        if: steps.check_files.outputs.missing == '0'
        id: prep
        run: |
          DATE=$(date -u +%Y-%m-%d)
          # Runner-local — see "Persistence" in PR description. We deliberately
          # do NOT write under docs/evaluations/runs/ to avoid auto-committing
          # CI output into a hand-curated docs tree. The 90-day artifact below
          # is the persistence layer; promote a run by hand if it's noteworthy.
          OUT="${{ runner.temp }}/mira-bench/${DATE}"
          mkdir -p "$OUT"
          echo "out=$OUT" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Run mira_bench (staging Neon, read-only)
        if: steps.check_files.outputs.missing == '0'
        id: bench
        env:
          # Match staging-gate.yml secrets so one env serves both.
          NEON_DATABASE_URL: ${{ secrets.NEON_STG_DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.STAGING_GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.STAGING_CEREBRAS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.STAGING_GEMINI_API_KEY }}
          INFERENCE_BACKEND: cloud
          # Same UUID gotcha as staging-gate: the literal "staging" string
          # fails the tenant_id::uuid cast.
          MIRA_TENANT_ID: ${{ secrets.STAGING_TENANT_ID || '78917b56-f85f-43bb-9a08-1bb98a6cd6c3' }}
          QUICKSTART_TENANT_ID: ${{ secrets.STAGING_TENANT_ID || '78917b56-f85f-43bb-9a08-1bb98a6cd6c3' }}
          MIRA_DB_PATH: ${{ runner.temp }}/mira-stg.db
          # No Ollama on the GitHub runner — embedding will return None and
          # the bench will gracefully fall back to BM25 + structured-fault
          # streams (see mira-bots/shared/neon_recall.py:614). This is a
          # documented degradation, not a failure: the locked baseline
          # threshold has a 6% buffer to absorb it.
          OLLAMA_BASE_URL: http://localhost:1
        run: |
          set -o pipefail
          python tests/mira_bench.py --output "${{ steps.prep.outputs.out }}" \
              2>&1 | tee "${{ steps.prep.outputs.out }}/bench-stdout.log"

      - name: Upload results
        if: always() && steps.check_files.outputs.missing == '0'
        uses: actions/upload-artifact@v7
        with:
          name: mira-bench-${{ steps.prep.outputs.date }}
          path: ${{ steps.prep.outputs.out }}
          retention-days: 90

      - name: Check regression vs locked baseline
        if: always() && steps.check_files.outputs.missing == '0' && steps.bench.outcome == 'success'
        id: regression
        continue-on-error: true
        run: |
          python3 scripts/check_benchmark_regression.py \
              --raw "${{ steps.prep.outputs.out }}/mira-bench-raw.json" \
              --baseline .github/baselines/mira-bench.json \
              --issue-out benchmark_regression_issue.md \
              --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: File regression issue
        if: |
          steps.regression.outcome == 'failure' &&
          (github.event_name == 'schedule' || inputs.open_issue == 'true') &&
          hashFiles('benchmark_regression_issue.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # De-dup: if an open issue with the same label + date in title
          # exists, post a comment instead of opening a new one.
          TITLE="mira-bench regression ${{ steps.prep.outputs.date }}"
          EXISTING=$(gh issue list --label benchmark-regression --state open \
              --search "in:title \"mira-bench regression\"" --json number,title \
              --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Appending comment to #${EXISTING}"
            gh issue comment "$EXISTING" --body-file benchmark_regression_issue.md
          else
            echo "Opening new issue: $TITLE"
            # Label must exist; create if it doesn't (idempotent).
            gh label create benchmark-regression --color "B60205" \
                --description "Weekly MIRA benchmark regressed against the locked baseline" \
                2>/dev/null || true
            gh issue create --title "$TITLE" \
                --label benchmark-regression \
                --body-file benchmark_regression_issue.md
          fi

      - name: Fail the job if regression detected
        if: steps.regression.outcome == 'failure'
        run: |
          echo "::error::benchmark regression — see issue + artifact"
          exit 1
