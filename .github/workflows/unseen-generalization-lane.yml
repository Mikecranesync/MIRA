# UNSEEN generalization lane (UNSEEN-5) — scheduled zero-cost regression on the
# frozen novel-content probe (printsense/benchmarks/unseen_lane/).
#
# Zero paid inference is STRUCTURAL: the runner sets PRINT_VISION_PROVIDER=none
# and strips OPENAI/ANTHROPIC keys before any import — only the free-tier
# cascade (Groq/Cerebras/Together) is reachable, and the PRINT_BENCH_BUDGET_USD
# hard-stop applies on top. Report-only: lane failures are FINDINGS (Phase 5
# owns approved baselines), so the job fails only when the lane cannot run.

name: Unseen Generalization Lane

on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  unseen-lane:
    name: unseen-lane (free path, $0)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            mira-bots/telegram/requirements.txt

      - name: Install bot dependencies
        run: pip install -r mira-bots/telegram/requirements.txt

      - name: Run the unseen lane (free cascade only)
        env:
          # Free-tier cascade keys only — the paid provider is disabled inside
          # the runner regardless of what is present here.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TOGETHERAI_API_KEY: ${{ secrets.TOGETHERAI_API_KEY }}
          INFERENCE_BACKEND: cloud
          PRINT_BENCH_BUDGET_USD: "1.50"
        run: python tools/unseen_lane_runner.py unseen_lane_report.json

      - name: Upload lane report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unseen-lane-report
          path: unseen_lane_report.json
          if-no-files-found: ignore
          retention-days: 90
