name: NeonDB inspect (P0 #1305/#1343/#1344)

# Ad-hoc DB inspection workflow. Uses psql against NeonDB directly via the
# Doppler-managed NEON_DATABASE_URL (factorylm/prd). Read-only.
#
# Previous version (pre-2026-05-19) executed Python inside the mira-mcp-saas
# container and broke when the container lost psycopg2 in a rebuild. Switched
# to the same psql pattern apply-migrations.yml uses for resilience.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'NeonDB target. staging = factorylm/stg, prod = factorylm/prd. Default staging — pre-flight check before any prod write.'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod

concurrency:
  group: db-inspect-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  inspect:
    name: Inspect ${{ inputs.target }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target == 'prod' && 'production' || 'staging' }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Install psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-16
          psql --version

      - name: Authenticate Doppler + resolve DATABASE_URL
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "::error::DOPPLER_TOKEN secret not set."
            exit 1
          fi
          case "${{ inputs.target }}" in
            staging) DOPPLER_CFG=stg ;;
            prod)    DOPPLER_CFG=prd ;;
            *) echo "::error::Unknown target ${{ inputs.target }}"; exit 1 ;;
          esac
          echo "Doppler config: factorylm/${DOPPLER_CFG}"
          DATABASE_URL="$(doppler secrets get NEON_DATABASE_URL --project factorylm --config "${DOPPLER_CFG}" --plain)"
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::NEON_DATABASE_URL empty after Doppler fetch (factorylm/${DOPPLER_CFG})"
            exit 1
          fi
          echo "::add-mask::$DATABASE_URL"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"

      - name: Inspect kg_entities + kg_relationships
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=0 <<'SQL'
          \echo === connection identity ===
          SELECT current_user AS connected_as, session_user;
          SELECT rolname, rolbypassrls FROM pg_roles WHERE rolname = current_user;

          \echo
          \echo === table inventory ===
          SELECT tablename FROM pg_tables
          WHERE schemaname='public'
            AND tablename IN ('knowledge_entries','fault_codes','kg_entities',
                              'kg_relationships','kg_bridge','tenant_invites',
                              'kg_approval_state','relationship_proposals',
                              'relationship_evidence',
                              'troubleshooting_sessions','live_signal_events',
                              'live_signal_cache','diagnostic_trend_sessions',
                              'diagnostic_trend_signals',
                              'namespace_versions','namespace_proposals',
                              'guest_reports','pm_schedules')
          ORDER BY tablename;

          \echo
          \echo === migrations 019-026 artifact presence ===
          SELECT
            'troubleshooting_sessions (019)' AS artifact,
            EXISTS(SELECT 1 FROM information_schema.tables
                   WHERE table_schema='public' AND table_name='troubleshooting_sessions') AS present
          UNION ALL SELECT 'live_signal_events (019)',
            EXISTS(SELECT 1 FROM information_schema.tables
                   WHERE table_schema='public' AND table_name='live_signal_events')
          UNION ALL SELECT 'live_signal_cache (020)',
            EXISTS(SELECT 1 FROM information_schema.tables
                   WHERE table_schema='public' AND table_name='live_signal_cache')
          UNION ALL SELECT 'diagnostic_trend_sessions (020)',
            EXISTS(SELECT 1 FROM information_schema.tables
                   WHERE table_schema='public' AND table_name='diagnostic_trend_sessions')
          UNION ALL SELECT 'diagnostic_trend_signals (020)',
            EXISTS(SELECT 1 FROM information_schema.tables
                   WHERE table_schema='public' AND table_name='diagnostic_trend_signals')
          UNION ALL SELECT 'namespace_versions (021_namespace_builder)',
            EXISTS(SELECT 1 FROM information_schema.tables
                   WHERE table_schema='public' AND table_name='namespace_versions')
          UNION ALL SELECT 'pm_schedules.updated_at (021_pm)',
            EXISTS(SELECT 1 FROM information_schema.columns
                   WHERE table_schema='public' AND table_name='pm_schedules'
                     AND column_name='updated_at')
          UNION ALL SELECT 'guest_reports (022)',
            EXISTS(SELECT 1 FROM information_schema.tables
                   WHERE table_schema='public' AND table_name='guest_reports')
          UNION ALL SELECT 'kg_entities.source_chunk_id (024)',
            EXISTS(SELECT 1 FROM information_schema.columns
                   WHERE table_schema='public' AND table_name='kg_entities'
                     AND column_name='source_chunk_id')
          UNION ALL SELECT 'kg_entities_tenant_type_name_key idx (025/026)',
            EXISTS(SELECT 1 FROM pg_indexes
                   WHERE schemaname='public' AND tablename='kg_entities'
                     AND indexname='kg_entities_tenant_type_name_key')
          UNION ALL SELECT 'kg_entities_tenant_id_entity_type_entity_id_key DROPPED (025/026)',
            NOT EXISTS(SELECT 1 FROM pg_constraint c
                       JOIN pg_class t ON t.oid = c.conrelid
                       WHERE t.relname='kg_entities'
                         AND c.conname='kg_entities_tenant_id_entity_type_entity_id_key');

          \echo
          \echo === kg_entities indexes ===
          SELECT indexname, indexdef
          FROM pg_indexes
          WHERE schemaname='public' AND tablename='kg_entities'
          ORDER BY indexname;

          \echo
          \echo === row counts ===
          SELECT 'kg_entities' AS tbl, COUNT(*)::text AS n FROM kg_entities
          UNION ALL SELECT 'kg_entities NULL uns_path', COUNT(*)::text FROM kg_entities WHERE uns_path IS NULL
          UNION ALL SELECT 'kg_relationships', COUNT(*)::text FROM kg_relationships
          UNION ALL SELECT 'knowledge_entries', COUNT(*)::text FROM knowledge_entries;

          \echo
          \echo === kg_entities columns ===
          SELECT column_name, data_type
          FROM information_schema.columns
          WHERE table_schema='public' AND table_name='kg_entities'
          ORDER BY ordinal_position;

          \echo
          \echo === kg_relationships columns ===
          SELECT column_name, data_type
          FROM information_schema.columns
          WHERE table_schema='public' AND table_name='kg_relationships'
          ORDER BY ordinal_position;

          \echo
          \echo === kg_relationships indexes ===
          SELECT indexname, indexdef
          FROM pg_indexes
          WHERE schemaname='public' AND tablename='kg_relationships'
          ORDER BY indexname;

          \echo
          \echo === RLS state ===
          SELECT c.relname,
                 c.relrowsecurity AS rls_enabled,
                 c.relforcerowsecurity AS rls_forced
          FROM pg_class c
          JOIN pg_namespace n ON n.oid = c.relnamespace
          WHERE n.nspname='public'
            AND c.relname IN ('kg_entities','kg_relationships');

          \echo
          \echo === RLS policies ===
          SELECT tablename, policyname, cmd, qual::text
          FROM pg_policies
          WHERE schemaname='public'
            AND tablename IN ('kg_entities','kg_relationships');

          \echo
          \echo === kg_relationships sample (10) ===
          SELECT * FROM kg_relationships LIMIT 10;

          \echo
          \echo === kg_relationships by type ===
          SELECT relationship_type, COUNT(*)
          FROM kg_relationships
          GROUP BY relationship_type
          ORDER BY 2 DESC;

          \echo
          \echo === factorylm_app grants on write-path tables (grant-drift check, #1861) ===
          \echo 'knowledge_entries MUST include INSERT or folder=brain uploads 500 (aclcheck_error).'
          \echo 'A privilege missing here is grant drift: applied by hand somewhere, not via a migration.'
          SELECT t.table_name,
                 COALESCE(string_agg(g.privilege_type, ',' ORDER BY g.privilege_type),
                          '(NONE - factorylm_app cannot touch this table)') AS privileges
          FROM (VALUES
                  ('knowledge_entries'), ('hub_uploads'), ('kg_entities'),
                  ('kg_relationships'), ('namespace_direct_uploads'),
                  ('relationship_proposals'), ('installed_component_instances')
               ) AS t(table_name)
          LEFT JOIN information_schema.role_table_grants g
            ON g.table_name = t.table_name
           AND g.table_schema = 'public'
           AND g.grantee = 'factorylm_app'
          GROUP BY t.table_name
          ORDER BY t.table_name;

          \echo
          \echo === #1899 folder=brain upload-path schema probe ===
          \echo 'hub_uploads is RUNTIME-managed (ensureUploadsSchema), NOT migration-managed.'
          \echo 'createUpload INSERTs kg_entity_id + ingest_route; if absent here, the door 500s (42703).'
          SELECT 'hub_uploads.kg_entity_id' AS column, EXISTS(
            SELECT 1 FROM information_schema.columns
            WHERE table_schema='public' AND table_name='hub_uploads' AND column_name='kg_entity_id') AS present
          UNION ALL SELECT 'hub_uploads.ingest_route', EXISTS(
            SELECT 1 FROM information_schema.columns
            WHERE table_schema='public' AND table_name='hub_uploads' AND column_name='ingest_route')
          UNION ALL SELECT 'hub_uploads.kind', EXISTS(
            SELECT 1 FROM information_schema.columns
            WHERE table_schema='public' AND table_name='hub_uploads' AND column_name='kind')
          UNION ALL SELECT 'knowledge_entries.doc_id (045)', EXISTS(
            SELECT 1 FROM information_schema.columns
            WHERE table_schema='public' AND table_name='knowledge_entries' AND column_name='doc_id')
          UNION ALL SELECT 'knowledge_entries.ingest_route (045)', EXISTS(
            SELECT 1 FROM information_schema.columns
            WHERE table_schema='public' AND table_name='knowledge_entries' AND column_name='ingest_route')
          UNION ALL SELECT 'knowledge_entries.is_private', EXISTS(
            SELECT 1 FROM information_schema.columns
            WHERE table_schema='public' AND table_name='knowledge_entries' AND column_name='is_private')
          UNION ALL SELECT 'idx_ke_chunk_dedup (ON CONFLICT target)', EXISTS(
            SELECT 1 FROM pg_indexes WHERE schemaname='public' AND indexname='idx_ke_chunk_dedup');

          \echo
          \echo === hub_uploads full column list ===
          SELECT column_name FROM information_schema.columns
          WHERE table_schema='public' AND table_name='hub_uploads'
          ORDER BY ordinal_position;

          \echo
          \echo === #1899b tenants-FK probe (fresh-signup chunk INSERT 500) ===
          \echo 'knowledge_entries.tenant_id FKs to tenants(id). Signup makes hub_tenants but NOT tenants.'
          \echo 'orphan_hub_tenants = real signups whose uploads will 23503 until backfilled.'
          SELECT conname AS fk_name, confrelid::regclass AS references
            FROM pg_constraint
           WHERE conrelid = 'knowledge_entries'::regclass AND contype = 'f';
          -- tenants.id is UUID; hub_tenants.id is TEXT (see migration 051). The regex
          -- guard skips legacy slug ids (which could never have a uuid tenants row
          -- anyway), so orphan_hub_tenants = rows migration 051 still needs to backfill.
          SELECT
            (SELECT COUNT(*) FROM hub_tenants) AS hub_tenants,
            (SELECT COUNT(*) FROM tenants) AS tenants,
            (SELECT COUNT(*) FROM hub_tenants ht
               WHERE ht.id ~ '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
                 AND NOT EXISTS (
                   SELECT 1 FROM tenants t WHERE t.id = ht.id::uuid
                 )) AS orphan_hub_tenants;
          SQL

      - name: Secret-shopper testing prerequisites probe
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          set -euo pipefail
          # Read-only. Answers docs/runbooks/secret-shopper-testing-setup.md §1+§2:
          #   (a) do the 4 synthetic personas exist in THIS env, and in which tenant?
          #   (b) which tenant (if any) holds the Stardust Racers UNS subtree?
          psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=0 <<'SQL'
          \echo === synthetic personas present? (carlos/dana/plantmgr/cfo) ===
          SELECT u.email, u.status, u.role, t.id AS tenant_id, t.name AS tenant_name
          FROM hub_users u
          LEFT JOIN hub_tenants t ON t.id = u.tenant_id
          WHERE u.email LIKE '%@synthetic.test'
          ORDER BY u.email;

          \echo
          \echo === synthetic test plant tenant present? (...099) ===
          SELECT id, name FROM hub_tenants
          WHERE id = '00000000-0000-0000-0000-000000000099';

          \echo
          \echo === Stardust Racers UNS subtree — which tenant holds it? ===
          SELECT tenant_id, entity_type, name, uns_path::text
          FROM kg_entities
          WHERE uns_path <@ 'enterprise.celestial_park'
          ORDER BY uns_path;

          \echo
          \echo === who can log in to the Stardust tenant? (users of e88bd0e8) ===
          \echo 'These are the accounts a secret shopper would use to SEE Stardust on prod.'
          SELECT u.email, u.name, u.role, u.status,
                 (u.password_hash IS NOT NULL) AS has_password
          FROM hub_users u
          WHERE u.tenant_id = 'e88bd0e8-8a84-4e30-9803-c0dc6efb07fe'
          ORDER BY u.email;
          SQL

      - name: Inspect ingest schema (tag_events + approved_tags) — READ-ONLY
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          set -euo pipefail
          # READ-ONLY drift check: compares deployed tag_events / approved_tags
          # against canonical 033_tag_events.sql / 035_approved_tags.sql.
          psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=0 <<'SQL'
          \echo === tag_events columns (canonical 033 = value/value_type/quality/source_system/...) ===
          SELECT column_name, is_nullable, column_default
          FROM information_schema.columns
          WHERE table_name='tag_events' ORDER BY ordinal_position;
          \echo === tag_events PK/unique ===
          SELECT tc.constraint_type, kcu.column_name
          FROM information_schema.table_constraints tc
          JOIN information_schema.key_column_usage kcu ON tc.constraint_name=kcu.constraint_name
          WHERE tc.table_name='tag_events' AND tc.constraint_type IN ('PRIMARY KEY','UNIQUE')
          ORDER BY tc.constraint_type, kcu.ordinal_position;
          \echo
          \echo === approved_tags columns (canonical 035 = source_tag_path/normalized_tag_path/notes/...) ===
          SELECT column_name, is_nullable, column_default
          FROM information_schema.columns
          WHERE table_name='approved_tags' ORDER BY ordinal_position;
          \echo === approved_tags PK/unique (canonical = (tenant_id, source_system, source_tag_path)) ===
          SELECT tc.constraint_type, kcu.column_name
          FROM information_schema.table_constraints tc
          JOIN information_schema.key_column_usage kcu ON tc.constraint_name=kcu.constraint_name
          WHERE tc.table_name='approved_tags' AND tc.constraint_type IN ('PRIMARY KEY','UNIQUE')
          ORDER BY tc.constraint_type, kcu.ordinal_position;
          \echo
          \echo === row counts (drift repair is data-safe if 0) ===
          SELECT 'tag_events' AS t, count(*) FROM tag_events
          UNION ALL SELECT 'approved_tags', count(*) FROM approved_tags;
          SQL

      - name: Machine memory scoreboard (038 layer) — READ-ONLY
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          set -euo pipefail
          # READ-ONLY. machine_run/run_step/run_baseline/run_diff are the 038
          # machine-memory tables. The presence probe below tells the reader
          # whether 038 is applied in this env; the machine_run/run_diff
          # scoreboard queries error harmlessly under ON_ERROR_STOP=0 where
          # 038 isn't applied yet.
          psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=0 <<'SQL'
          \echo === 038 machine-memory tables present? ===
          SELECT t.name AS table_name,
                 EXISTS(SELECT 1 FROM information_schema.tables
                        WHERE table_schema='public' AND table_name = t.name) AS present
          FROM (VALUES ('machine_run'),('run_step'),('run_baseline'),('run_diff')) AS t(name);

          \echo === scoreboard: total tag_events ===
          SELECT count(*) AS total_tag_events FROM tag_events;

          \echo === scoreboard: tag_events by tenant / source_system / day (last 14 days) ===
          SELECT tenant_id, source_system, date_trunc('day', event_timestamp) AS day, count(*) AS n
            FROM tag_events
           WHERE event_timestamp > now() - interval '14 days'
           GROUP BY 1,2,3 ORDER BY day DESC, n DESC;

          \echo === scoreboard: machine runs by tenant / uns_path / day ===
          SELECT tenant_id, uns_path::text AS uns_path, date_trunc('day', started_at) AS day, status, count(*) AS n
            FROM machine_run GROUP BY 1,2,3,4 ORDER BY day DESC, n DESC;

          \echo === scoreboard: run_diffs by severity / tag_path / day ===
          SELECT tenant_id, severity, tag_path, date_trunc('day', event_timestamp) AS day, count(*) AS n
            FROM run_diff GROUP BY 1,2,3,4 ORDER BY day DESC, n DESC;

          \echo === scoreboard: machine_state_window (040) by tenant / uns_path / state ===
          SELECT tenant_id, uns_path::text AS uns_path, state, count(*) AS n,
                 max(started_at) AS latest_started_at, max(ended_at) AS latest_ended_at
            FROM machine_state_window GROUP BY 1,2,3 ORDER BY latest_started_at DESC NULLS LAST;

          \echo === scoreboard: tag_events uns_path coverage (last 24h) ===
          SELECT coalesce(uns_path::text, '(null)') AS uns_path, count(*) AS n
            FROM tag_events
           WHERE ingested_at > now() - interval '24 hours'
           GROUP BY 1 ORDER BY n DESC LIMIT 10;

          \echo === scoreboard: equipment kg_entities (asset->uns bridge for machine-memory card) ===
          SELECT id, tenant_id, entity_id, name, uns_path::text AS uns_path
            FROM kg_entities WHERE entity_type = 'equipment'
           ORDER BY tenant_id, name LIMIT 30;

          \echo === scoreboard: cmms_equipment columns (live schema) ===
          SELECT column_name, data_type, is_nullable
            FROM information_schema.columns
           WHERE table_name = 'cmms_equipment' ORDER BY ordinal_position;

          \echo === scoreboard: garage-tenant cmms_equipment rows ===
          SELECT id, tenant_id, equipment_number,
                 coalesce(to_jsonb(cmms_equipment)->>'name','(no name col)') AS name_ish
            FROM cmms_equipment
           WHERE tenant_id = 'e88bd0e8-8a84-4e30-9803-c0dc6efb07fe'
           ORDER BY equipment_number LIMIT 12;

          \echo === scoreboard: live_signal_cache clock-skew probe (last_seen_at = client ts, updated_at = server NOW) ===
          SELECT now() AS server_now,
                 max(last_seen_at) AS max_last_seen,
                 max(updated_at) AS max_updated,
                 max(updated_at) - max(last_seen_at) AS client_clock_skew
            FROM live_signal_cache
           WHERE tenant_id = 'e88bd0e8-8a84-4e30-9803-c0dc6efb07fe';
          SELECT plc_tag, last_seen_at, updated_at, updated_at - last_seen_at AS skew, simulated
            FROM live_signal_cache
           WHERE tenant_id = 'e88bd0e8-8a84-4e30-9803-c0dc6efb07fe'
           ORDER BY updated_at DESC LIMIT 8;

          \echo === scoreboard: kg_relationships by type ===
          SELECT relationship_type, count(*) AS n FROM kg_relationships GROUP BY 1 ORDER BY n DESC;

          \echo === scoreboard: kg_entities NULL uns_path ===
          SELECT count(*) AS null_uns_path_entities FROM kg_entities WHERE uns_path IS NULL;
          SELECT id, tenant_id, entity_type, name FROM kg_entities WHERE uns_path IS NULL ORDER BY entity_type, name LIMIT 50;

          \echo === scoreboard: work_orders schema probe (#2428 — source_run_diff_id / migration 060) ===
          SELECT column_name, data_type, is_nullable
            FROM information_schema.columns
           WHERE table_name = 'work_orders' ORDER BY ordinal_position;
          SELECT migration_name FROM schema_migrations
           WHERE migration_name >= '055' ORDER BY migration_name;

          \echo === scoreboard: latest machine_state_window rows (bench tenant — State bubble truth) ===
          SELECT state, started_at, ended_at, now() - coalesce(ended_at, now()) AS ended_age
            FROM machine_state_window
           WHERE tenant_id = 'e88bd0e8-8a84-4e30-9803-c0dc6efb07fe'
           ORDER BY started_at DESC LIMIT 5;

          \echo === latency probe: collector PUSH cadence (distinct ingest batches, last 60s — gap = push interval) ===
          SELECT ingested_at,
                 count(*) AS tags_in_batch,
                 ingested_at - lag(ingested_at) OVER (ORDER BY ingested_at) AS gap_since_prev
            FROM (
              SELECT DISTINCT ingested_at
                FROM tag_events
               WHERE tenant_id = 'e88bd0e8-8a84-4e30-9803-c0dc6efb07fe'
                 AND ingested_at > now() - interval '60 seconds'
            ) b
            JOIN tag_events e USING (ingested_at)
           WHERE e.tenant_id = 'e88bd0e8-8a84-4e30-9803-c0dc6efb07fe'
           GROUP BY ingested_at
           ORDER BY ingested_at DESC LIMIT 20;

          \echo === latency probe: per-tag freshness (live_signal_cache, oldest first — includes the 250ms fast-scan tags + any stale ghosts) ===
          SELECT plc_tag,
                 now() - last_seen_at    AS seen_age,
                 now() - last_changed_at AS changed_age,
                 last_value_numeric, last_value_bool
            FROM live_signal_cache
           WHERE tenant_id = 'e88bd0e8-8a84-4e30-9803-c0dc6efb07fe'
           ORDER BY last_seen_at ASC NULLS FIRST LIMIT 40;
          SQL

      - name: KB-growth feeder inventory (manual_cache un-ingested) — READ-ONLY
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          set -euo pipefail
          # READ-ONLY. The kb_growth_cron hourly job DRAINS manual_queue.json but
          # nothing SCHEDULED refills it — the queue is fed only by the one-shot
          # `--hydrate-from-cache` (manual_cache -> queue) and queue_populate.py
          # (allowlist -> queue). A drained queue ("No eligible entries") is the
          # designed steady state, NOT a dead cron. This probe answers the real
          # question: is there LATENT inventory a hydrate would surface, i.e. has
          # KB growth silently stalled? (Context: 2026-07-17 kb_cron flood.)
          psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=0 <<'SQL'
          \echo === manual_cache present? ===
          SELECT EXISTS(SELECT 1 FROM information_schema.tables
                        WHERE table_schema='public' AND table_name='manual_cache') AS manual_cache_present;

          \echo === manual_cache totals ===
          SELECT count(*) AS total_rows,
                 count(*) FILTER (WHERE manual_url IS NOT NULL AND manual_url <> '') AS rows_with_url
            FROM manual_cache;

          \echo === LATENT WORK: manual_cache rows with a URL not yet in knowledge_entries.source_url ===
          \echo === (this is what `--hydrate-from-cache` would append to manual_queue.json) ===
          SELECT count(*) AS uningested_manuals
            FROM manual_cache mc
           WHERE mc.manual_url IS NOT NULL AND mc.manual_url <> ''
             AND NOT EXISTS (SELECT 1 FROM knowledge_entries ke
                              WHERE ke.source_url = mc.manual_url);

          \echo === un-ingested by manufacturer (top 25) ===
          SELECT coalesce(mc.manufacturer, '(none)') AS manufacturer, count(*) AS n
            FROM manual_cache mc
           WHERE mc.manual_url IS NOT NULL AND mc.manual_url <> ''
             AND NOT EXISTS (SELECT 1 FROM knowledge_entries ke
                              WHERE ke.source_url = mc.manual_url)
           GROUP BY 1 ORDER BY n DESC LIMIT 25;
          SQL

      - name: kb_cron flood-source health (system_health_log) — READ-ONLY
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          set -euo pipefail
          # READ-ONLY. Confirms the 2026-07-17 kb_cron Telegram flood stopped after
          # the liveness-heartbeat fix (#2769) deployed: freshness rows (category=data)
          # should flip DOWN→healthy once a drained-queue run bumps manual_queue.json
          # mtime, and heal/escalation rows (category=heal) should stop firing.
          psql "$DATABASE_URL" --no-psqlrc -v ON_ERROR_STOP=0 <<'SQL'
          \echo === kb_cron rows, last 3h (freshness + heal timeline, newest first) ===
          SELECT ts, category, status, action_taken,
                 left(details, 200) AS details, extra->>'escalated' AS escalated
            FROM system_health_log
           WHERE service = 'kb_cron' AND ts > now() - interval '3 hours'
           ORDER BY ts DESC LIMIT 40;

          \echo === kb_cron escalation count: before vs after 2026-07-18 00:24Z (deploy) ===
          SELECT CASE WHEN ts < timestamptz '2026-07-18 00:24:00+00' THEN 'before_deploy'
                      ELSE 'after_deploy' END AS window,
                 count(*) AS heal_rows,
                 count(*) FILTER (WHERE extra->>'escalated' = 'true') AS escalations
            FROM system_health_log
           WHERE service = 'kb_cron' AND category = 'heal'
             AND ts > now() - interval '6 hours'
           GROUP BY 1 ORDER BY 1;

          \echo === latest kb_cron freshness verdict ===
          SELECT ts, status, left(details, 80) AS details
            FROM system_health_log
           WHERE service = 'kb_cron' AND category = 'data'
           ORDER BY ts DESC LIMIT 3;
          SQL
