name: actionlint

# Lints GitHub Actions workflow files. Catches the duplicate-key / schema /
# expression errors GitHub rejects at *parse* time (e.g. the duplicate
# `concurrency:` key that broke compose-mem-lint.yml — #1725 — which failed in
# 0s with zero jobs and no logs). The pre-commit hooks (.githooks/pre-commit +
# .pre-commit-config.yaml) are SKIPPABLE when actionlint isn't installed
# locally — which is exactly how #1725 reached main. THIS job is the real,
# non-skippable gate.
#
# `-shellcheck=` disables actionlint's embedded shellcheck so pre-existing
# run-block style nits don't block; `.sh` files are shellchecked separately.

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color -shellcheck=
