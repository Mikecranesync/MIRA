name: Crew / Dogfood Tests

# Guards the synthetic-worker runner, the dogfood judge, and the shared
# verify-before-file gate (create_issue.sh). These hermetic suites shim `gh`
# and touch no network — they are the ONLY thing that keeps the gate honest
# (an independent reproduction + a distinct verifier + dedupe before any issue
# is filed). Before this workflow they ran in NO CI, so the gate could silently
# break into filing false bugs. Phase 1 of the dogfood-routine durability plan:
# docs/plans/2026-07-03-dogfood-routine-durability.md.

on:
  pull_request:
    paths:
      - "tools/crew/**"
      - "tools/qa/create_issue.sh"
      - "tools/qa/test_create_issue_gate.sh"
      - ".github/workflows/crew-tests.yml"
  push:
    branches: [main]
    paths:
      - "tools/crew/**"
      - "tools/qa/create_issue.sh"
      - "tools/qa/test_create_issue_gate.sh"
      - ".github/workflows/crew-tests.yml"

permissions:
  contents: read

concurrency:
  group: crew-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hermetic:
    name: Crew hermetic tests (runner + judge + gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # ubuntu-latest ships shellcheck + python3 + bash 5; the suites need nothing else.
      - name: ShellCheck (warnings + errors) on crew scripts
        run: |
          shellcheck -S warning \
            tools/crew/run_synthetic_workers.sh \
            tools/crew/dogfood/judge.sh \
            tools/crew/dogfood/scheduled_run.sh \
            tools/qa/create_issue.sh

      - name: Runner gate tests (verify-before-file, retries, --until-find)
        run: bash tools/crew/test_run_synthetic_workers.sh

      - name: Dogfood judge tests (classification + two-persona gate)
        run: bash tools/crew/dogfood/test_judge.sh

      - name: Dogfood INFRA-guard tests (Hub outage → INFRA, never a false RED)
        run: bash tools/crew/dogfood/test_infra_guard.sh

      - name: create_issue.sh gate tests (adversarial-verification gate)
        run: bash tools/qa/test_create_issue_gate.sh
