name: PR 2881 Format Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - "factorylm_ai/providers/paid_authorization_guard.py"
      - "tests/factorylm_ai/test_paid_authorization_trust_boundary.py"
      - ".github/workflows/pr2881-format-diagnostic.yml"

permissions:
  contents: read

jobs:
  canonical-format:
    name: Canonical Ruff Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pinned Ruff
        run: pip install "ruff==0.9.*"

      - name: Canonically format new security files
        run: |
          ruff format \
            factorylm_ai/providers/paid_authorization_guard.py \
            tests/factorylm_ai/test_paid_authorization_trust_boundary.py
          ruff check \
            factorylm_ai/providers/paid_authorization_guard.py \
            tests/factorylm_ai/test_paid_authorization_trust_boundary.py
          ruff format --check \
            factorylm_ai/providers/paid_authorization_guard.py \
            tests/factorylm_ai/test_paid_authorization_trust_boundary.py

      - name: Upload canonical files
        uses: actions/upload-artifact@v7
        with:
          name: pr2881-canonical-format
          path: |
            factorylm_ai/providers/paid_authorization_guard.py
            tests/factorylm_ai/test_paid_authorization_trust_boundary.py
          if-no-files-found: error
          retention-days: 1
