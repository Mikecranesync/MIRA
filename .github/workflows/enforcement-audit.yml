name: Enforcement Audit

# Mechanical gates from docs/specs/enforcement-layer-spec.md.
# Runs on every PR + nightly cron. Phase 1 phasing per the spec:
#   - enum-drift:    blocks (cheap, high signal)
#   - write-paths:   blocks (high signal, needs test bearer secret)
#   - hub-audit:     warn-only until 2026-05-21, then blocks on regression

on:
  pull_request:
    branches: [main, dev, develop]
    paths:
      - "mira-hub/**"
      - "mira-bots/shared/**"
      - "tests/integration/**"
      - "scripts/check_enum_drift.py"
      - ".github/workflows/enforcement-audit.yml"
      - ".enum-drift-allowlist.txt"
  schedule:
    # 03:00 UTC nightly — regression catch against live prod.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      run_audit:
        description: "Run Playwright hub audit"
        type: boolean
        default: true
      run_write_paths:
        description: "Run write-path integration tests"
        type: boolean
        default: true

permissions:
  contents: write    # for nightly audit commits to docs/audits/
  pull-requests: write

concurrency:
  group: enforcement-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enum-drift:
    name: Enum Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run drift check
        run: python scripts/check_enum_drift.py

  write-paths:
    name: Write-Path Integration
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install httpx pytest pytest-timeout pyyaml
      - name: Run write-path tests
        env:
          BASE_URL: ${{ vars.ENFORCEMENT_BASE_URL || 'https://app.factorylm.com' }}
          ENFORCEMENT_TEST_BEARER: ${{ secrets.ENFORCEMENT_TEST_BEARER }}
        run: pytest tests/integration/test_write_paths.py -v --timeout=60

  hub-audit:
    name: Hub Page Audit
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.changed_files, 'mira-hub/'))
    # Phase 1: warn-only. Flip to required after 2026-05-21 per spec §6.
    continue-on-error: true
    defaults:
      run:
        working-directory: mira-hub
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        # bun (bun.lock) instead of `npm ci || npm install` — the npm fallback
        # masked the package-lock drift; bun.lock is the in-sync source of truth.
        run: |
          bun install --frozen-lockfile --ignore-scripts
          npx playwright install --with-deps chromium
      - name: Run audit
        env:
          HUB_URL: ${{ vars.ENFORCEMENT_HUB_URL || 'https://app.factorylm.com/hub' }}
        run: npx playwright test tests/e2e/hub-page-audit.spec.ts --reporter=list
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hub-audit-${{ github.run_id }}
          path: docs/audits/*.md
          if-no-files-found: ignore
      - name: Commit nightly audit (cron only)
        if: github.event_name == 'schedule'
        run: |
          cd ..
          git config user.name "factorylm-bot"
          git config user.email "bot@factorylm.com"
          if [ -n "$(git status --porcelain docs/audits/)" ]; then
            git add docs/audits/
            git commit -m "chore(audits): nightly hub audit $(date -u +%Y-%m-%d)"
            git push origin HEAD:main || echo "nightly audit push failed (non-fatal)"
          else
            echo "no audit changes to commit"
          fi
