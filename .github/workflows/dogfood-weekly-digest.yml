name: Dogfood Weekly Digest

# Weekly trend rollup for the dogfood judge. Reads the last 7 days of verdict
# comments on issue #2417 (the `<!-- dogfood-heartbeat -->` markers posted by the
# 4h Bravo run) and posts a one-comment summary: how many green/yellow/red, and
# the latest verdict — so "is the product getting better or worse?" is answerable
# at a glance. Runs ON GitHub (reads/writes only that issue). Phase 4c of
# docs/plans/2026-07-03-dogfood-routine-durability.md.

on:
  schedule:
    - cron: "0 13 * * 1" # Mondays 13:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  digest:
    name: 7-day verdict rollup
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE: "2417"
    steps:
      - name: Tally and post the weekly rollup
        run: |
          set -euo pipefail
          since="$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          all="$(gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/issues/${ISSUE}/comments" \
            | jq 'flatten | map(select(.body | contains("<!-- dogfood-heartbeat -->")))')"
          recent="$(printf '%s' "$all" | jq --arg since "$since" '[.[] | select(.created_at > $since)]')"
          total="$(printf '%s' "$recent" | jq 'length')"
          if [ "$total" -eq 0 ]; then
            echo "No dogfood verdicts in the last 7 days — nothing to summarize."
            exit 0
          fi
          count() { printf '%s' "$recent" | jq --arg s "$1" '[.[] | select(.body | contains($s))] | length'; }
          g="$(count 'Overall: GREEN')"; y="$(count 'Overall: YELLOW')"; r="$(count 'Overall: RED')"
          latest="$(printf '%s' "$recent" | jq -r 'max_by(.created_at) | .body' | grep -oE 'Overall: (GREEN|YELLOW|RED)' | head -1 || echo 'Overall: ?')"
          printf '## Weekly dogfood rollup (last 7 days)\n\n%s runs — %s green · %s yellow · %s red\nLatest verdict: **%s**\n\n<sub>auto-generated by dogfood-weekly-digest.yml — trend for docs/plans/2026-07-03-dogfood-routine-durability.md</sub>\n' \
            "$total" "$g" "$y" "$r" "$latest" > digest.md
          gh issue comment "$ISSUE" -R "$GITHUB_REPOSITORY" --body-file digest.md
          echo "Posted digest: ${total} runs (g=${g} y=${y} r=${r}), latest ${latest}"
