name: PR 2881 Pyright Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - "factorylm_ai/**"
      - "tests/factorylm_ai/**"
      - ".github/workflows/pr2881-pyright-diagnostic.yml"

permissions:
  contents: read

jobs:
  pyright-diagnostic:
    name: Pyright Diagnostics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Pyright
        run: pip install pyright

      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          pyright > /tmp/pr2881-pyright.txt 2>&1
          rc=$?
          echo "pyright_exit=$rc" >> /tmp/pr2881-pyright.txt
          cat /tmp/pr2881-pyright.txt
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: pr2881-pyright-diagnostics
          path: /tmp/pr2881-pyright.txt
          if-no-files-found: error
          retention-days: 1
