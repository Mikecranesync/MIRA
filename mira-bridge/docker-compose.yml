services:
  node-red:
    mem_limit: 512m
    memswap_limit: 512m
    build:
      context: .
    image: mira-bridge:latest
    container_name: mira-bridge
    ports:
      - "${NODERED_PORT:-1880}:1880"
    environment:
      - TZ=${TZ:-America/New_York}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - PIPELINE_API_KEY=${PIPELINE_API_KEY:-}
    volumes:
      - node-red-data:/data
      - ${MIRA_DB_PATH:-./data}:/mira-db
    networks:
      - core-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  node-red-data:

networks:
  core-net:
    external: true
