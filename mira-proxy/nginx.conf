## mira-proxy — Command Center on-prem display proxy (Charlie).
## Thin, WS-capable reverse proxy with an SSRF allowlist sourced from display_endpoints.
## See README.md for the full chain. Read-only: GET/HEAD/WS only.

worker_processes 1;
events { worker_connections 256; }

http {
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Tight timeouts; HMIs are LAN-local. WS needs a long read timeout so the
    # socket isn't torn down between live pushes.
    proxy_connect_timeout 3s;
    proxy_send_timeout    75s;
    proxy_read_timeout    75s;
    send_timeout          75s;

    # WS upgrade: map the Upgrade header to the Connection value.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --- SSRF allowlist (GENERATED) ---------------------------------------------
    # gen_allowlist.py writes conf.d/allowlist.conf: a `map $display_id $upstream`
    # block keyed by display_endpoints.id → "host:port". Unknown id → empty → 404.
    # This is the ONLY source of upstreams; the proxy can reach nothing else.
    include /etc/nginx/conf.d/allowlist.conf;

    server {
        # Bound to the Tailscale IP by docker-compose port mapping; listen on all
        # inside the container, the host-side bind restricts exposure.
        listen 8889;
        server_name _;

        # Health endpoint for compose healthcheck + VPS upstream check.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # /display/{id}/<rest> — resolve {id} to an allowlisted upstream, forward
        # the REST path unchanged (relative assets + socket path resolve as-is).
        # NB: no {n} brace-quantifier here — nginx parses { } as config blocks and
        # rejects the regex ("missing closing parenthesis"). The allowlist map is the
        # real validator: a non-registered id resolves to '' → 404 below.
        location ~ "^/display/(?<display_id>[0-9a-fA-F-]+)(?<rest>/.*|)$" {
            # Read-only: only GET/HEAD (+ WS, which arrives as GET w/ Upgrade).
            limit_except GET HEAD { deny all; }

            # Unknown / disabled id → no upstream → 404 (never an open relay).
            if ($upstream = '') { return 404; }

            # Default rest to "/" so /display/{id} (no trailing) still works.
            set $fwd $rest;
            if ($fwd = '') { set $fwd /; }

            proxy_pass http://$upstream$fwd$is_args$args;
            proxy_http_version 1.1;

            # WebSocket upgrade — the make-or-break headers.
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host              $proxy_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Strip frame-blocking headers from the HMI so the Hub can frame it.
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;

            proxy_buffering off;   # live streams, not cacheable docs
        }

        # Everything else is not a valid display path.
        location / { return 404; }
    }
}
