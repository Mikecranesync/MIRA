# Deterministic QA-A harness: the origin-root proxy in front of a MOCK Ignition
# gateway. No live gateway, no flakiness — CI-able. run_test.sh drives the asserts.
services:
  ignition-gateway:                 # the mock; the proxy resolves this name 1:1
    image: node:20-alpine
    command: node /mock/mock_gateway.mjs
    volumes:
      - ./mock_gateway.mjs:/mock/mock_gateway.mjs:ro
    expose:
      - "8088"

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - ignition-gateway            # ensures the upstream name resolves at nginx start
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:8899:8890"       # 8899 to avoid clashing with a dev proxy on 8890
