## mira-proxy / gateway-origin — origin-root reverse proxy for an Ignition gateway.
##
## WHY THIS EXISTS (distinct from the sibling per-id mira-proxy):
##   Ignition Perspective is an absolute-path SPA — it requests every asset and
##   opens its WebSocket at ROOT-absolute paths (/res/perspective/…,
##   /data/perspective/…, /system/…) with no <base> tag. The per-id proxy
##   (/cc-display/{id}/<rest> → upstream<rest>) therefore CANNOT host it: those
##   absolute requests resolve against the iframe origin root, skip the {id}
##   prefix, and 404. An absolute-path SPA must be framed at the ORIGIN ROOT of a
##   dedicated origin. This proxy is that origin: it maps "/" 1:1 onto the gateway,
##   strips the frame-blocking headers, and forwards the WebSocket.
##
## Upstream is the docker host alias `ignition-gateway` (see docker-compose.yml /
## the test compose) so the same conf serves both the real gateway and the mock.
##
## ⚠️ SAFETY (watch-only): this fronts the WHOLE gateway, and a Perspective view's
## control components drive the PLC over the SAME WebSocket this proxy forwards —
## method-level read-only does NOT make it watch-only. Enforce watch-only on the
## Ignition side (a display-only view, or a read-only session role) before framing
## a control-capable HMI in a customer Command Center. See README.md and
## .claude/rules/fieldbus-readonly.md.

worker_processes 1;
events { worker_connections 256; }

http {
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # WS needs a long read timeout so the socket survives between live pushes.
    proxy_connect_timeout 3s;
    proxy_send_timeout    75s;
    proxy_read_timeout    75s;
    send_timeout          75s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8890;
        server_name _;

        # Health endpoint for the compose healthcheck + a VPS upstream check.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Everything else: 1:1 to the gateway. Origin-root, so Perspective's
        # absolute /res|/data|/system paths + its WS resolve correctly.
        location / {
            proxy_pass http://ignition-gateway:8088;
            proxy_http_version 1.1;

            # WebSocket upgrade — without these the Perspective socket never opens.
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # The make-or-break: Ignition sends X-Frame-Options: SAMEORIGIN
            # gateway-wide (and may send CSP). Strip both so the Hub can frame it
            # (the Hub's own CSP frame-src still gates which origins may be framed).
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;

            proxy_buffering off;   # live streams, not cacheable docs
        }
    }
}
