# Phase 5 — Video 13: "Ask the Conveyor What Happened"
# Tier 3 fault-detective demo. 6 frames, ~50s. All assets are real screenshots
# of the live Fault Detective HMI + the real PMC bench photo (2026-05-31).
# Source script: content_strategy/output/scripts/tier3/video-13-ask-the-conveyor-what-happened.md
slug: phase5-video-13-ask-conveyor
output_dir: marketing/videos/2026-05-31-phase5-demos/video-13-ask-conveyor
width: 1920
height: 1080
zoom_amount: 0.012        # playbook default — ~1.4% over 5s, UI text stays sharp
transition_duration: 0.4
fit_mode: letterbox       # preserve all source pixels (tall screenshots)
tts_voice: onyx
tts_model: gpt-4o-mini-tts
voiceover_style: |
  Adult male, 40s, calm and direct. Sounds like a senior field engineer who
  has worked in heavy manufacturing for 15 years — knowledgeable without
  being academic, confident without being aggressive. Does not perform
  enthusiasm. States facts and lets the listener draw conclusions.

  Pacing: 130–140 words per minute. Steady. Slight pause after key claims —
  functional, not dramatic. No acceleration on product names or feature
  callouts; treat them as nouns, not reveals.

  Tone: neutral American accent, no regional markers. Clean consonants.
  Comfortable with industrial vocabulary (fault codes, torque specs, PLC,
  CMMS, VFD, MTBF). Does not soften or inflate language. Says "this finds the
  answer" not "this amazingly intelligent AI instantly surfaces the precise
  answer you need."

  Avoid: upward inflection on statements, marketing superlatives, breathless
  pacing on product reveals, hesitation fillers, reading the style brief
  itself aloud.
frames:
  - image: docs/promo-screenshots/2026-05-27_fault-detective-normal_desktop.png
    narration: "Here's a conveyor running clean — every photo-eye green, status OK. Watch what happens when a twenty-four-volt branch fuse blows."
  # Hero crops (1440x780) of the full-page captures — the 1440x2200 originals
  # letterbox to ~707px wide (proof text tiny). Crop keeps the Conveyor View
  # diagram + "waiting on" diagnosis panel so "BRANCH FUSE LOSS (95%)" fills the
  # frame. Re-render (without --skip-tts) to pick these up.
  - image: docs/promo-screenshots/2026-06-01_fault-detective-confirmation-hero-crop_desktop.png
    narration: "Three photo-eyes go dark at once. MIRA calls it: branch fuse loss on F2, ninety-five percent confidence."
  - image: docs/promo-screenshots/2026-06-01_fault-detective-diagnosis-hero-crop_desktop.png
    narration: "It shows the evidence — fuse F2 blown, all three sensors debounced false — then waits for you to confirm before it troubleshoots."
  - image: docs/promo-screenshots/2026-05-31_pmc-station-before-real-bench_photo.jpg
    narration: "This isn't a sandbox. It's a real Micro 820, a real GS10 drive, real photo-eyes on the bench."
  - image: docs/promo-screenshots/2026-05-30_command-center-LIVE-real-probe_desktop.png
    narration: "Every diagnosis ties to a specific PLC tag and register. No guessing about what the sensor might mean."
  - image: docs/promo-screenshots/2026-05-29_command-center-tree-live_desktop.png
    narration: "Grounded in your plant data. See what your equipment can tell you — request a demo at factorylm.com."
