#   atlas-asset-detail.png            — Atlas asset detail page with PM history
#   atlas-schedule-calendar.png       — Atlas PM calendar view
#   hub-activated-onboarding.png      — /activated page with Loom video

---

stories:

  # ─────────────────────────────────────────────────────────────────────────────
  # STORY 1: "The 60-Second Setup"
  # Audience: plant managers evaluating new software
  # Duration: ~75 seconds
  # Value prop: zero IT, no training needed, live in one email
  # ─────────────────────────────────────────────────────────────────────────────
