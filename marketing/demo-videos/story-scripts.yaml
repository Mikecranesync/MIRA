  # ─────────────────────────────────────────────────────────────────────────────
  # STORY 2: "Fault Code in 30 Seconds"
  # Audience: maintenance technicians, floor-level demos
  # Duration: ~60 seconds
  # Value prop: faster answer than any manual, with a source you can trust
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "fault-code-30-seconds"
    title: "Fault Code in 30 Seconds"
    description: >
      The core AI diagnostic loop: a real fault code (PowerFlex 755 F005 DC bus
      undervoltage) gets typed into MIRA chat, answer streams back in seconds
      with a manual citation. Shows the technician's POV.
    output: "marketing/videos/demo-fault-code-30s.mp4"
    target_duration_seconds: 60

    audio:
      recording_folder: "marketing/demo-videos/recordings/fault-code-30s/"
      style_note: "Fast-paced. Like a tech talking on the radio. Short sentences."

    shots:
      - id: 1
        file: "docs/promo-screenshots/2026-04-27_workorder-detail-from-manual_desktop.png"
        role: "The fault — real scenario"
        beats:
          - narration: "PowerFlex 755. F005 fault. DC bus undervoltage."
            focal: {cx: 0.50, cy: 0.25, zoom: 1.5}
            target: "Fault code display or work order header"
            duration: 4.0

          - narration: "Normally you'd pull the manual. Flip to section six. Scan three pages."
            focal: {cx: 0.50, cy: 0.50, zoom: 1.2}
            target: "Mid-page content"
            duration: 5.0

      - id: 2
        # NEEDS CAPTURE: hub-chat-fault-question.png
        file: "docs/promo-screenshots/2026-04-27_knowledge-indexed-manuals_desktop.png"
        role: "MIRA chat — question typed"
        screenshot_needed: true
        screenshot_url: "https://app.factorylm.com (authenticated) — MIRA chat window with F005 question typed"
        beats:
          - narration: "Instead, open MIRA. Type the fault code."
            focal: {cx: 0.50, cy: 0.70, zoom: 1.8}
            target: "Chat input / query box"
            duration: 4.0

      - id: 3
        # NEEDS CAPTURE: hub-chat-fault-answer.png
        file: "docs/promo-screenshots/2026-04-27_workorders-auto-generated_desktop.png"
        role: "MIRA response — streaming answer"
        screenshot_needed: true
        screenshot_url: "https://app.factorylm.com (authenticated) — MIRA response streaming with citation"
        beats:
          - narration: "In seconds: DC bus undervoltage. Check input line voltage at L1, L2, L3."
            focal: {cx: 0.50, cy: 0.40, zoom: 1.6}
            target: "AI response text"
            duration: 6.0

          - narration: "Verify the pre-charge resistor. Check drive parameter A544."
            focal: {cx: 0.50, cy: 0.55, zoom: 1.8}
            target: "Detailed steps in response"
            duration: 5.0

          - narration: "Source: PowerFlex 755 Installation Manual, Section 6-2, Page 184."
            focal: {cx: 0.50, cy: 0.80, zoom: 2.2}
            target: "Citation block at bottom of response"
            duration: 5.5

      - id: 4
        file: "docs/promo-screenshots/2026-04-27_workorders-auto-generated_desktop.png"
        role: "Work order auto-generated"
        beats:
          - narration: "MIRA creates the work order automatically. Assigned. Tracked. Done."
            focal: {cx: 0.50, cy: 0.40, zoom: 1.3}
            target: "Work order list / auto-generated badge"
            duration: 5.0

          - narration: "That's thirty seconds from fault to fix."
            focal: {cx: 0.50, cy: 0.50, zoom: 1.0}
            target: "Full pull-back"
            duration: 4.0

