# MIRA Demo Video Story Scripts
# Format: storyboard_v2.yaml-compatible, adapted for real app screenshots + user-recorded voiceover
#
# PIPELINE NOTES:
#   - Images: real screenshots from docs/promo-screenshots/ (not AI panels)
#   - Audio: user records their own voice; narration= is the script they read
#   - focal: canvas-normalized coords (0-1) for Ken Burns camera; same zoompan model as v2
#   - Each "story" is an independent video (~60-120s) suitable for YouTube, LinkedIn, or email
#   - Build with: build_video_v2.py --storyboard marketing/demo-videos/story-scripts.yaml --story <story_id>
#
# RECORDING TIPS for the user:
#   - Speak at 85% normal speed — the 0.9x TTS speed in v2 was tuned for this pace
#   - Pause 1 full second between sentences (the pipeline inserts silence between beats)
#   - Record in a quiet room with no background hum — factory ambience is added in post
#   - One take per beat is ideal; the assembler matches audio duration to screen hold time
#
# SCREENSHOT STATUS (as of 2026-05-10):
#   docs/promo-screenshots/2026-05-10_homepage-hero_desktop.png       ✓ captured
#   docs/promo-screenshots/2026-05-10_cmms-signin_desktop.png         ✓ captured
#   docs/promo-screenshots/2026-05-10_pricing-page_desktop.png        ✓ captured
#   docs/promo-screenshots/2026-05-10_qr-asset-sheet_desktop.png      ✓ captured
#   docs/promo-screenshots/2026-05-10_atlas-cmms-login_desktop.png    ✓ captured
#   docs/promo-screenshots/2026-04-27_knowledge-indexed-manuals_desktop.png  ✓ existing
#   docs/promo-screenshots/2026-04-27_workorders-auto-generated_desktop.png  ✓ existing
#   docs/promo-screenshots/2026-04-27_schedule-calendar-with-pms_desktop.png ✓ existing
#   docs/promo-screenshots/2026-04-27_assets-with-pm-count_desktop.png       ✓ existing
#   docs/promo-screenshots/2026-04-27_workorder-detail-from-manual_desktop.png ✓ existing
#   docs/promo-screenshots/2026-04-30_hub-login_desktop.png           ✓ existing
#
# SCREENSHOTS STILL NEEDED (capture authenticated flows after login):
#   hub-chat-fault-question.png       — MIRA chat window, question typed
#   hub-chat-fault-answer.png         — MIRA response streaming with citation
#   hub-chat-citation-expanded.png    — Citation panel open (manual §, date)
#   hub-upload-pdf-progress.png       — PDF upload in progress (progress bar)
#   hub-upload-pdf-complete.png       — "Manual indexed" success state
#   hub-qr-channel-chooser.png        — /m/:tag/choose page on mobile
#   hub-qr-report-form.png            — /m/:tag/report guest form on mobile
