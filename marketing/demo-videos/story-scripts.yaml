    description: >
      Full product tour: problem awareness → sign-up → upload manual → AI answer
      with citation → auto work orders → PM calendar → QR floor access → pricing CTA.
      Designed for LinkedIn / cold email. Shows every major feature.
    output: "marketing/videos/demo-60-second-setup.mp4"
    target_duration_seconds: 110

    video:
      width: 1920
      height: 1080
      fps: 24
      shot_xfade_duration: 0.5
      intra_beat_pan_duration: 0.5

    audio:
      recording_folder: "marketing/demo-videos/recordings/60-second-setup/"
      style_note: "Calm, direct, no buzzwords. Like a senior tech explaining to a peer."

