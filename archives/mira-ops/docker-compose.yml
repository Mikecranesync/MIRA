services:
  mira-ops:
    build:
      context: .
    container_name: mira-ops
    ports:
      - "127.0.0.1:${OPS_PORT:-8500}:8500"
    environment:
      - NEON_DATABASE_URL=${NEON_DATABASE_URL}
      - CELERY_BROKER_URL=redis://mira-redis:6379/0
    networks:
      - core-net
    depends_on:
      mira-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mira-flower:
    image: mher/flower:2.0.1
    container_name: mira-flower
    command: celery --broker=redis://mira-redis:6379/0 flower --port=5555
    ports:
      - "127.0.0.1:${FLOWER_PORT:-5555}:5555"
    networks:
      - core-net
    depends_on:
      mira-redis:
        condition: service_healthy
    restart: unless-stopped

networks:
  core-net:
    external: true
