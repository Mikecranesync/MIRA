<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MIRA Ops{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a08;
      color: #b0aca2;
      min-height: 100vh;
    }
    a { color: #f0a030; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    .nav {
      background: #1e1e1b;
      border-bottom: 1px solid #2a2a26;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      color: #f0a030;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a {
      color: #7a766c;
      font-size: 14px;
      font-weight: 500;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: #e4e0d8;
      border-bottom-color: #f0a030;
      text-decoration: none;
    }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: #1e1e1b;
      border: 1px solid #2a2a26;
      border-radius: 6px;
      padding: 20px;
    }
    .card-value {
      font-size: 32px;
      font-weight: 700;
      color: #e4e0d8;
      line-height: 1;
    }
    .card-label {
      font-size: 13px;
      color: #7a766c;
      margin-top: 4px;
    }
    .card-accent { border-left: 3px solid #f0a030; }

    /* Tables */
    .table-wrap {
      background: #1e1e1b;
      border: 1px solid #2a2a26;
      border-radius: 6px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th {
      text-align: left;
      padding: 12px 16px;
      color: #7a766c;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #2a2a26;
    }
    td {
      padding: 10px 16px;
      border-bottom: 1px solid #1a1a17;
      color: #b0aca2;
    }
    tr:hover td { background: #151513; }
    tr:last-child td { border-bottom: none; }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-draft { background: #2a2a26; color: #7a766c; }
    .badge-approved { background: #1a3a1a; color: #4CAF50; }
    .badge-rejected { background: #3a1a1a; color: #f44336; }
    .badge-published { background: #1a2a3a; color: #2196F3; }
    .badge-scheduled { background: #3a2a1a; color: #f0a030; }

    /* Platform badges */
    .platform {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      background: #2a2a26;
      color: #b0aca2;
    }
    .platform-linkedin { color: #0A66C2; }
    .platform-x { color: #e4e0d8; }
    .platform-reddit { color: #FF4500; }
    .platform-facebook { color: #1877F2; }
    .platform-tiktok { color: #00f2ea; }
    .platform-instagram { color: #E4405F; }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-approve { background: #4CAF50; color: #0a0a08; }
    .btn-reject { background: #f44336; color: #fff; }
    .btn-primary { background: #f0a030; color: #0a0a08; }
    .btn-ghost {
      background: transparent;
      color: #7a766c;
      border: 1px solid #2a2a26;
    }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Actions row */
    .actions { display: flex; gap: 6px; }

    /* Flash */
    .flash {
      background: #1a3a1a;
      border: 1px solid #4CAF50;
      color: #4CAF50;
      padding: 10px 16px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    /* Section headers */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .section-title {
      color: #e4e0d8;
      font-size: 18px;
      font-weight: 600;
    }

    /* Text truncation */
    .truncate {
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Worker status */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-active { background: #4CAF50; }
    .status-idle { background: #7a766c; }
    .status-error { background: #f44336; }

    /* Responsive */
    @media (max-width: 768px) {
      .nav { padding: 12px 16px; gap: 16px; flex-wrap: wrap; }
      .nav-links { gap: 12px; }
      .container { padding: 16px; }
      .card-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">MIRA Ops</span>
    <div class="nav-links">
      <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/content" class="{% if active_page == 'content' %}active{% endif %}">Content</a>
      <a href="/social" class="{% if active_page == 'social' %}active{% endif %}">Social</a>
      <a href="/workers" class="{% if active_page == 'workers' %}active{% endif %}">Workers</a>
    </div>
  </nav>

  <div class="container">
    <div id="flash">
      {% if request.query_params.get('flash') %}
      <div class="flash">Task queued successfully.</div>
      {% endif %}
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
