services:
  mira-atlas-hub-sync:
    image: python:3.12-slim
    container_name: mira-atlas-hub-sync
    restart: unless-stopped
    networks:
      - factorylm-cmms_default
    volumes:
      - /opt/mira/tools/atlas-hub-sync.py:/script.py:ro
    environment:
      NEON_DATABASE_URL: ${NEON_DATABASE_URL}
      ATLAS_DATABASE_URL: postgresql://atlas:${ATLAS_DB_PASSWORD:-factorylm2026}@cmms_db:5432/atlas
      ATLAS_COMPANY_ID: "2"
      HUB_TENANT_ID: 78917b56-f85f-43bb-9a08-1bb98a6cd6c3
      SYNC_INTERVAL_SECONDS: "60"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    command: >
      bash -c "pip install --quiet --no-cache-dir psycopg2-binary==2.9.10 &&
               python /script.py --loop"
    healthcheck:
      test: ["CMD-SHELL", "test $$(($$(date +%s) - $$(stat -c %Y /tmp/last-sync 2>/dev/null || echo 0))) -lt 180"]
      interval: 60s
      timeout: 5s
      retries: 3

networks:
  factorylm-cmms_default:
    external: true
