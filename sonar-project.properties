# MIRA monorepo SonarQube analysis scope.
# Project identity is injected by .github/workflows/sonarqube.yml so the same
# checked-in scope works for self-hosted SonarQube Server or SonarQube Cloud.

sonar.projectName=MIRA
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

sonar.sources=\
factorylm_ai,\
mira-bots/shared,\
mira-bots/telegram,\
mira-bots/slack,\
mira-core/mira-ingest,\
mira-mcp,\
mira-pipeline,\
mira-relay,\
mira-connect,\
mira-connectors,\
mira-contextualizer,\
mira-crawler,\
mira-fault-detective,\
mira-fault-sim,\
mira-plc-parser,\
mira-scan-monday/backend,\
mira-sidecar,\
mira-hub/src,\
mira-hub/scripts,\
mira-web/src,\
mira-web/scripts,\
mira-machine-logic-graph/src,\
mira-trend-viewer/js,\
printsense,\
simlab,\
tools/print_of_day,\
tools/lead-hunter

sonar.tests=\
tests,\
mira-bots/tests,\
mira-connect/tests,\
mira-connectors/tests,\
mira-contextualizer/tests,\
mira-core/mira-ingest/tests,\
mira-fault-detective/tests,\
mira-fault-sim/tests,\
mira-hub/tests,\
mira-plc-parser/tests,\
mira-relay/tests,\
mira-scan-monday/backend/tests,\
mira-trend-viewer/test,\
mira-web/src/__tests__,\
materialized_evidence/tests

sonar.exclusions=\
**/node_modules/**,\
**/.next/**,\
**/dist/**,\
**/build/**,\
**/.venv/**,\
**/venv/**,\
**/__pycache__/**,\
**/.pytest_cache/**,\
**/test-results/**,\
**/playwright-report/**,\
**/coverage/**,\
**/htmlcov/**,\
**/migrations/**,\
**/fixtures/**,\
**/examples/**,\
docs/**,\
wiki/**,\
archives/**,\
dogfood-output/**,\
outputs/**,\
reports/**,\
marketing/videos/**,\
marketing/comic-pipeline/reference/**,\
mira_copy/outputs/**

sonar.test.inclusions=\
**/test_*.py,\
**/*_test.py,\
**/*.test.ts,\
**/*.test.tsx,\
**/*.spec.ts,\
**/*.spec.tsx

sonar.coverage.exclusions=\
tests/**,\
**/tests/**,\
**/*.test.ts,\
**/*.test.tsx,\
**/*.spec.ts,\
**/*.spec.tsx,\
**/migrations/**

sonar.cpd.exclusions=\
**/migrations/**,\
**/fixtures/**,\
**/examples/**,\
internet_print_tests/**
