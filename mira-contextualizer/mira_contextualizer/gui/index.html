<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FactoryLM Contextualizer</title>
<style>
  :root { --bg:#f3f4f6; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --accent:#4f46e5;
          --green:#16a34a; --red:#dc2626; --amber:#d97706; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.45 "Segoe UI",system-ui,sans-serif; color:var(--ink); background:var(--bg); }
  header { background:#111827; color:#fff; padding:10px 16px; display:flex; align-items:center; gap:14px; }
  header h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:.2px; }
  header .sub { color:#9ca3af; font-size:12px; }
  .tabs { display:flex; gap:2px; background:#1f2937; }
  .tabs button { background:transparent; color:#cbd5e1; border:0; padding:8px 16px; cursor:pointer; font-size:13px; }
  .tabs button.active { background:var(--bg); color:var(--ink); font-weight:600; }
  main { padding:16px; max-width:1100px; margin:0 auto; }
  .row { display:flex; gap:16px; align-items:flex-start; }
  .panel { background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px; }
  .projects { width:300px; flex:none; }
  .work { flex:1; min-width:0; }
  h2 { font-size:13px; text-transform:uppercase; color:var(--muted); margin:0 0 10px; letter-spacing:.4px; }
  input,button,select { font:inherit; }
  input[type=text]{ width:100%; padding:6px 8px; border:1px solid var(--line); border-radius:6px; }
  .btn { border:1px solid var(--line); background:#fff; border-radius:6px; padding:6px 10px; cursor:pointer; }
  .btn:hover{ background:#f9fafb; }
  .btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn.primary:hover{ background:#4338ca; }
  .btn:disabled{ opacity:.5; cursor:not-allowed; }
  ul.plist{ list-style:none; margin:0; padding:0; }
  ul.plist li{ padding:8px; border-radius:6px; cursor:pointer; border:1px solid transparent; }
  ul.plist li:hover{ background:#f9fafb; }
  ul.plist li.sel{ background:#eef2ff; border-color:#c7d2fe; }
  ul.plist .meta{ color:var(--muted); font-size:12px; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th,td{ text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); }
  th{ font-size:11px; text-transform:uppercase; color:var(--muted); }
  td.tag{ font-family:Consolas,monospace; font-weight:600; }
  td.uns{ font-family:Consolas,monospace; color:#374151; word-break:break-all; }
  tr.accepted{ background:#f0fdf4; } tr.rejected{ background:#fef2f2; opacity:.6; }
  .chip{ background:#eef2ff; color:#3730a3; border-radius:4px; padding:1px 6px; font-size:11px; margin-right:3px; }
  .conf-high{ color:var(--green); font-weight:600; } .conf-med{ color:var(--amber); font-weight:600; }
  .conf-low{ color:var(--muted); }
  .pill{ border-radius:4px; padding:2px 8px; font-size:11px; font-weight:600; }
  .pill.accepted{ background:#dcfce7; color:#166534; } .pill.rejected{ background:#fee2e2; color:#991b1b; }
  .banner{ background:#fffbeb; border:1px solid #fde68a; color:#92400e; padding:8px 10px; border-radius:6px; font-size:12px; margin-bottom:10px; }
  .score{ display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--line); border-radius:8px; padding:8px 12px; margin-bottom:10px; }
  .score .grade{ font-size:13px; font-weight:700; white-space:nowrap; }
  .score .bar{ flex:1; height:8px; background:#eee; border-radius:4px; overflow:hidden; }
  .score .bar>span{ display:block; height:100%; }
  .score .gaps{ font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:46%; }
  .toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#111827; color:#fff; padding:8px 14px; border-radius:6px; font-size:13px; box-shadow:0 4px 14px rgba(0,0,0,.25); }
  .toolbar{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
  .muted{ color:var(--muted); }
  .work.drag{ outline:2px dashed var(--accent); outline-offset:-6px; background:#f5f3ff; }
  .sources{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .src{ font-size:11px; padding:2px 8px; border-radius:10px; border:1px solid var(--line); background:#fafafa; }
  .src.done{ border-color:#bbf7d0; background:#f0fdf4; } .src.error{ border-color:#fecaca; background:#fef2f2; }
  td.tag{ cursor:help; }
</style>
</head>
<body>
<header>
  <h1>FactoryLM Contextualizer</h1>
  <span class="sub">offline · deterministic · no internet required</span>
</header>
<div class="tabs">
  <button id="tab-plc" class="active" onclick="setMode('plc')">PLC Tag Mapper</button>
  <button id="tab-doc" onclick="setMode('doc')">Documents</button>
</div>

<main>
  <div class="row">
    <!-- Projects -->
    <div class="panel projects">
      <h2>Projects</h2>
      <div style="display:flex; gap:6px; margin-bottom:10px;">
        <input id="newName" type="text" placeholder="New project name" />
        <button class="btn primary" onclick="createProject()">+</button>
      </div>
      <ul class="plist" id="projectList"></ul>
    </div>

    <!-- Work area -->
    <div class="panel work" id="work">
      <div id="banner" class="banner" style="display:none"></div>
      <div id="scorecard"></div>
      <div class="sources" id="sources"></div>
      <div class="toolbar">
        <strong id="projTitle" class="muted">Select or create a project</strong>
        <span style="flex:1"></span>
        <input id="fileInput" type="file" multiple style="display:none" onchange="uploadFile(event)" />
        <input id="dirInput" type="file" webkitdirectory directory multiple style="display:none" onchange="importCcwFolder(event)" />
        <button class="btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()" disabled>Upload source</button>
        <button class="btn" id="ccwBtn" onclick="document.getElementById('dirInput').click()" disabled title="Pick a CCW project folder — parses MbSrvConf.xml, LogicalValues.csv, .st/.stf/.iecst, .ccwmod, RmcVariables and merges them">CCW Project</button>
        <button class="btn" id="refreshBtn" onclick="loadExtractions()" disabled>Refresh</button>
        <button class="btn" id="exportBtn" onclick="exportUns()" disabled>Export UNS</button>
        <button class="btn primary" id="bundleBtn" onclick="exportBundle()" disabled>Export Bundle</button>
      </div>
      <table>
        <thead><tr><th>Tag</th><th>Roles</th><th>Proposed UNS</th><th>Conf.</th><th>Source</th><th style="text-align:right">Decision</th></tr></thead>
        <tbody id="rows"><tr><td colspan="6" class="muted" style="padding:24px; text-align:center">No project open.</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<script>
let MODE = "plc";
let CURRENT = null;        // current project id
let PROJECTS = [];

const $ = (id) => document.getElementById(id);

function toast(msg){
  const t = document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2600);
}
async function api(path, opts){
  const res = await fetch(path, opts);
  const j = await res.json().catch(()=> ({}));
  if(!res.ok) throw new Error(j.error || ("HTTP "+res.status));
  return j;
}

function setMode(m){
  MODE = m;
  $("tab-plc").classList.toggle("active", m==="plc");
  $("tab-doc").classList.toggle("active", m==="doc");
  $("fileInput").setAttribute("accept", m==="plc"
    ? ".l5x,.csv,.xml,.st,.vssettings,.ccwsln"
    : ".pdf,.docx,.xlsx,.txt,.md,.png,.jpg,.jpeg,.tiff");
  const b=$("banner");
  if(m==="plc"){ b.style.display="block"; b.textContent="PLC mode: upload Rockwell L5X, or a CCW project's MbSrvConf.xml (Modbus map) and LogicalValues.csv (variables). You can select/drop several files at once."; }
  else { b.style.display="block"; b.textContent="Documents mode: drop manuals/datasheets (PDF/Word/Excel/images). Digital docs extract now; scanned-image OCR needs the bundled Tesseract."; }
}

async function loadProjects(){
  const j = await api("/api/projects");
  PROJECTS = j.projects || [];
  const ul = $("projectList"); ul.innerHTML="";
  if(!PROJECTS.length){ ul.innerHTML='<li class="meta">No projects yet.</li>'; return; }
  for(const p of PROJECTS){
    const li=document.createElement("li");
    li.className = p.id===CURRENT ? "sel":"";
    li.onclick=()=>openProject(p.id);
    li.innerHTML = `<div>${escapeHtml(p.name)}</div>
      <div class="meta">${p.sourceCount} files · ${p.extractionCount} tags · ${p.acceptedCount} accepted</div>`;
    ul.appendChild(li);
  }
}
async function createProject(){
  const name = $("newName").value.trim();
  if(!name) return;
  try{ const j = await api("/api/projects",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})});
    $("newName").value=""; CURRENT=j.project.id; await loadProjects(); await openProject(CURRENT); toast("Project created");
  }catch(e){ toast(e.message); }
}
async function openProject(id){
  CURRENT=id;
  if(location.hash !== "#p="+id) location.hash = "p="+id;  // shareable in-app deep link
  const p = PROJECTS.find(x=>x.id===id);
  $("projTitle").textContent = p? p.name : "Project";
  $("projTitle").classList.remove("muted");
  ["uploadBtn","ccwBtn","refreshBtn","exportBtn","bundleBtn"].forEach(b=>$(b).disabled=false);
  await loadProjects(); await loadSources(); await loadExtractions();
}
async function loadSources(){
  const el=$("sources"); el.innerHTML="";
  if(!CURRENT) return;
  try{
    const j = await api(`/api/projects/${CURRENT}`);
    for(const s of (j.project.sources||[])){
      const sp=document.createElement("span");
      sp.className = "src "+(s.status||"");
      sp.title = s.errorMessage || "";
      sp.textContent = `${s.fileName} · ${s.status}`;
      el.appendChild(sp);
    }
  }catch(e){ /* sources strip is best-effort */ }
}
async function loadExtractions(){
  if(!CURRENT) return;
  const j = await api(`/api/projects/${CURRENT}/extractions`);
  renderRows(j.extractions||[]);
  loadScorecard();
}
async function loadScorecard(){
  const el=$("scorecard"); if(!el) return;
  if(!CURRENT){ el.innerHTML=""; return; }
  try{
    const s=await api(`/api/projects/${CURRENT}/scorecard`);
    const color = s.score>=85?"#16a34a":s.score>=65?"#4f46e5":s.score>=45?"#d97706":"#9ca3af";
    const gaps=(s.topGaps||[]).slice(0,3).map(g=>g.label).join(" · ");
    el.innerHTML = `<div class="score" title="${escapeHtml(s.summary||'')}">
      <span class="grade" style="color:${color}">${escapeHtml(s.grade)} · ${s.score}/100</span>
      <span class="bar"><span style="width:${s.score}%;background:${color}"></span></span>
      <span class="gaps">${gaps?("Next: "+escapeHtml(gaps)):"Looking good"}</span></div>`;
  }catch(e){ el.innerHTML=""; }
}
function renderRows(rows){
  const tb=$("rows"); tb.innerHTML="";
  if(!rows.length){ tb.innerHTML='<tr><td colspan="6" class="muted" style="padding:24px; text-align:center">No tags yet — upload a PLC export.</td></tr>'; return; }
  for(const e of rows){
    const tr=document.createElement("tr");
    tr.className = e.status==="accepted"?"accepted":e.status==="rejected"?"rejected":"";
    const conf = e.confidence==null?"—":e.confidence>=0.85?'<span class="conf-high">high</span>':e.confidence>=0.5?'<span class="conf-med">med</span>':'<span class="conf-low">low</span>';
    const roles = (e.roles||[]).map(r=>`<span class="chip">${escapeHtml(r)}</span>`).join("")||'<span class="muted">—</span>';
    const ment = (e.evidenceJson&&e.evidenceJson.mentions&&e.evidenceJson.mentions[0])||null;
    const prov = ment ? `${ment.file}${ment.page?(" p."+ment.page):""}: ${ment.snippet}` : (e.evidenceJson&&e.evidenceJson.source_format?("format: "+e.evidenceJson.source_format):"");
    const decision = e.status==="pending"
      ? `<button class="btn" onclick="decide('${e.id}','accepted')">Accept</button>
         <button class="btn" onclick="decide('${e.id}','rejected')">Reject</button>`
      : `<span class="pill ${e.status}">${e.status}</span>`;
    tr.innerHTML = `<td class="tag" title="${escapeHtml(prov)}">${escapeHtml(e.tagName)}</td><td>${roles}</td>
      <td class="uns">${escapeHtml(e.unsPathProposed||"—")}</td><td>${conf}</td>
      <td class="muted">${escapeHtml(e.fileName||"—")}</td><td style="text-align:right">${decision}</td>`;
    tb.appendChild(tr);
  }
}
async function decide(id,status){
  try{ await api(`/api/extractions/${id}`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status})});
    await loadExtractions(); await loadProjects();
  }catch(e){ toast(e.message); }
}
function isCcwProjectFile(name){
  const n=name.toLowerCase(), base=n.split(/[\\/]/).pop();
  return /\.(st|stf|iecst|ccwmod|acfproj|ccwsln)$/.test(n)
    || base==="rmcvariables" || base==="logicalvalues.csv"
    || (base.startsWith("mbsrvconf") && base.endsWith(".xml"))
    || base==="logicview.xml" || base==="devicepref.xml";
}
async function importCcwFolder(ev){
  const all=[...ev.target.files]; ev.target.value="";
  if(!CURRENT || !all.length) return;
  const picked=all.filter(f=>isCcwProjectFile(f.name));
  if(!picked.length){ toast("No CCW files found in that folder"); return; }
  const projectName=((all[0].webkitRelativePath||"").split("/")[0])||"CCW project";
  toast(`Reading ${picked.length} CCW files…`);
  const files=[];
  for(const f of picked){ files.push({name:f.name, text: await f.text()}); }
  try{
    const j=await api(`/api/projects/${CURRENT}/ccw-import`,{method:"POST",
      headers:{"Content-Type":"application/json"}, body:JSON.stringify({files, projectName})});
    toast(`Imported ${projectName}: ${j.extractions} tags from ${j.fileCount} files${j.controller?(" · "+j.controller):""}`);
    await loadSources(); await loadExtractions(); await loadProjects();
  }catch(e){ toast(e.message); }
}
function uploadFile(ev){ const files=[...ev.target.files]; ev.target.value=""; files.forEach(doUpload); }
function doUpload(file){
  if(!file || !CURRENT) return;
  if(/\.(zip|ccwx)$/i.test(file.name)){   // CCW archive → unzip server-side, import whole project
    const zr=new FileReader();
    zr.onload=async()=>{ try{
      const j=await api(`/api/projects/${CURRENT}/ccw-import`,{method:"POST",
        headers:{"Content-Type":"application/octet-stream","X-Project-Name":file.name}, body:zr.result});
      toast(`Imported ${file.name}: ${j.extractions} tags from ${j.fileCount} files${j.controller?(" · "+j.controller):""}`);
      await loadSources(); await loadExtractions(); await loadProjects();
    }catch(e){ toast(e.message); } };
    zr.readAsArrayBuffer(file); return;
  }
  const reader = new FileReader();
  const isText = (MODE === "plc");   // PLC/CCW = text; Documents = bytes
  reader.onload = async () => {
    try{
      let j;
      if(isText){
        j = await api(`/api/projects/${CURRENT}/sources`,{method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({fileName:file.name, text:reader.result})});
        if(j.extractions){ toast(`Extracted ${j.extractions} tags from ${file.name}`); }
        else if(j.note){ toast(`${file.name}: ${j.note}`); }   // never silent (e.g. .vssettings guidance)
        else { toast(`Uploaded ${file.name}`); }
      } else {
        // Documents: send raw bytes; the server runs OCR/extraction → Document IR → candidates.
        j = await api(`/api/projects/${CURRENT}/sources`,{method:"POST",
          headers:{"Content-Type":"application/octet-stream","X-File-Name":file.name},
          body:reader.result});
        toast(`Read ${file.name}: ${j.chars} chars → ${j.extractions} candidates${j.warnings&&j.warnings.length?" ("+j.warnings[0]+")":""}`);
      }
      await loadSources(); await loadExtractions(); await loadProjects();
    }catch(e){ toast(e.message); }
  };
  if(isText) reader.readAsText(file); else reader.readAsArrayBuffer(file);
}
// Drag-and-drop: drop any file(s) onto the work panel to ingest.
(function initDrop(){
  const work=$("work");
  const stop=(e)=>{ e.preventDefault(); e.stopPropagation(); };
  ["dragenter","dragover"].forEach(ev=>work.addEventListener(ev,(e)=>{ stop(e); if(CURRENT) work.classList.add("drag"); }));
  ["dragleave","drop"].forEach(ev=>work.addEventListener(ev,(e)=>{ stop(e); work.classList.remove("drag"); }));
  work.addEventListener("drop",(e)=>{ if(!CURRENT){ toast("Open a project first"); return; }
    for(const f of e.dataTransfer.files) doUpload(f); });
})();
async function exportUns(){
  if(!CURRENT) return;
  try{
    const res = await fetch(`/api/projects/${CURRENT}/export?format=uns`);
    const j = await res.json(); if(!res.ok) throw new Error(j.error||"export failed");
    const blob = new Blob([JSON.stringify(j,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="uns.json"; a.click();
    toast(`Exported ${j.signals.length} accepted signals`);
  }catch(e){ toast(e.message); }
}
function exportBundle(){
  if(!CURRENT) return;
  window.location.href = `/api/projects/${CURRENT}/export?format=bundle`;  // server sends a zip download
  toast("Building Factory Context Bundle…");
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function routeHash(){ const m=location.hash.match(/p=([0-9a-f]+)/); if(m) openProject(m[1]); }
window.addEventListener("hashchange", routeHash);

setMode("plc");
loadProjects().then(routeHash);
</script>
</body>
</html>
