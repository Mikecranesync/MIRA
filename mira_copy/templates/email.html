<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <style>@import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap");</style>
  <title>{{SUBJECT}}</title>
  <!--[if !mso]><!--><meta http-equiv="X-UA-Compatible" content="IE=edge" /><!--<![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#0a0a08;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <!-- Preview text -->
  <div style="display:none;max-height:0;overflow:hidden;">{{PREVIEW_TEXT}}</div>

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a08;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

          <!-- Header -->
          <tr>
            <td style="padding-bottom:32px;">
              <span style="color:#f0a030;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;">FactoryLM</span>
            </td>
          </tr>

          <!-- Hero -->
          <tr>
            <td style="border-left:3px solid #f0a030;padding-left:20px;padding-bottom:32px;">
              <h1 style="margin:0 0 8px 0;color:#e4e0d8;font-size:26px;font-weight:700;line-height:1.2;">{{HEADLINE}}</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding-bottom:32px;">
              {{BODY_HTML}}
            </td>
          </tr>

          <!-- CTA -->
          <tr>
            <td style="padding-bottom:40px;">
              <a href="{{CTA_URL}}" style="display:inline-block;background-color:#f0a030;color:#0a0a08;font-size:15px;font-weight:700;text-decoration:none;padding:14px 32px;border-radius:4px;letter-spacing:0.5px;">{{CTA_TEXT}}</a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="border-top:1px solid #1e1e1b;padding-top:24px;">
              <p style="margin:0;color:#4a4840;font-size:12px;line-height:1.6;">
                FactoryLM &mdash; AI-powered industrial maintenance<br />
                You're receiving this because you created an account at factorylm.com.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
