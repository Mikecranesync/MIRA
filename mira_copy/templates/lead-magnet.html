<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap");
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0a0a08;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #b0aca2;
      line-height: 1.6;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 60px 32px;
    }
    .brand {
      color: #f0a030;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .hero {
      border-left: 3px solid #f0a030;
      padding-left: 24px;
      margin-bottom: 48px;
    }
    .hero h1 {
      color: #e4e0d8;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .hero p {
      color: #7a766c;
      font-size: 16px;
    }
    .content h2 {
      color: #e4e0d8;
      font-size: 20px;
      font-weight: 600;
      margin: 32px 0 12px 0;
    }
    .content p {
      font-size: 15px;
      margin-bottom: 12px;
    }
    .checklist-item {
      color: #e4e0d8;
      font-size: 14px;
      padding: 6px 0;
      padding-left: 24px;
      position: relative;
    }
    .checklist-item::before {
      content: "\2610";
      position: absolute;
      left: 0;
      color: #f0a030;
    }
    .footer {
      border-top: 1px solid #1e1e1b;
      padding-top: 32px;
      margin-top: 48px;
    }
    .footer p {
      color: #4a4840;
      font-size: 12px;
    }
    .footer a {
      color: #f0a030;
      text-decoration: none;
    }
  </style>
  <title>{{TITLE}}</title>
</head>
<body>
  <div class="container">
    <div class="brand">FactoryLM</div>

    <div class="hero">
      <h1>{{TITLE}}</h1>
      <p>{{SUBTITLE}}</p>
    </div>

    <div class="content">
      {{SECTIONS}}
    </div>

    <div class="footer">
      <p>
        Built by <a href="https://factorylm.com">FactoryLM</a> &mdash; AI-powered industrial maintenance.<br />
        Try Mira free at <a href="https://app.factorylm.com">app.factorylm.com</a>
      </p>
    </div>
  </div>
</body>
</html>
