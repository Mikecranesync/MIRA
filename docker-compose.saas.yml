# MIRA SaaS v1 — minimal hosted stack
# Deploy: doppler run -p factorylm -c prd -- docker compose -f docker-compose.saas.yml up -d --build

services:
  mira-core:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    container_name: mira-core-saas
    depends_on:
      mira-sidecar:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3010:8080"
    environment:
      - WEBUI_AUTH=true
      - ENABLE_SIGNUP=true
      - ENABLE_API_KEYS=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_NAME=MIRA
      - WEBUI_ENABLE_TELEMETRY=false
      - WEBUI_CHECK_FOR_UPDATES=false
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - mira-webui-data:/app/backend/data
    networks:
      - mira-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mira-sidecar:
    build:
      context: .
      dockerfile: mira-sidecar/Dockerfile
    container_name: mira-sidecar
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_PROVIDER=anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_MODEL_ANTHROPIC=claude-sonnet-4-6
      - EMBEDDING_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - HOST=0.0.0.0
      - PORT=5000
      - CHROMA_PATH=/data/chroma
      - DOCS_BASE_PATH=/data/docs
    volumes:
      - mira-chroma:/data/chroma
      - mira-docs:/data/docs
    networks:
      - mira-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mira-ingest:
    build: ./mira-core/mira-ingest
    container_name: mira-ingest-saas
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8002:8001"
    environment:
      - NEON_DATABASE_URL=${NEON_DATABASE_URL}
      - MIRA_TENANT_ID=${MIRA_TENANT_ID}
      - OPENWEBUI_BASE_URL=http://mira-core-saas:8080
      - OPENWEBUI_API_KEY=${OPENWEBUI_API_KEY}
      - KNOWLEDGE_COLLECTION_ID=${KNOWLEDGE_COLLECTION_ID}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - EMBED_TEXT_MODEL=nomic-embed-text
    networks:
      - mira-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mira-mcp:
    build: ./mira-mcp
    container_name: mira-mcp-saas
    ports:
      - "127.0.0.1:8009:8000"
      - "127.0.0.1:8001:8001"
    environment:
      - MIRA_DB_PATH=/mira-db/mira.db
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8000
      - MCP_REST_API_KEY=${MCP_REST_API_KEY}
      - MIRA_TENANT_ID=${MIRA_TENANT_ID}
    volumes:
      - /opt/mira/data:/mira-db
    networks:
      - mira-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mira-web:
    build: ./mira-web
    container_name: mira-web
    ports:
      - "3200:3000"
    environment:
      - PORT=3000
      - PLG_JWT_SECRET=${PLG_JWT_SECRET}
      - PLG_ATLAS_ADMIN_USER=${PLG_ATLAS_ADMIN_USER:-}
      - PLG_ATLAS_ADMIN_PASSWORD=${PLG_ATLAS_ADMIN_PASSWORD:-}
      - ATLAS_API_URL=${ATLAS_API_URL:-http://cmms-backend:8080}
      - SIDECAR_URL=http://mira-sidecar:5000
      - NEON_DATABASE_URL=${NEON_DATABASE_URL}
      - MCP_REST_API_KEY=${MCP_REST_API_KEY:-}
      - PLG_DAILY_FREE_QUERIES=${PLG_DAILY_FREE_QUERIES:-5}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-noreply@factorylm.com}
    networks:
      - mira-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  mira-net:
    driver: bridge

volumes:
  mira-webui-data:
  mira-chroma:
  mira-docs:
