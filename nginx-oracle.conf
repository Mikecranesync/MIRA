# nginx for Oracle/DigitalOcean VPS — live config at /etc/nginx/sites-enabled/mira
# Deploy: scp nginx-oracle.conf factorylm-prod:/etc/nginx/sites-enabled/mira && ssh factorylm-prod nginx -s reload
# TLS: sudo certbot --nginx -d app.factorylm.com

server {
    server_name app.factorylm.com;

    add_header X-Robots-Tag "noindex, nofollow" always;
    # Security response headers (web-review issue #616) — applied site-wide
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Note: no CSP here yet — Open WebUI uses inline scripts; tightening CSP
    # requires a separate audit. Tracked under issue #616.
    client_max_body_size 100M;

    # Agent activity dashboard — static HTML, served directly from VPS filesystem
    location = /agents {
        alias /opt/mira/agent-dashboard.html;
        default_type text/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Agent API — proxied to mira-pipeline (includes public-status + authenticated endpoints)
    location /api/agents/ {
        proxy_pass http://127.0.0.1:9099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # mira-pipeline OpenAI-compat API + admin endpoints
    location /v1/ {
        proxy_pass http://127.0.0.1:9099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/briefing/ {
        proxy_pass http://127.0.0.1:9099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/identity/ {
        proxy_pass http://127.0.0.1:9099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # mira-hub root — redirect /hub/ → /hub/feed/ at nginx layer.
    # WORKAROUND: Next.js 16.2.4 standalone + basePath has a bug where the
    # basePath root request is served as 200 with empty body regardless of
    # whether the source is a Server Component (page.tsx with redirect()),
    # force-dynamic, or a Route Handler (route.ts with NextResponse.redirect).
    # Verified by direct probe to next-server inside the container — the
    # broken empty 200 originates upstream of nginx. Five PRs (#645/#647/
    # #648/#650/#651) tried to fix this in mira-hub itself; none worked.
    # See feedback_nextjs16_standalone_redirect_broken memory for details.
    # `location =` is an exact match, so /hub/feed/, /hub/login/, etc. still
    # fall through to the prefix `location /hub/` proxy_pass below.
    location = /hub/ {
        return 302 /hub/feed/;
    }
    location = /hub  { return 302 /hub/feed/; }

    # mira-hub — post-paywall customer app (Next.js standalone with basePath=/hub)
    # Container runs on 127.0.0.1:3101 and serves under /hub/ verbatim — no rewrite.
    location /hub/ {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Open WebUI — main app (catch-all; must come after specific location blocks)
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # mira-ingest API
    location /api/ingest/ {
        rewrite ^/api/ingest/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # QR test station — no-cache (mira-web :3200)
    location /qr-test {
        proxy_pass http://127.0.0.1:3200/qr-test;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # mira-mcp REST API
    location /api/mcp/ {
        rewrite ^/api/mcp/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # QR scan + admin routes (mira-web :3200)
    location /m/ {
        proxy_pass http://127.0.0.1:3200/m/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:3200/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/app.factorylm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.factorylm.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = app.factorylm.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name app.factorylm.com;
    return 404;
}

# Atlas CMMS
server {
    listen 443 ssl;
    server_name cmms.factorylm.com;
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8088/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
