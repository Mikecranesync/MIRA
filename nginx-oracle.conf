# nginx for Oracle/DigitalOcean VPS — live config at /etc/nginx/sites-enabled/mira
# Deploy: scp nginx-oracle.conf factorylm-prod:/etc/nginx/sites-enabled/mira && ssh factorylm-prod nginx -s reload
# TLS: sudo certbot --nginx -d app.factorylm.com

# Rate-limiting zones (evaluated in http context via sites-enabled include)
limit_req_zone $binary_remote_addr zone=api_v1:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_ingest:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_agents:10m rate=10r/s;

server {
    server_name app.factorylm.com;

    server_tokens off;

    add_header X-Robots-Tag "noindex, nofollow" always;
    # Security response headers (web-review issue #616) — applied site-wide
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Note: no CSP here yet — Open WebUI uses inline scripts; tightening CSP
    # requires a separate audit. Tracked under issue #616.
    client_max_body_size 100M;

    # Agent activity dashboard — static HTML, served directly from VPS filesystem
    location = /agents {
        alias /opt/mira/agent-dashboard.html;
        default_type text/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Agent API — proxied to mira-pipeline (includes public-status + authenticated endpoints)
    location /api/agents/ {
        limit_req zone=api_agents burst=20 nodelay;
        proxy_pass http://127.0.0.1:9099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # mira-pipeline OpenAI-compat API + admin endpoints
    location /v1/ {
        limit_req zone=api_v1 burst=20 nodelay;
        proxy_pass http://127.0.0.1:9099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/briefing/ {
        proxy_pass http://127.0.0.1:9099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/identity/ {
        proxy_pass http://127.0.0.1:9099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # mira-hub — post-paywall customer app (Next.js standalone with basePath=/hub)
    # Container runs on 127.0.0.1:3101 and serves under /hub/ verbatim — no rewrite.
    #
    # Cache-Control: no-store prevents Open WebUI's service worker (scope "/") from
    # caching hub responses. Without it, Chrome on Android can serve a stale or offline
    # fallback page for /hub/ when the SW intercepts the navigation. Comet and desktop
    # Chrome are unaffected because they either lack the SW or ignore the cached state.
    # Redirect bare /hub/ to /hub/feed/ — Next.js 16 standalone+basePath Route Handler
    # returns 200 empty body instead of a redirect (confirmed bug, see route.ts comment).
    location = /hub/ {
        return 301 /hub/feed/;
    }


    location /hub/ {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # RSC fetches (/hub/namespace/?_rsc=…) can stall on Next.js cold-start
        # route compilation + the first uns_path tree query. The previous
        # 60s read timeout was returning intermittent 502/503s on cold
        # invocations of /namespace. 120s covers worst-case cold compile
        # without masking a real upstream hang.
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
        add_header Cache-Control "no-store" always;
    }

    # Preview pages — standalone HTML files (pricing, demo, etc.)
    location /preview/ {
        alias /opt/mira/preview/;
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        default_type text/html;
    }

    # Open WebUI — main app (catch-all; must come after specific location blocks)
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # mira-ingest API
    location /api/ingest/ {
        limit_req zone=api_ingest burst=10 nodelay;
        rewrite ^/api/ingest/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # QR test station — no-cache (mira-web :3200)
    location /qr-test {
        proxy_pass http://127.0.0.1:3200/qr-test;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # mira-mcp REST API
    location /api/mcp/ {
        rewrite ^/api/mcp/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # QR scan + admin routes (mira-web :3200)
    location /m/ {
        proxy_pass http://127.0.0.1:3200/m/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:3200/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/app.factorylm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.factorylm.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = app.factorylm.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name app.factorylm.com;
    return 404;
}

# chat.factorylm.com — Open WebUI at dedicated subdomain (Phase 1a)
# During Phase 1: mirrors app.factorylm.com root behavior.
# Phase 2: app.factorylm.com root switches to hub; this stays as the OWU home.
# Prerequisites: DNS A record chat.factorylm.com → 165.245.138.91, then:
#   certbot certonly --nginx -d chat.factorylm.com
#   (replace ssl_certificate lines below with chat.factorylm.com cert paths)
server {
    listen 80;
    server_name chat.factorylm.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chat.factorylm.com;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Temporary: reuse app cert until DNS + dedicated cert is provisioned
    ssl_certificate /etc/letsencrypt/live/app.factorylm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.factorylm.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Atlas CMMS — branded as FactoryLM CMMS
# Persistent "Open MIRA →" floating link injected via sub_filter (CRA-23)
# so users in the CMMS can return to MIRA without manually typing a URL.
# Atlas frontend is a forked React build (image mira/atlas-cmms-frontend:mobile,
# built off-repo on Bravo) — DOM injection at the proxy layer is the only
# in-repo hook we have for cross-app navigation.
server {
    listen 443 ssl;
    server_name cmms.factorylm.com;
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable upstream gzip so sub_filter can rewrite the HTML body.
        proxy_set_header Accept-Encoding "";
        sub_filter_types text/html;
        sub_filter_once off;
        sub_filter '</body>' '<a href="https://app.factorylm.com" id="mira-flbtn" aria-label="Open MIRA" data-cta="cmms-open-mira" style="position:fixed;bottom:20px;right:20px;background:#f0a000;color:#0b0c0f;padding:10px 16px;border-radius:8px;font-weight:700;font-family:system-ui,-apple-system,sans-serif;text-decoration:none;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:9999;font-size:14px">Open MIRA &rarr;</a></body>';
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8088/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
