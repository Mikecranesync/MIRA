services:
  mira-seo:
    build: .
    container_name: mira-seo
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - core-net
    environment:
      - REDIS_URL=${REDIS_URL}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - GSC_SERVICE_ACCOUNT_JSON=${GSC_SERVICE_ACCOUNT_JSON}
      - OPENPAGERANK_KEY=${OPENPAGERANK_KEY}
      - SEO_API_KEY=${SEO_API_KEY}
      - MIRA_PIPELINE_URL=${MIRA_PIPELINE_URL:-http://mira-pipeline:9099}
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  core-net:
    external: true
