# Atlas CMMS — Free maintenance management for MIRA technicians & managers
# Usage: included from root docker-compose.yml
# Docs: https://github.com/Teptac/Atlas_CMMS

services:
  atlas-db:
    image: postgres:16-alpine
    container_name: atlas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: ${ATLAS_DB_USER:-atlas}
      POSTGRES_PASSWORD: ${ATLAS_DB_PASSWORD}
    ports:
      - "${ATLAS_DB_PORT:-5433}:5432"
    volumes:
      - atlas_pgdata:/var/lib/postgresql/data
    networks:
      - cmms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ATLAS_DB_USER:-atlas} -d atlas"]
      interval: 10s
      timeout: 5s
      retries: 5

  atlas-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: atlas-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${ATLAS_MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ATLAS_MINIO_PASSWORD}
    volumes:
      - atlas_minio:/data
    ports:
      - "${ATLAS_MINIO_API_PORT:-9000}:9000"
      - "${ATLAS_MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - cmms-net
    command: server --address ":9000" --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  atlas-api:
    image: intelloop/atlas-cmms-backend:v1.5.0
    container_name: atlas-api
    restart: unless-stopped
    depends_on:
      atlas-db:
        condition: service_healthy
      atlas-minio:
        condition: service_started
    environment:
      DB_URL: atlas-db/atlas
      DB_USER: ${ATLAS_DB_USER:-atlas}
      DB_PWD: ${ATLAS_DB_PASSWORD}
      JWT_SECRET_KEY: ${ATLAS_JWT_SECRET}
      SPRING_PROFILES_ACTIVE: ${ATLAS_SPRING_PROFILE:-prod}
      PUBLIC_API_URL: ${ATLAS_PUBLIC_API_URL:-http://localhost:8088}
      PUBLIC_FRONT_URL: ${ATLAS_PUBLIC_FRONT_URL:-http://localhost:3100}
      MINIO_ENDPOINT: http://atlas-minio:9000
      MINIO_BUCKET: atlas-bucket
      MINIO_ACCESS_KEY: ${ATLAS_MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${ATLAS_MINIO_PASSWORD}
      STORAGE_TYPE: minio
      PUBLIC_MINIO_ENDPOINT: ${ATLAS_PUBLIC_MINIO_URL:-http://localhost:9000}
      INVITATION_VIA_EMAIL: ${ATLAS_EMAIL_INVITES:-false}
      ENABLE_EMAIL_NOTIFICATIONS: ${ATLAS_EMAIL_NOTIFICATIONS:-false}
      SMTP_HOST: ${ATLAS_SMTP_HOST:-}
      SMTP_PORT: ${ATLAS_SMTP_PORT:-587}
      SMTP_USER: ${ATLAS_SMTP_USER:-}
      SMTP_PWD: ${ATLAS_SMTP_PWD:-}
      MAIL_RECIPIENTS: ${ATLAS_MAIL_RECIPIENTS:-}
      KEYGEN_PRODUCT_TOKEN: ${ATLAS_KEYGEN_TOKEN:-}
      ENABLE_SSO: "false"
    ports:
      - "${ATLAS_API_PORT:-8088}:8080"
    networks:
      - cmms-net
      - core-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qS -O /dev/null http://localhost:8080/ 2>&1 | grep -q 'HTTP/'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  atlas-frontend:
    image: intelloop/atlas-cmms-frontend:v1.5.0
    container_name: atlas-frontend
    restart: unless-stopped
    depends_on:
      atlas-api:
        condition: service_healthy
    environment:
      API_URL: ${ATLAS_PUBLIC_API_URL:-http://localhost:8088}
      INVITATION_VIA_EMAIL: ${ATLAS_EMAIL_INVITES:-false}
      CLOUD_VERSION: "false"
      NODE_ENV: production
      ENABLE_SSO: "false"
    ports:
      - "${ATLAS_FRONTEND_PORT:-3100}:3000"
    networks:
      - cmms-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  atlas_pgdata:
  atlas_minio:

networks:
  cmms-net:
    name: cmms-net
    external: true
  core-net:
    name: core-net
    external: true
