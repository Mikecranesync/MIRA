# mira-crawler — Crawl Target Manifest
#
# Single source of truth for all crawlable URLs.
# No crawl runs without an entry here.
#
# Rules (non-negotiable):
# - All sources must be publicly accessible (zero login, zero paywall)
# - robots.txt checked before every domain crawl
# - Rate limit: minimum 3 seconds between requests per domain
# - Licenses: Apache 2.0, MIT, CC-BY, CC-BY-SA, or public domain ONLY

