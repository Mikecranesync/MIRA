services:
  mira-redis:
    image: redis:7.4.2-alpine
    container_name: mira-redis
    restart: unless-stopped
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data

  mira-celery-worker:
    build:
      context: ..
      dockerfile: mira-crawler/Dockerfile.celery
    container_name: mira-celery-worker
    restart: unless-stopped
    command: celery -A mira_crawler.celery_app worker --concurrency=2 -Q ingest,discovery,celery,youtube-discovery,youtube-transcript,youtube-keyframes,youtube-patterns --loglevel=info
    depends_on:
      mira-redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://mira-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://mira-redis:6379/1
      - APIFY_API_TOKEN=${APIFY_API_KEY}
      - MIRA_TENANT_ID=${MIRA_TENANT_ID}
      - NEON_DATABASE_URL=${NEON_DATABASE_URL}
      - OLLAMA_BASE_URL=http://192.168.1.11:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - YOUTUBE_DATA_API_KEY=${YOUTUBE_DATA_API_KEY}
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "celery", "-A", "mira_crawler.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  mira-celery-beat:
    build:
      context: ..
      dockerfile: mira-crawler/Dockerfile.celery
    container_name: mira-celery-beat
    restart: unless-stopped
    command: celery -A mira_crawler.celery_app beat --loglevel=info
    depends_on:
      mira-redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://mira-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://mira-redis:6379/1
      - APIFY_API_TOKEN=${APIFY_API_KEY}
      - MIRA_TENANT_ID=${MIRA_TENANT_ID}
      - NEON_DATABASE_URL=${NEON_DATABASE_URL}
      - OLLAMA_BASE_URL=http://192.168.1.11:11434
    networks:
      - core-net

networks:
  core-net:
    external: true

volumes:
  redis-data:
