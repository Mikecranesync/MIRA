<text x="510.0" y="947.5" font-size="14" font-weight="bold" fill="#000000">CV-101 Garage Conveyor - Wiring Print (DRAFT)</text>
<text x="510.0" y="975.5" font-size="11" fill="#000000">FLM-WD-CV101 Rev A | IEC | 2026-07-02</text>
<text x="890.0" y="975.5" font-size="9" text-anchor="end" fill="#666666">MIRA (cited bench photos 2026-07-02)</text>
<text x="60" y="774.5" font-size="9" font-weight="bold" fill="#000000">Notes:</text>
<text x="60" y="789.5" font-size="9" fill="#000000">1. DRIVE UNDERSIZED: GS11N-20P2 0.25HP/1.8A out vs motor 1HP/3.8A FLA -&gt; overcurrent ceiling ~1.8A (drive), not 3.8A.</text>
<text x="60" y="803.5" font-size="9" fill="#000000">2. SUPPLY: 1-phase 200-240V per GS10 nameplate (DC bus ~320V). R/S/T landing + contactor NOT photographed.</text>
<text x="60" y="817.5" font-size="9" fill="#000000">3. CONFIRMED (not drawn - no RJ45 symbol): RS-485 Modbus RTU - Micro820 D+/D-/G &lt;-&gt; GS10 RJ45 (purple).</text>
<text x="60" y="831.5" font-size="9" fill="#000000">4. GAP: PLC outputs O-00..O-06 loads UNVERIFIED - no photo maps outputs to loads.</text>
<text x="60" y="845.5" font-size="9" fill="#000000">5. GAP: GS10 power terminals R/S/T (in) &amp; U/V/W (out) UNVERIFIED - covered by caution label.</text>
<text x="60" y="859.5" font-size="9" fill="#000000">6. GAP: E-STOP dual-channel -&gt; PLC inputs (I-02/I-03?) NOT label-confirmed - shown unwired.</text>
<text x="60" y="873.5" font-size="9" fill="#000000">7. GAP: Photo-eye PE-101 -&gt; I-05 PROPOSED, not confirmed - shown unwired.</text>
<line x1="60" y1="905.5" x2="80" y2="905.5" stroke="#CC0000" stroke-width="2.0"/>
