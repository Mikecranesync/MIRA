# nginx vhost — stg.factorylm.com → staging hub (stg-mira-hub on 127.0.0.1:4101)
#
# Gives the already-running staging stack (compose project `mira-staging`,
# /opt/mira-staging/docker-compose.staging-vps.yml) a real HTTPS front door so a
# human + CI can log in and test before prod. Replaces the broken access path
# (raw http :4101 / Tailscale-IP NEXTAUTH_URL that breaks Google sign-in).
#
# Deploy: .github/workflows/deploy-nginx-stg.yml (scp here → sites-available →
# symlink → nginx -t → reload).
#
# TLS: this file ships as an HTTP-only (port 80) server so `nginx -t` passes
# BEFORE a cert exists. Run ONCE on the VPS after DNS is live:
#     certbot --nginx -d stg.factorylm.com
# certbot rewrites this server into a 443 TLS server + adds the 80→443 redirect
# and the /etc/letsencrypt/live/stg.factorylm.com/* cert lines automatically
# (same as app.factorylm.com). After that, re-running this deploy would revert
# the file to HTTP-only — so re-run certbot, or commit certbot's output back.
#
# Prereqs: DNS A record stg.factorylm.com → 165.245.138.91; staging hub healthy
# on :4101; Doppler factorylm/stg has NEXTAUTH_URL=https://stg.factorylm.com/api/auth;
# Google OAuth client has redirect URI https://stg.factorylm.com/api/auth/callback/google.

server {
    listen 80;
    listen [::]:80;
    server_name stg.factorylm.com;

    # Let certbot's webroot/standalone challenge through if used; --nginx mode
    # injects its own handling, so this is harmless either way.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Staging hub runs at ROOT on :4101 (no /hub basePath — confirmed by its
    # NEXTAUTH_URL having no /hub segment). Proxy everything to it.
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:4101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # becomes https in certbot's 443 block
        proxy_set_header Upgrade $http_upgrade;        # websocket / Next streaming
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;                       # long for ingest/chat streaming
    }
}
