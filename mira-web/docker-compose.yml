# mira-web — PLG acquisition funnel for FactoryLM
# Usage: included from root docker-compose.yml

services:
  mira-web:
    build: .
    container_name: mira-web
    restart: unless-stopped
    ports:
      - "${MIRA_WEB_PORT:-3200}:3000"
    environment:
      - PORT=3000
      - PLG_JWT_SECRET=${PLG_JWT_SECRET}
      - PLG_ATLAS_ADMIN_USER=${PLG_ATLAS_ADMIN_USER:-}
      - PLG_ATLAS_ADMIN_PASSWORD=${PLG_ATLAS_ADMIN_PASSWORD:-}
      - ATLAS_API_URL=${ATLAS_API_URL:-http://atlas-api:8080}
      - SIDECAR_URL=${SIDECAR_URL:-http://mira-sidecar:5000}
      - NEON_DATABASE_URL=${NEON_DATABASE_URL}
      - MCP_REST_API_KEY=${MCP_REST_API_KEY:-}
      - PLG_DAILY_FREE_QUERIES=${PLG_DAILY_FREE_QUERIES:-5}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-noreply@factorylm.com}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID:-}
      - PUBLIC_URL=${PUBLIC_URL:-https://factorylm.com}
      - LOOM_URL_1=${LOOM_URL_1:-}
      - LOOM_URL_2=${LOOM_URL_2:-}
      - LOOM_URL_3=${LOOM_URL_3:-}
      - LOOM_URL_4=${LOOM_URL_4:-}
      - LOOM_URL_5=${LOOM_URL_5:-}
    networks:
      - core-net
      - cmms-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  core-net:
    external: true
  cmms-net:
    external: true
