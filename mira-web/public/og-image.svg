<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0e11"/>
      <stop offset="100%" stop-color="#1a1b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#f5a623"/>

  <!-- Logo icon (gear-style M) -->
  <rect x="100" y="220" width="64" height="64" rx="14" fill="#f5a623"/>
  <text x="132" y="265" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#0d0e11" text-anchor="middle" dominant-baseline="central">M</text>

  <!-- Brand name -->
  <text x="184" y="262" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#e8eaf0">FactoryLM</text>

  <!-- Tagline -->
  <text x="100" y="340" font-family="Arial, sans-serif" font-size="32" fill="#8b8fa3">AI that actually understands</text>
  <text x="100" y="385" font-family="Arial, sans-serif" font-size="32" fill="#8b8fa3">your equipment.</text>

  <!-- Sub-tagline -->
  <text x="100" y="460" font-family="Arial, sans-serif" font-size="20" fill="#5a5e72">Fault diagnosis  ·  Work orders  ·  Equipment knowledge</text>

  <!-- URL -->
  <text x="100" y="560" font-family="Arial, sans-serif" font-size="18" fill="#f5a623">factorylm.com</text>

