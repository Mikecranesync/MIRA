server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Mounted at /scan/ on the parent reverse proxy. The static assets are
    # absolute (/assets/...) so we serve everything from root and let the
    # parent strip the prefix.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }

    location /assets/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
