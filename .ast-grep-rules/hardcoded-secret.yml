id: hardcoded-secret
language: Python
severity: error
message: "Possible hardcoded secret in variable '$VAR' — use os.getenv() or Doppler instead"
rule:
  any:
    - pattern: $VAR = "$VALUE"
      where:
        VAR:
          regex: '(?i)(password|secret|api_key|token|auth|passwd|credential)s?'
        VALUE:
          regex: '.{8,}'
    - pattern: $VAR = '$VALUE'
      where:
        VAR:
          regex: '(?i)(password|secret|api_key|token|auth|passwd|credential)s?'
        VALUE:
          regex: '.{8,}'
