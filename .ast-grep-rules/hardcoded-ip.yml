id: hardcoded-ip
language: Python
severity: warning
message: "Hardcoded IP address '$IP' — use env var or config file instead"
note: "Exceptions: localhost (127.0.0.1) and container-internal addresses (172.x.x.x) in non-production paths are acceptable."
rule:
  pattern: $IP
  regex: '\b(?!127\.0\.0\.1|0\.0\.0\.0|172\.\d+\.\d+\.\d+)(?:\d{1,3}\.){3}\d{1,3}\b'
