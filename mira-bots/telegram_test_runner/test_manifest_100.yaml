cases:
  # ── VFD/DRIVE FAULTS (20 cases) ────────────────────────────────────────────

  - name: vfd_overcurrent_01
    image: test-assets/sample_tags/gs10_vfd_tag.jpg
    caption: "My GS10 drive tripped on overcurrent this morning, motor was running fine yesterday"
    scenario: VFD tripped overcurrent fault at startup
    expected:
      fault_category: VFD_FAULT
      must_identify_device: true
      must_give_fault_cause: true
      must_give_next_step: true
    pass_conditions:
      max_words: 150
      min_words: 20
      must_contain: [AutomationDirect, GS10, VFD]
      must_not_contain: [Allen-Bradley, PowerFlex, PLC]
      must_include_action_verb: true
    fault_cause_keywords: [overcurrent, overload, winding, short, load, motor]
    next_step_keywords: [check, inspect, measure, reset, verify]
    max_words: 150
    speed_timeout: 30
    adversarial: false
    scenario_type: fault

