<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PMC STATION · Live</title>
<style>
  :root { --on-glow: 0 0 18px; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; background:#10141a; color:#e6edf3;
         font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
         display:flex; flex-direction:column; align-items:center; padding:24px 12px; }
  .bar { display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap; justify-content:center; }
  .pill { font-size:12px; padding:3px 10px; border-radius:999px; border:1px solid #30363d; color:#8b949e; }
  .pill.ok { color:#3fb950; border-color:#3fb950; } .pill.bad { color:#f85149; border-color:#f85149; }

  /* the physical panel */
  .panel { position:relative; width:920px; max-width:96vw; aspect-ratio:920/560;
           background:linear-gradient(160deg,#e2d8c2,#cdbf9f);
           border-radius:18px; border:2px solid #b3a684;
           box-shadow:0 10px 30px rgba(0,0,0,.55), inset 0 2px 6px rgba(255,255,255,.4);
           padding:2.4% 3%; }
  .title { text-align:center; font-family:"Comic Sans MS","Segoe Script",cursive;
           font-size:clamp(18px,3.2vw,30px); font-weight:700; color:#1f1c14;
           letter-spacing:1px; margin:.2em 0 .1em; }
  .row { display:flex; justify-content:space-around; align-items:center; }
  .top { margin-top:3%; }
  .bottom { margin-top:4%; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .lamp { width:clamp(46px,7.4vw,76px); aspect-ratio:1; border-radius:50%;
          border:5px solid #9a9a9a; background:#23262b;
          box-shadow:inset 0 -6px 10px rgba(0,0,0,.45), inset 0 4px 8px rgba(255,255,255,.15);
          transition:background .15s, box-shadow .15s; }
  .cap { font-size:11px; color:#3a3320; font-weight:600; }
  /* lamp colors */
  .lamp.amber.on { background:#f6b21a; box-shadow:var(--on-glow) #f6b21a, inset 0 -5px 9px rgba(0,0,0,.3); }
  .lamp.white.on { background:#f4f4f4; box-shadow:var(--on-glow) #ffffff, inset 0 -5px 9px rgba(0,0,0,.2); }
  .lamp.green.on { background:#3fe05a; box-shadow:var(--on-glow) #3fe05a, inset 0 -5px 9px rgba(0,0,0,.3); }
  .lamp.blue.on  { background:#3b82f6; box-shadow:var(--on-glow) #3b82f6, inset 0 -5px 9px rgba(0,0,0,.3); }
  .lamp.red.on   { background:#fa5147; box-shadow:var(--on-glow) #fa5147, inset 0 -5px 9px rgba(0,0,0,.3); }
  .lamp.amber { background:#4a3a0c; } .lamp.white { background:#5f5f5f; }
  .lamp.green { background:#15331e; } .lamp.blue { background:#152748; } .lamp.red { background:#451513; }

  /* bottom controls */
  .pb { width:clamp(58px,9vw,94px); aspect-ratio:1; border-radius:50%;
        border:6px solid #9a9a9a; background:#15331e;
        box-shadow:inset 0 -7px 12px rgba(0,0,0,.45); transition:background .15s, box-shadow .15s; }
  .pb.on { background:#3fe05a; box-shadow:var(--on-glow) #3fe05a, inset 0 -6px 10px rgba(0,0,0,.3); }
  .knob { width:clamp(54px,8.4vw,84px); aspect-ratio:1; border-radius:50%;
          background:radial-gradient(circle at 50% 35%,#3a3a3a,#141414);
          border:6px solid #8a8a8a; position:relative; }
  .knob::after { content:""; position:absolute; left:50%; top:8%; width:8%; height:42%;
          background:#e8e8e8; border-radius:4px; transform:translateX(-50%) rotate(var(--rot,0deg));
          transform-origin:bottom center; transition:transform .2s; }
  .estop { width:clamp(96px,15vw,150px); aspect-ratio:1; border-radius:50%;
           background:radial-gradient(circle at 50% 40%,#e84a4a,#8c1f1f 70%,#6e1b1b);
           border:5px solid #4a1010;
           box-shadow:0 6px 14px rgba(0,0,0,.5), inset 0 -10px 18px rgba(0,0,0,.4), inset 0 8px 14px rgba(255,255,255,.18); }
  .pos { font-size:13px; font-weight:700; color:#1f1c14; }
  .estat { font-size:12px; font-weight:700; }
  .estat.ok { color:#1a7f37; } .estat.bad { color:#b71c1c; }
  .foot { margin-top:14px; color:#6b7480; font-size:12px; }
</style>
</head>
<body>
  <div class="bar">
    <strong style="font-size:15px">PMC STATION — Live</strong>
    <span id="broker" class="pill">broker…</span>
    <span id="plc" class="pill">PLC…</span>
    <span id="age" class="pill"></span>
  </div>

  <div class="panel">
    <div class="title">PMC STATION</div>

    <div class="row top">
      <div class="cell"><div id="amber" class="lamp amber"></div><div class="cap">AMBER · DO_03</div></div>
      <div class="cell"><div id="white" class="lamp white"></div><div class="cap">SAFETY · DI_02</div></div>
      <div class="cell"><div id="green" class="lamp green"></div><div class="cap">GREEN · DO_00</div></div>
      <div class="cell"><div id="blue"  class="lamp blue"></div><div class="cap">DRIVE · DO_02</div></div>
      <div class="cell"><div id="red"   class="lamp red"></div><div class="cap">RED · DO_01</div></div>
    </div>

    <div class="row bottom">
      <div class="cell"><div id="pb" class="pb"></div><div class="cap">START · DI_04</div></div>
      <div class="cell"><div id="knob" class="knob"></div><div id="pos" class="pos">— OFF —</div></div>
      <div class="cell"><div class="estop"></div><div class="cap">E-STOP</div><div id="estat" class="estat">…</div></div>
    </div>
  </div>

  <div id="foot" class="foot">Connecting…</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
  const TOPIC = "mira/plc/conv_simple";
  const url = "ws://" + location.hostname + ":9001";
  const $ = id => document.getElementById(id);
  let lastTs = 0;
  const setLamp = (id,on) => $(id).classList.toggle("on", !!on);
  const setPill = (id,t,c) => { const e=$(id); e.textContent=t; e.className="pill "+(c||""); };

  const client = mqtt.connect(url, { reconnectPeriod: 3000 });
  client.on("connect", () => { setPill("broker","broker ✓","ok"); client.subscribe(TOPIC); });
  client.on("reconnect",()=> setPill("broker","broker…",""));
  client.on("close",    ()=> setPill("broker","broker ✗","bad"));
  client.on("error",    ()=> setPill("broker","broker ✗","bad"));

  client.on("message", (t,buf) => {
    let d; try { d = JSON.parse(buf.toString()); } catch(e){ return; }
    lastTs = Date.now();
    if (!d.online) { setPill("plc","PLC offline","bad"); $("foot").textContent="PLC unreachable"; return; }
    setPill("plc","PLC online","ok");
    const di = d.di||{}, dout = d.do||{};
    setLamp("amber", dout.pb_run_led);
    setLamp("white", di.estop_nc);     // safety OK (NC healthy=1)
    setLamp("green", dout.light_green);
    setLamp("blue",  dout.contactor);
    setLamp("red",   dout.light_red);
    setLamp("pb",    di.pb_run);
    // selector
    let rot = 0, pos = "— OFF —";
    if (di.selector_fwd) { rot = -40; pos = "◀ FWD"; }
    else if (di.selector_rev) { rot = 40; pos = "REV ▶"; }
    $("knob").style.setProperty("--rot", rot+"deg");
    $("pos").textContent = pos;
    // e-stop
    const armed = !!di.estop_nc;
    const es = $("estat"); es.textContent = armed ? "● ARMED / OK" : "✖ TRIPPED";
    es.className = "estat " + (armed ? "ok" : "bad");
    $("foot").textContent = "Conv_Simple · live · updated " + new Date().toLocaleTimeString();
  });

  setInterval(()=>{ if(!lastTs) return; const a=(Date.now()-lastTs)/1000;
    setPill("age", a<5?"live":Math.round(a)+"s stale", a<5?"ok":"bad"); }, 1000);
</script>
</body>
</html>
