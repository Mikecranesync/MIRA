services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mira-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT (edge publisher connects here)
      - "9001:9001"   # MQTT over WebSockets (browser dashboard connects here)
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mira_mosquitto_data:/mosquitto/data

  dashboard:
    image: nginx:alpine
    container_name: mira-plc-dash
    restart: unless-stopped
    ports:
      - "8080:80"     # web dashboard (open over Tailscale: http://<vps-ts-ip>:8080)
    volumes:
      - ./web:/usr/share/nginx/html:ro

volumes:
  mira_mosquitto_data:
