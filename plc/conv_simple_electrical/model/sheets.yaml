  - id: E-003
    title: VFD power (CB1 -> VFD1 -> M1)
    status: drafted
    subtitle: "supply → CB1 → VFD1 (GS10) → M1"
    scope: >
      Upstream supply → branch protection (CB1) → VFD1 power input (R/L1, S/L2, T/L3) →
      motor output (U/T1, V/T2, W/T3) → motor M1; PE bonding. No motor contactor — CB1
      feeds VFD1 directly (2026-07-11 photo correction; a separate contactor, if one
      exists, is FIELD VERIFY — OI-21).
    note: >
      Bench supply voltage, phase count, GS10 exact model/frame, breaker rating, wire gauge:
      NOT DOCUMENTED anywhere (every conductor is FIELD VERIFY). P00.01 rated current 1.60 A
      (2026-05-20 export) is the only sizing clue. If the drive is a 1φ model, input is R/L1, S/L2 only.
      No 3-phase motor contactor observed in the 2026-07-11 photos between CB1 and VFD1; a
      separate power contactor, if one exists, is FIELD VERIFY (OI-21). LOTO + wait ≥5 min
      for DC-bus discharge before touching (WI p.2 §2).
    annotations:
      caveat:
        - "Bench supply voltage & phase count, GS10 exact model/frame, breaker rating, wire gauge: NOT DOCUMENTED — every conductor FIELD VERIFY. P00.01 = 1.60 A (2026-05-20 export) is the only sizing clue. If 1φ model, input = R/L1, S/L2 only (GS10_UM L1971)."
        - "No 3-phase motor contactor observed in the 2026-07-11 photos. The device labeled 'MLC' is a Schneider TeSys CA3KN22BD CONTROL RELAY (drive-enable interlock) shown on E-006 — not a motor contactor. Separate power contactor = FIELD VERIFY (OI-21)."
      safety:
        - "Never start/stop via input power (L1811-1813); CB1 is branch protection only, not a run/stop device."
        - "LOTO + wait ≥5 min for DC-bus discharge before touching (WI p.2 §2)."
        - "Monitored e-stop is NOT a safety stop — hardwire S0 to remove drive power per NFPA 79 / EN 60204-1."
        - "PE resistance ≤0.1Ω (L1760-61); shield/conduit bonded both ends (L1792-95); RFI jumper in/out FIELD VERIFY (L1693-1718, OI-17)."
      notes:
        - "CB1 REQUIRED per GS10_UM L1758-1759 — type/rating unknown (OI-15)."
        - "M1: swap any two motor leads to reverse — GS10_UM L1773-1776."
        - "VFD control source = Modbus — see E-007. No control wiring on this sheet."
      sources:
