  - id: E-003
    title: VFD power (CB1 -> VFD1 -> M1)
    status: drafted
    subtitle: "supply → CB1 → Q1/MLC (supply switch) → VFD1 (GS10) → M1 · 230 V 1φ in → 230 V 3φ to motor"
    scope: >
      Upstream supply → branch protection (CB1) → Q1/MLC (single-phase drive-supply switch,
      2 NO contacts) → VFD1 power input (R/L1, S/L2; T/L3 unused, 1φ) → motor output (U/T1,
      V/T2, W/T3) → motor M1; PE bonding. Q1/MLC's NO contacts 13-14 & 43-44 ARE the power
      path between CB1 and VFD1 (2026-07-11 technician field correction — reverses the earlier
      "no motor contactor, CB1 feeds VFD1 directly" reading; OI-21 RESOLVED).
    note: >
      Bench supply confirmed 230 V SINGLE-PHASE 2026-07-11 (technician field report); GS10 exact
      model/frame, breaker rating, wire gauge remain NOT DOCUMENTED (every conductor is FIELD
      VERIFY). P00.01 rated current 1.60 A (2026-05-20 export) is the only sizing clue. Input is
      R/L1, S/L2 only; T/L3 unused. Q1/MLC's 2 NO contacts (13-14, 43-44) are the single-phase
      drive-supply switch between CB1 and VFD1 (OI-21 RESOLVED). Output to motor = 230 V 3φ
      (230 V motor, technician-confirmed 2026-07-11).
      LOTO + wait ≥5 min for DC-bus discharge before touching (WI p.2 §2).
    annotations:
      caveat:
        - "Bench supply voltage & phase count, GS10 exact model/frame, breaker rating, wire gauge: NOT DOCUMENTED — every conductor FIELD VERIFY. P00.01 = 1.60 A (2026-05-20 export) is the only sizing clue. If 1φ model, input = R/L1, S/L2 only (GS10_UM L1971)."
        - "MLC (Q1) is a control relay USED AS the single-phase drive-supply switch — its 2 NO contacts (13-14, 43-44) carry the 230 V 1φ supply into the GS10; coil A1/A2 from O-02 (E-006). Energizing O-02 powers the drive (technician-confirmed 2026-07-11)."
      safety:
        - "Never start/stop via input power (L1811-1813); CB1 is branch protection only, not a run/stop device."
        - "LOTO + wait ≥5 min for DC-bus discharge before touching (WI p.2 §2)."
        - "Monitored e-stop is NOT a safety stop — hardwire S0 to remove drive power per NFPA 79 / EN 60204-1."
        - "PE resistance ≤0.1Ω (L1760-61); shield/conduit bonded both ends (L1792-95); RFI jumper in/out FIELD VERIFY (L1693-1718, OI-17)."
      notes:
        - "CB1 REQUIRED per GS10_UM L1758-1759 — type/rating unknown (OI-15)."
        - "M1: swap any two motor leads to reverse — GS10_UM L1773-1776."
        - "VFD control source = Modbus — see E-007. No control wiring on this sheet."
        - "Supply is 230 V SINGLE-PHASE (2-wire); drive output = 230 V 3φ to a 230 V motor (technician-confirmed 2026-07-11)."
      sources:
        - "plc/GS10_UM.txt (terminals L1971-1986; topology L1750-1813) · plc/GS10_Integration_Guide.md (Q1 phase-5 test)"
        - "plc/Prog_init_ConvSimple_v2.1.st (vfd_run_permit) · plc/MIRA_PLC_WorkInstruction_v3.pdf (LOTO §2)"
        - "photos review/photos/wire_1..4.jpg (2026-07-11, actual devices)"
        - "review/PHOTO_EVIDENCE_V6.md (technician field correction 2026-07-11)"
