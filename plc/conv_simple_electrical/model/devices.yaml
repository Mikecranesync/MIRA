# Conv_Simple / CV-101 — device schedule (source of truth for the print set)
# evidence: verified | field_verify | proposed
# Verified = traced to a repo artifact (cited). field_verify = must be metered/confirmed on the bench.
meta:
  project: Conv_Simple
  asset: CV-101 (garage conveyor)
  drawn_by: MIRA / FactoryLM
  revision: A
  date: "2026-07-11"

devices:
  - tag: PLC1
    type: plc
    model: Allen-Bradley Micro820 2080-LC20-20QBB
    role: Conveyor controller; Modbus RTU master to VFD1
    io: 12 DI (I-00..I-11), 7 relay DO (O-00..O-06), 4 AI, 1 AO
    evidence: verified
    source: photo review/photos/wire_2.jpg (2026-07-11 — model label + MAC ID 5C:88:16:D8:E4:D7 read directly); plc/GS10_Integration_Guide.md; plc/ccw/controller/Controller/LogicalValues.csv

  - tag: VFD1
    type: vfd
    model: AutomationDirect GS10 DURApulse
    role: Drives conveyor motor. Commanded over Modbus RTU (RJ45, Ch2 node 1) — photo confirms the RS-485 cable is landed. NOTE the GS10 control connector is ALSO wired (hybrid, not Modbus-only) — see OI-22.
    evidence: verified
    source: photo review/photos/wire_4.jpg (2026-07-11 — keypad, control-terminal legend, RJ45 read directly); plc/GS10_Integration_Guide.md; plc/Prog_init_ConvSimple_v2.1.st; review/photos/gs10_full.jpg + gs10_control_terminals.jpg (2026-07-11 — full-resolution control-terminal read)
    note: >
      GS10 control is HYBRID (full-res photo 2026-07-11): the top run/DI connector
      (FWD/REV/DI3-5/+24V/DCM) is EMPTY — run/dir/speed command is Modbus (RJ45 landed);
      the bottom analog/output connector (+10V/ACM/AI/AO1/DO1/DOC/PE) is WIRED, likely
      analog speed reference + feedback. Map = OI-22.

  - tag: M1
    type: motor
    role: Conveyor drive motor (3~ from VFD1 U/V/W)
    evidence: field_verify   # nameplate FLA/kW/rpm/poles not captured in repo

  - tag: S0
    type: e_stop
    role: Emergency stop, DUAL-CHANNEL (diverse) — NC ch to I-02, NO ch to I-03
    evidence: verified        # channel assignment from Ignition OPC docs
    note: >
      DI-02 = NC channel (healthy = 1). DI-03 = NO channel (healthy = 0).
      Whether a safety relay sits between S0 and the PLC is FIELD VERIFY.

  - tag: SS1
    type: selector_switch
    role: Direction selector — FWD contact to I-00, REV contact to I-01 (FWD-OFF-REV)
    evidence: verified        # function from program + Ignition "prod wiring" docs
    source: plc/Prog_init_ConvSimple_v2.1.st (dir_fwd/dir_rev)

  - tag: S2
    type: pushbutton_no
    role: Run / rearm pushbutton to I-04; illuminated — lamp fed by PLC O-03 (PBRunLED)
    evidence: verified
    source: plc/ignition-project/.../Inputs/tags.json ("DI-04 Run pushbutton"); plc/CCW_VARIABLES_v4.0.txt:80

  - tag: B1
    type: photo_eye
    role: Product-present beam to I-05 (blocked -> pe_latched soft stop)
    evidence: verified        # function from program; physical sensor unmapped historically
    source: plc/Prog_init_ConvSimple_v2.1.st (_IO_EM_DI_05 -> pe_latched)

  - tag: PS1
    type: power_supply
    model: Mean Well DIN-rail supply (24 V / 1.0 A; 100-240 VAC in @ 0.55 A; +V / -V / DC-OK out, N / L / PE in, +V ADJ pot, DC-OK LED)
    role: 24 VDC control supply (E-004). Feeds the DC +/- distribution block (blue = one polarity, white = the other) and the +24V/0V control loop.
    evidence: verified   # device identity + ratings from photo wire_2.jpg; field wiring still FIELD VERIFY
    source: photo review/photos/wire_2.jpg (2026-07-11 — Mean Well nameplate read directly); caption "MW 120 to 24 volt DC power supply"
    note: Exact model number + branch fusing + which distribution circuits it feeds = FIELD VERIFY (OI-25).

  - tag: CB1
    type: circuit_breaker
    role: Upstream branch protection (E-002/E-003) — existence, type, rating unconfirmed
    evidence: field_verify

  - tag: Q1
    type: control_relay
    sheet_label: "Q1/MLC — Schneider TeSys CA3KN22BD control relay (24 VDC coil)"
    model: Schneider Electric TeSys CA3KN22BD (control relay, 2 NO + 2 NC, 24 VDC coil)
    role: Drive-enable CONTROL RELAY (hand-labeled 'MLC'). Coil A1(+)/A2(-) driven by PLC O-02 (24 VDC); aux contacts 13-14 & 43-44 (NO), 21-22 & 31-32 (NC) sit in the control circuit. NOT a motor power contactor — no main poles. Coil + contacts shown on E-006.
    evidence: verified
    source: photo review/photos/wire_3.jpg (2026-07-11 — device label 'MLC', part no CA3KN22BD, coil A1/A2 24V, aux 13-14/21-22/31-32/43-44 read directly); plc/CCW_VARIABLES_v4.0.txt:80 (O-02 coil); plc/Prog_init_ConvSimple_v2.1.st:214 (vfd_run_permit reads O-02); review/photos/mlc_full.jpg + mlc_top_terminals.jpg + mlc_bottom_terminals.jpg (2026-07-11 — full-resolution terminal read)
    note: >
      CORRECTED V4 from photo: the earlier "safety POWER contactor / power poles on E-003" was an
      inference error — the physical 'MLC' device is a TeSys CA3K CONTROL RELAY (aux contacts only,
      no main poles). Coil A1/A2 + 24 VDC now verified. Aux-contact destinations = FIELD VERIFY
      (OI-26). A separate 3-phase motor contactor upstream of the GS10 = FIELD VERIFY (OI-21; none
      observed in the 2026-07-11 photos). Full-res photo confirms coil A1/A2 wired and NO contacts
      13-14 & 43-44 in use (NC 21-22/31-32 appear unused); contact destinations FIELD VERIFY
      (OI-26).

  - tag: PL1
    type: pilot_light
    role: Green RUNNING pilot — load of O-00 (LightGreen)
    evidence: verified
    source: plc/CCW_VARIABLES_v4.0.txt:79
    note: Device model + lamp terminals FIELD VERIFY.

  - tag: PL2
    type: pilot_light
    role: Red FAULT/E-STOP pilot — load of O-01 (LightRed)
    evidence: verified
    source: plc/CCW_VARIABLES_v4.0.txt:79; plc/GS10_Integration_Guide.md (Lineage-A fault_lamp)
    note: Device model + lamp terminals FIELD VERIFY.

  - tag: X1
    type: terminal_block
    role: Field terminal strip — field devices land here before PLC (E-008)
    evidence: field_verify    # strip layout / numbering not documented
