services:
  mira-docling:
    mem_limit: 1536m
    memswap_limit: 1536m
    restart: on-failure:5

  mira-relay:
    build: ./mira-relay
    container_name: mira-relay
    mem_limit: 256m
    memswap_limit: 256m
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      - MIRA_DB_PATH=/mira-db/mira.db
      - RELAY_PORT=8765
      - RELAY_API_KEY=
    volumes:
      - ./mira-bridge/data:/mira-db
    networks:
      - core-net
    restart: unless-stopped
