id: pilz_manual_miss_11
description: >
  Pilz distribution block forensic — user asks to "find a Pilz manual" mid-session.
  Reconstructed from chat b500953b (2026-04-14 incident).
  Regression guard: doc intent mid-session must route to the documentation
  handler — NOT to a diagnostic Q-question asking "what fault code?".
  CRA-8 (2026-05-06): expected_final_state changed back to IDLE to match the
  post-28aba78 doc-intent contract. The engine now lands at IDLE for KB-miss
  manual requests (queues a crawl and tells the user to ask again shortly),
  instead of the legacy citation-gate DIAGNOSIS landing. Engine is truth — the
  fixture follows. Cluster B's session-entity bypass (CRA-8 fix) makes Turn 4
  short-circuit straight to _do_documentation_lookup using the Pilz vendor
  pinned across earlier turns, instead of stranding the FSM in
  MANUAL_LOOKUP_GATHERING.
expected_final_state: IDLE
max_turns: 5
expected_keywords: [pilz, manual, documentation, support, docs, indexed, searching]
forbidden_keywords: []
expected_vendor: Pilz
wo_expected: false
safety_expected: false
honesty_required: false
tags: [distribution-block, pilz, get-documentation, forensic, regression-guard, judge-target]
# judge_generated_by not set — eval runner will default to "unknown"
turns:
  - role: user
    content: "I'm working on a Pilz PNOZ distribution block, getting intermittent faults"
  - role: user
    content: "The fault light is flashing yellow, not red"
  - role: user
    content: "It's on our conveyor safety circuit, E-stop monitoring chain"
  - role: user
    content: "Can you find the Pilz manual for this distribution block?"
