id: demo_may21_04_30hz_setpoint
category: demo_may21
tags: [demo_may21]
description: |
  Mike's demo Q4. Freq setpoint for 30 Hz on the GS10. The drive register
  is scaled Hz x 10 (300 at 0x2101). A wrong answer like "30" or "3000"
  is the most common commissioning bug. Must cite.
expected_keywords: ["300", "0x2101"]
forbidden_keywords: ["3000", "value 30 "]
citation_required: true
anti_hallucination_check: true
allowed_specs: ["0x2101", "HR8449", "300", "0x012C"]
asset_required: "GS10"
max_turns: 1
mock_responses: garage/modbus
mock_kb_chunks: garage/gs10_modbus
turns:
  - role: user
    content: "What value for 30 Hz on the GS10?"
