id: demo_may21_02_forward_run_register
category: demo_may21
tags: [demo_may21]
description: |
  Mike's demo Q2. Asking for the register to start a drive forward, no
  drive named. The bot should either confirm WHICH drive (UNS gate) or
  answer for the resolved drive in context. Two-mode pass:
    - If session context already has the drive resolved: answer with the
      register + value (must cite).
    - If no drive context: ask which drive (clarification).
expected_keywords: ["register"]
citation_required: true
clarification_required: false
max_turns: 2
mock_responses: garage/modbus
mock_kb_chunks: garage/gs10_modbus
turns:
  - role: user
    content: "What register do I write to run the drive forward?"
