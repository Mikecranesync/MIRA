id: demo_may21_05_msg_modbus_255
category: demo_may21
tags: [demo_may21]
description: |
  Mike's demo Q5. Error code 255 returned from a Micro820 MSG_MODBUS
  instruction = "no response from slave" / timeout. Common causes:
  baud mismatch, slave ID mismatch, polarity swap, drive not in remote
  mode. If KB has nothing on MSG_MODBUS error 255, the bot MUST admit
  it (honesty_required) rather than fabricate.
expected_keywords: ["255"]
citation_required: false
honesty_required: true
max_turns: 1
mock_responses: garage/out_of_kb
mock_kb_chunks: garage/micro820_wiring
turns:
  - role: user
    content: "What's the MSG_MODBUS error code 255?"
