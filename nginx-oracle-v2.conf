# nginx-oracle-v2.conf — Phase 2 switchover config
# DO NOT DEPLOY until all pre-conditions are met:
#   1. chat.factorylm.com DNS A record → 165.245.138.91
#   2. certbot certonly --nginx -d chat.factorylm.com
#   3. mira-hub rebuilt with NEXT_PUBLIC_BASE_PATH='' NEXT_PUBLIC_API_BASE=''
#   4. OAuth redirect URIs added for root path in Google/Slack/MS/Dropbox/Confluence consoles
#   5. Playwright suite passes with HUB_URL=https://app.factorylm.com
#
# Deploy: scp nginx-oracle-v2.conf factorylm-prod:/etc/nginx/sites-enabled/mira && ssh factorylm-prod nginx -s reload

server {
    server_name app.factorylm.com;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    client_max_body_size 100M;

    # /hub/* bookmark redirects — 301 permanent, remove after 2026-07-28 (90 days)
    # Strips /hub prefix so /hub/feed → /feed, /hub/assets → /assets, etc.
    location ^~ /hub/ {
        rewrite ^/hub/(.*)$ /$1 permanent;
    }
    location = /hub {
        return 301 https://$host/;
    }

    # Agent activity dashboard
    location = /agents {
        alias /opt/mira/agent-dashboard.html;
        default_type text/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Agent API
    location /api/agents/ {
        proxy_pass http://127.0.0.1:9099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # mira-pipeline OpenAI-compat API
    location /v1/ {
        proxy_pass http://127.0.0.1:9099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/briefing/ {
        proxy_pass http://127.0.0.1:9099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/identity/ {
        proxy_pass http://127.0.0.1:9099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Preview pages
    location /preview/ {
        alias /opt/mira/preview/;
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        default_type text/html;
    }

    # mira-ingest API
    location /api/ingest/ {
        rewrite ^/api/ingest/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # mira-mcp REST API
    location /api/mcp/ {
        rewrite ^/api/mcp/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # QR test station
    location /qr-test {
        proxy_pass http://127.0.0.1:3200/qr-test;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # QR scan + admin routes (mira-web :3200)
    location /m/ {
        proxy_pass http://127.0.0.1:3200/m/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:3200/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # mira-hub — Phase 2: hub serves at root (rebuilt with basePath='')
    # No service worker conflict: OWU moved to chat.factorylm.com.
    location / {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/app.factorylm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.factorylm.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = app.factorylm.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name app.factorylm.com;
    return 404;
}

# chat.factorylm.com — Open WebUI permanent home (Phase 2+)
server {
    listen 80;
    server_name chat.factorylm.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chat.factorylm.com;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    ssl_certificate /etc/letsencrypt/live/chat.factorylm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.factorylm.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Atlas CMMS
server {
    listen 443 ssl;
    server_name cmms.factorylm.com;
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8088/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
